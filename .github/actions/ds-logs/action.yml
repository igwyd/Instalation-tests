name: 'Documentserver logs'
description: 'Print last 1000 lines of DS logs'

inputs:
  mode:
    description: 'Execution mode: ssh-native | ssh-docker | docker-local'
    required: true
  ssh_host:
    description: 'SSH host IP or domain'
    required: false
    default: ''
  ssh_user:
    description: 'SSH user'
    required: false
    default: 'ubuntu'
  container:
    description: 'Docker container name or ID (for docker modes)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Print DS logs
      shell: bash
      run: |
        LOG_FILES=(
          /var/log/onlyoffice/documentserver/converter/out.log
          /var/log/onlyoffice/documentserver/converter/err.log
          /var/log/onlyoffice/documentserver/docservice/out.log
          /var/log/onlyoffice/documentserver/docservice/err.log
          /var/log/onlyoffice/documentserver/metrics/out.log
          /var/log/onlyoffice/documentserver/metrics/err.log
          /var/log/onlyoffice/documentserver/nginx.error.log
          /var/log/onlyoffice/documentserver-example/out.log
          /var/log/onlyoffice/documentserver/adminpanel/out.log
          /var/log/onlyoffice/documentserver/adminpanel/err.log
        )

        case "${{ inputs.mode }}" in
          ssh-native)
            ssh -o StrictHostKeyChecking=no ${{ inputs.ssh_user }}@${{ inputs.ssh_host }} \
              "sudo tail -n 1000 ${LOG_FILES[*]} 2>/dev/null || true"
            ;;
          ssh-docker)
            ssh -o StrictHostKeyChecking=no ${{ inputs.ssh_user }}@${{ inputs.ssh_host }} \
              "sudo docker logs --tail=1000 ${{ inputs.container }} 2>&1 || true"
            ;;
          docker-local)
            docker logs -n 1000 ${{ inputs.container }} 2>&1 || true
            ;;
          *)
            echo "Unknown mode: ${{ inputs.mode }}"
            ;;
        esac
