            -e REDIS_TLS_PORT_NUMBER=6380 \
            -e REDIS_TLS_CERT_FILE=/certs/server.crt \
            -e REDIS_TLS_KEY_FILE=/certs/server.key \
            -e REDIS_TLS_CA_FILE=/certs/ca.crt \
