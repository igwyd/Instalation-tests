          docker exec mssql-tls /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "StrongPass123" -C -Q "CREATE LOGIN onlyoffice WITH PASSWORD = 'StrongPass123';"
          docker exec mssql-tls /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "StrongPass123" -C -d onlyoffice -Q "CREATE USER onlyoffice FOR LOGIN onlyoffice; ALTER ROLE db_owner ADD MEMBER onlyoffice;"

