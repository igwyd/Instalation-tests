name: dev TLS dependencies

on:
  schedule:
    - cron: '0 13 * * 3'  # Wednesday 16:00 Moscow time (UTC+3)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tls-check:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create docker network
        run: docker network create tls-network

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Get runner IP
        id: runner_ip
        run: |
          IP=$(ip route get 1 | awk '{print $7}')
          echo "RUNNER_IP=$IP" >> $GITHUB_ENV
          echo "Runner IP is $IP"

      # ==================== POSTGRES_TLS ====================

      - name: POSTGRES_TLS Generate TLS certificates (CA, server, client)
        run: |
          mkdir -p pg-certs
          cd pg-certs

          # Root CA
          openssl req -new -x509 -days 3650 -nodes -subj "/CN=test-ca" \
            -keyout ca.key -out ca.crt

          # PostgreSQL server certificate, SAN must match DB_HOST (container name: pg-tls)
          openssl req -new -nodes -subj "/CN=pg-tls" \
            -addext "subjectAltName=DNS:pg-tls" \
            -keyout server.key -out server.csr
          openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -days 3650 -copy_extensions copy -out server.crt

          # Client certificate for mTLS (verify-full)
          openssl req -new -nodes -subj "/CN=onlyoffice_client" \
            -keyout client.key -out client.csr
          openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -days 3650 -out client.crt

          chmod 600 *.key
          sudo chown 999:999 *

          echo "-------------SAN check-------------"
          openssl x509 -in server.crt -noout -text | grep -A1 "Subject Alternative Name"

      - name: POSTGRES_TLS Create pg_hba.conf
        run: |
          cat > pg-certs/pg_hba.conf <<'EOF'
          local   all all                                trust
          host    all all 127.0.0.1/32                   trust
          host    all all ::1/128                        trust
          hostssl all all 0.0.0.0/0                       scram-sha-256
          hostnossl all all 0.0.0.0/0                     reject
          EOF
          echo "--------------pg_hba.conf check-------------"
          cat pg-certs/pg_hba.conf

      - name: POSTGRES_TLS Run PostgreSQL with TLS
        run: |
          docker run -d --name pg-tls --network tls-network \
            -e POSTGRES_USER=onlyoffice \
            -e POSTGRES_PASSWORD=StrongPass123 \
            -e POSTGRES_DB=onlyoffice \
            -v "$(pwd)/pg-certs":/var/lib/postgresql/certs:ro \
            -v "$(pwd)/pg-certs/pg_hba.conf":/etc/postgresql/pg_hba.conf:ro \
            postgres:16 \
            -c ssl=on \
            -c ssl_cert_file=/var/lib/postgresql/certs/server.crt \
            -c ssl_key_file=/var/lib/postgresql/certs/server.key \
            -c ssl_ca_file=/var/lib/postgresql/certs/ca.crt \
            -c hba_file=/etc/postgresql/pg_hba.conf \
            -c log_connections=on

      - name: POSTGRES_TLS Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 15); do
            if docker exec pg-tls pg_isready -U onlyoffice >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Attempt $i/15 — waiting for PostgreSQL..."
            sleep 4
          done
          docker logs pg-tls --tail 30
          docker exec pg-tls psql -U onlyoffice -c "SHOW ssl;"
          docker exec pg-tls psql -U onlyoffice -c "SHOW hba_file;"

      - name: POSTGRES_TLS Prepare DS client certificates
        run: |
          mkdir -p ds-certs
          sudo cp pg-certs/ca.crt pg-certs/client.crt pg-certs/client.key ds-certs/
          sudo chown "$(id -u)":"$(id -g)" ds-certs/*
          chmod 644 ds-certs/ca.crt ds-certs/client.crt
          chmod 600 ds-certs/client.key

      - name: POSTGRES_TLS Docker pull and run ONLYOFFICE Docs EE with TLS_MODE
        run: |
          docker pull onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}
          docker run -d --name onlyoffice --network tls-network -p 80:80 \
            -e DB_TYPE=postgres \
            -e DB_HOST=pg-tls \
            -e DB_PORT=5432 \
            -e DB_NAME=onlyoffice \
            -e DB_USER=onlyoffice \
            -e DB_PWD=StrongPass123 \
            -e TLS_MODE=verify-full \
            -e TLS_CA_CERT=/certs/ca.crt \
            -e TLS_CERT=/certs/client.crt \
            -e TLS_KEY=/certs/client.key \
            -e WOPI_ENABLED=true \
            -v "$(pwd)/ds-certs":/certs:ro \
            onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

      - name: POSTGRES_TLS Wait for DS startup
        run: sleep 240

      - name: POSTGRES_TLS INFO about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          sudo apt-get install jq -y

          echo "-------------healthcheck-------------"
          HEALTHCHECK_POSTGRES=$(curl -s http://${RUNNER_IP}/healthcheck || echo "error")
          echo "Healthcheck: $HEALTHCHECK_POSTGRES"
          {
            echo "HEALTHCHECK_POSTGRES<<EOF_HC"
            echo "$HEALTHCHECK_POSTGRES"
            echo "EOF_HC"
          } >> "$GITHUB_ENV"
          echo "-------------DS services-------------"
          docker exec onlyoffice supervisorctl status all || true
          echo "---------Installed packages----------"
          docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice" || true
          echo "--------packageType must be 1--------"
          docker exec onlyoffice curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType || true
          echo "-------------DB TLS options-------------"
          docker exec onlyoffice cat /etc/onlyoffice/documentserver/local.json

      - name: POSTGRES_TLS Start ds-example
        run: docker exec onlyoffice supervisorctl start ds:example

      - name: POSTGRES_TLS Clear puppeteer output
        run: rm -rf Dep.Tests/puppeteer/out

      - name: POSTGRES_TLS Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          jq --arg url "http://${RUNNER_IP}/example" '.testOptions.url = $url' ../config_chrome_linux.json > tmp.json
          mv tmp.json ../config_chrome_linux.json
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py ../tests/desktop/word/input/input_text.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: POSTGRES_TLS Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          python3 run.py ../tests/desktop/word/input/input_text.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: POSTGRES_TLS Parse puppeteer results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition POSTGRES

      - name: POSTGRES_TLS Documentserver logs
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: docker-local
          container: onlyoffice

      - name: POSTGRES_TLS Check DS logs for errors
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: docker-local
          container: onlyoffice
          env_var: DS_LOG_ERRORS_POSTGRES

      - name: POSTGRES_TLS Check PostgreSQL sees TLS connection from DS
        continue-on-error: true
        run: |
          echo "-------------pg_stat_ssl / pg_stat_activity-------------"
          ROWS=$(docker exec pg-tls psql -U onlyoffice -t -A -F'|' -c \
            "SELECT ssl, client_dn FROM pg_stat_ssl JOIN pg_stat_activity USING (pid) WHERE usename = 'onlyoffice';")
          echo "$ROWS"

          if echo "$ROWS" | grep -q '^t|/CN=onlyoffice_client$'; then
            echo "TLS_CONNECTION_POSTGRES_OK=true" >> $GITHUB_ENV
          else
            echo "TLS_CONNECTION_POSTGRES_OK=false" >> $GITHUB_ENV
          fi

      - name: POSTGRES_TLS Check version
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          VERSION_POSTGRES_ACTUAL=$(docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice-documentserver-ee" | awk '{print $3}' | head -n 1)
          echo "VERSION_POSTGRES_ACTUAL=$VERSION_POSTGRES_ACTUAL" >> "$GITHUB_ENV"
          if [ "$VERSION_POSTGRES_ACTUAL" = "$EXPECTED" ]; then
            echo "VERSION_POSTGRES_OK=true" >> "$GITHUB_ENV"
          else
            echo "VERSION_POSTGRES_OK=false" >> "$GITHUB_ENV"
          fi

      - name: POSTGRES_TLS Cleanup containers
        if: always()
        run: |
          docker stop onlyoffice pg-tls 2>/dev/null || true
          docker rm onlyoffice pg-tls 2>/dev/null || true

      # ==================== MYSQL_TLS ====================

      - name: MYSQL_TLS Generate TLS certificates (CA, server, client)
        run: |
          mkdir -p mysql-certs
          cd mysql-certs

          # Root CA
          openssl req -new -x509 -days 3650 -nodes -subj "/CN=test-ca" \
            -keyout ca.key -out ca.crt

          # MySQL server certificate, SAN must match DB_HOST (container name: mysql-tls)
          openssl req -new -nodes -subj "/CN=mysql-tls" \
            -addext "subjectAltName=DNS:mysql-tls" \
            -keyout server.key -out server.csr
          openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -days 3650 -copy_extensions copy -out server.crt

          # Client certificate for mTLS (verify-full)
          openssl req -new -nodes -subj "/CN=onlyoffice_client" \
            -keyout client.key -out client.csr
          openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -days 3650 -out client.crt

          chmod 644 *.crt *.key

          cat > tls.cnf <<'EOF'
          [mysqld]
          ssl-ca=/certs/ca.crt
          ssl-cert=/certs/server.crt
          ssl-key=/certs/server.key
          require_secure_transport=ON
          EOF

          echo "-------------SAN check-------------"
          openssl x509 -in server.crt -noout -text | grep -A1 "Subject Alternative Name"

      - name: MYSQL_TLS Run MySQL with TLS
        run: |
          docker run -d --name mysql-tls --network tls-network \
            -e MYSQL_ROOT_PASSWORD=StrongPass123 \
            -e MYSQL_DATABASE=onlyoffice \
            -e MYSQL_USER=onlyoffice \
            -e MYSQL_PASSWORD=StrongPass123 \
            -v "$(pwd)/mysql-certs":/certs:ro \
            -v "$(pwd)/mysql-certs/tls.cnf":/etc/mysql/conf.d/tls.cnf:ro \
            mysql:8.0

      - name: MYSQL_TLS Wait for MySQL to be ready
        run: |
          # mysqladmin ping also answers from the entrypoint's temporary
          # (--initialize-insecure) server, so wait on an authenticated
          # query instead — it only succeeds once the final server with
          # MYSQL_ROOT_PASSWORD applied is up.
          for i in $(seq 1 30); do
            if docker exec mysql-tls mysql -uroot -pStrongPass123 -e "SELECT 1" >/dev/null 2>&1; then
              echo "MySQL is ready"
              break
            fi
            echo "Attempt $i/30 — waiting for MySQL..."
            sleep 5
          done
          docker logs mysql-tls --tail 30
          docker exec mysql-tls mysql -uroot -pStrongPass123 -e "SHOW VARIABLES LIKE 'have_ssl';"
          docker exec mysql-tls mysql -uroot -pStrongPass123 -e "ALTER USER 'onlyoffice'@'%' REQUIRE X509;"
          docker exec mysql-tls mysql -uroot -pStrongPass123 -e "SHOW GRANTS FOR 'onlyoffice'@'%';"

      - name: MYSQL_TLS Prepare DS client certificates
        run: |
          mkdir -p ds-mysql-certs
          sudo cp mysql-certs/ca.crt mysql-certs/client.crt mysql-certs/client.key ds-mysql-certs/
          sudo chown "$(id -u)":"$(id -g)" ds-mysql-certs/*
          chmod 644 ds-mysql-certs/ca.crt ds-mysql-certs/client.crt
          chmod 600 ds-mysql-certs/client.key

      - name: MYSQL_TLS Docker pull and run ONLYOFFICE Docs EE with TLS_MODE
        run: |
          docker pull onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}
          docker run -d --name onlyoffice --network tls-network -p 80:80 \
            -e DB_TYPE=mysql \
            -e DB_HOST=mysql-tls \
            -e DB_PORT=3306 \
            -e DB_NAME=onlyoffice \
            -e DB_USER=onlyoffice \
            -e DB_PWD=StrongPass123 \
            -e TLS_MODE=verify-full \
            -e TLS_CA_CERT=/certs/ca.crt \
            -e TLS_CERT=/certs/client.crt \
            -e TLS_KEY=/certs/client.key \
            -e WOPI_ENABLED=true \
            -v "$(pwd)/ds-mysql-certs":/certs:ro \
            onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

      - name: MYSQL_TLS Wait for DS startup
        run: sleep 240

      - name: MYSQL_TLS INFO about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          sudo apt-get install jq -y

          echo "-------------healthcheck-------------"
          HEALTHCHECK_MYSQL=$(curl -s http://${RUNNER_IP}/healthcheck || echo "error")
          echo "Healthcheck: $HEALTHCHECK_MYSQL"
          {
            echo "HEALTHCHECK_MYSQL<<EOF_HC"
            echo "$HEALTHCHECK_MYSQL"
            echo "EOF_HC"
          } >> "$GITHUB_ENV"
          echo "-------------DS services-------------"
          docker exec onlyoffice supervisorctl status all || true
          echo "---------Installed packages----------"
          docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice" || true
          echo "--------packageType must be 1--------"
          docker exec onlyoffice curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType || true
          echo "-------------DB TLS options-------------"
          docker exec onlyoffice cat /etc/onlyoffice/documentserver/local.json

      - name: MYSQL_TLS Start ds-example
        run: docker exec onlyoffice supervisorctl start ds:example

      - name: MYSQL_TLS Clear puppeteer output
        run: rm -rf Dep.Tests/puppeteer/out

      - name: MYSQL_TLS Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          jq --arg url "http://${RUNNER_IP}/example" '.testOptions.url = $url' ../config_chrome_linux.json > tmp.json
          mv tmp.json ../config_chrome_linux.json
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py ../tests/desktop/word/input/input_text.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: MYSQL_TLS Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          python3 run.py ../tests/desktop/word/input/input_text.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: MYSQL_TLS Parse puppeteer results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition MYSQL

      - name: MYSQL_TLS Documentserver logs
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: docker-local
          container: onlyoffice

      - name: MYSQL_TLS Check DS logs for errors
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: docker-local
          container: onlyoffice
          env_var: DS_LOG_ERRORS_MYSQL

      - name: MYSQL_TLS Check MySQL sees TLS connection from DS
        continue-on-error: true
        run: |
          echo "-------------performance_schema Ssl_cipher-------------"
          ROWS=$(docker exec mysql-tls mysql -uroot -pStrongPass123 -N -e \
            "SELECT t.processlist_user, s.variable_value FROM performance_schema.status_by_thread s JOIN performance_schema.threads t ON s.thread_id = t.thread_id WHERE s.variable_name = 'Ssl_cipher' AND t.processlist_user = 'onlyoffice' AND s.variable_value <> '';")
          echo "$ROWS"

          if [ -n "$ROWS" ]; then
            echo "TLS_CONNECTION_MYSQL_OK=true" >> $GITHUB_ENV
          else
            echo "TLS_CONNECTION_MYSQL_OK=false" >> $GITHUB_ENV
          fi

      - name: MYSQL_TLS Check version
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          VERSION_MYSQL_ACTUAL=$(docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice-documentserver-ee" | awk '{print $3}' | head -n 1)
          echo "VERSION_MYSQL_ACTUAL=$VERSION_MYSQL_ACTUAL" >> "$GITHUB_ENV"
          if [ "$VERSION_MYSQL_ACTUAL" = "$EXPECTED" ]; then
            echo "VERSION_MYSQL_OK=true" >> "$GITHUB_ENV"
          else
            echo "VERSION_MYSQL_OK=false" >> "$GITHUB_ENV"
          fi

      - name: MYSQL_TLS Cleanup containers
        if: always()
        run: |
          docker stop onlyoffice mysql-tls 2>/dev/null || true
          docker rm onlyoffice mysql-tls 2>/dev/null || true

      # ==================== MARIADB_TLS ====================

      - name: MARIADB_TLS Generate TLS certificates (CA, server, client)
        run: |
          mkdir -p mariadb-certs
          cd mariadb-certs

          # Root CA
          openssl req -new -x509 -days 3650 -nodes -subj "/CN=test-ca" \
            -keyout ca.key -out ca.crt

          # MariaDB server certificate, SAN must match DB_HOST (container name: mariadb-tls)
          openssl req -new -nodes -subj "/CN=mariadb-tls" \
            -addext "subjectAltName=DNS:mariadb-tls" \
            -keyout server.key -out server.csr
          openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -days 3650 -copy_extensions copy -out server.crt

          # Client certificate for mTLS (verify-full)
          openssl req -new -nodes -subj "/CN=onlyoffice_client" \
            -keyout client.key -out client.csr
          openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -days 3650 -out client.crt

          chmod 644 *.crt *.key

          cat > tls.cnf <<'EOF'
          [mysqld]
          ssl-ca=/certs/ca.crt
          ssl-cert=/certs/server.crt
          ssl-key=/certs/server.key
          require_secure_transport=ON
          performance_schema=ON
          EOF

          echo "-------------SAN check-------------"
          openssl x509 -in server.crt -noout -text | grep -A1 "Subject Alternative Name"

      - name: MARIADB_TLS Run MariaDB with TLS
        run: |
          docker run -d --name mariadb-tls --network tls-network \
            -e MARIADB_ROOT_PASSWORD=StrongPass123 \
            -e MARIADB_DATABASE=onlyoffice \
            -e MARIADB_USER=onlyoffice \
            -e MARIADB_PASSWORD=StrongPass123 \
            -v "$(pwd)/mariadb-certs":/certs:ro \
            -v "$(pwd)/mariadb-certs/tls.cnf":/etc/mysql/conf.d/tls.cnf:ro \
            mariadb:latest

      - name: MARIADB_TLS Wait for MariaDB to be ready
        run: |
          # same two-phase entrypoint caveat as MySQL — wait on an
          # authenticated query so we don't hit the temporary server.
          for i in $(seq 1 30); do
            if docker exec mariadb-tls mariadb -uroot -pStrongPass123 -e "SELECT 1" >/dev/null 2>&1; then
              echo "MariaDB is ready"
              break
            fi
            echo "Attempt $i/30 — waiting for MariaDB..."
            sleep 5
          done
          docker logs mariadb-tls --tail 30
          docker exec mariadb-tls mariadb -uroot -pStrongPass123 -e "SHOW VARIABLES LIKE 'have_ssl';"
          docker exec mariadb-tls mariadb -uroot -pStrongPass123 -e "ALTER USER 'onlyoffice'@'%' REQUIRE X509;"
          docker exec mariadb-tls mariadb -uroot -pStrongPass123 -e "SHOW GRANTS FOR 'onlyoffice'@'%';"

      - name: MARIADB_TLS Prepare DS client certificates
        run: |
          mkdir -p ds-mariadb-certs
          sudo cp mariadb-certs/ca.crt mariadb-certs/client.crt mariadb-certs/client.key ds-mariadb-certs/
          sudo chown "$(id -u)":"$(id -g)" ds-mariadb-certs/*
          chmod 644 ds-mariadb-certs/ca.crt ds-mariadb-certs/client.crt
          chmod 600 ds-mariadb-certs/client.key

      - name: MARIADB_TLS Docker pull and run ONLYOFFICE Docs EE with TLS_MODE
        run: |
          docker pull onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}
          docker run -d --name onlyoffice --network tls-network -p 80:80 \
            -e DB_TYPE=mysql \
            -e DB_HOST=mariadb-tls \
            -e DB_PORT=3306 \
            -e DB_NAME=onlyoffice \
            -e DB_USER=onlyoffice \
            -e DB_PWD=StrongPass123 \
            -e TLS_MODE=verify-full \
            -e TLS_CA_CERT=/certs/ca.crt \
            -e TLS_CERT=/certs/client.crt \
            -e TLS_KEY=/certs/client.key \
            -e WOPI_ENABLED=true \
            -v "$(pwd)/ds-mariadb-certs":/certs:ro \
            onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

