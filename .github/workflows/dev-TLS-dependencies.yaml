          fi
          echo "Plain port closed: $PLAIN_CLOSED"

          echo "-------------TLS port must reject connections without a client certificate-------------"
          if docker exec redis-tls redis-cli --tls --cacert /certs/ca.crt -p 6380 ping 2>&1 | grep -qiE "error|certificate"; then
            NOCERT_REJECTED=true
          else
            NOCERT_REJECTED=false
          fi
          echo "No-cert connection rejected: $NOCERT_REJECTED"

          echo "-------------CLIENT LIST over mTLS (proves DS's authenticated connections)-------------"
          CLIENTS=$(docker exec redis-tls redis-cli --tls --cert /certs/client.crt --key /certs/client.key --cacert /certs/ca.crt -p 6380 -a StrongPass123 --no-auth-warning CLIENT LIST)
          echo "$CLIENTS"
          CONNECTED=$(echo "$CLIENTS" | grep -c "addr=")
          echo "Connected clients: $CONNECTED"

          if [ "$PLAIN_CLOSED" = "true" ] && [ "$NOCERT_REJECTED" = "true" ] && [ "$CONNECTED" -gt 0 ]; then
            echo "TLS_CONNECTION_REDIS_OK=true" >> $GITHUB_ENV
          else
            echo "TLS_CONNECTION_REDIS_OK=false" >> $GITHUB_ENV
          fi

      - name: REDIS_TLS Check version
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          VERSION_REDIS_ACTUAL=$(docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice-documentserver-ee" | awk '{print $3}' | head -n 1)
          echo "VERSION_REDIS_ACTUAL=$VERSION_REDIS_ACTUAL" >> "$GITHUB_ENV"
          if [ "$VERSION_REDIS_ACTUAL" = "$EXPECTED" ]; then
            echo "VERSION_REDIS_OK=true" >> "$GITHUB_ENV"
          else
            echo "VERSION_REDIS_OK=false" >> "$GITHUB_ENV"
          fi

      - name: REDIS_TLS Cleanup containers
        if: always()
        run: |
          docker stop onlyoffice redis-tls 2>/dev/null || true
          docker rm onlyoffice redis-tls 2>/dev/null || true

      # ==================== RABBITMQ_TLS ====================

      - name: RABBITMQ_TLS Generate TLS certificates (CA, server, client)
        run: |
          mkdir -p rabbitmq-certs
          cd rabbitmq-certs

          # Root CA
          openssl req -new -x509 -days 3650 -nodes -subj "/CN=test-ca" \
            -keyout ca.key -out ca.crt

          # RabbitMQ server certificate, SAN must match AMQP host (container name: rabbitmq-tls)
          openssl req -new -nodes -subj "/CN=rabbitmq-tls" \
            -addext "subjectAltName=DNS:rabbitmq-tls" \
            -keyout server.key -out server.csr
          openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -days 3650 -copy_extensions copy -out server.crt

          # Client certificate for mTLS (ssl_options.verify = verify_peer, fail_if_no_peer_cert)
          openssl req -new -nodes -subj "/CN=onlyoffice_client" \
            -keyout client.key -out client.csr
          openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -days 3650 -out client.crt

          chmod 644 *.crt *.key

          # listeners.tcp = none closes the plaintext AMQP port entirely, forcing every
          # connection through the TLS listener; fail_if_no_peer_cert enforces mTLS.
          cat > rabbitmq.conf <<'EOF'
          listeners.tcp = none
          listeners.ssl.default = 5671
          ssl_options.cacertfile = /certs/ca.crt
          ssl_options.certfile = /certs/server.crt
          ssl_options.keyfile = /certs/server.key
          ssl_options.verify = verify_peer
          ssl_options.fail_if_no_peer_cert = true
          EOF

          echo "-------------SAN check-------------"
          openssl x509 -in server.crt -noout -text | grep -A1 "Subject Alternative Name"

      - name: RABBITMQ_TLS Run RabbitMQ with TLS
        run: |
          # docker-entrypoint.sh in rabbitmq:4-management never reads RABBITMQ_ERLANG_COOKIE
          # (confirmed against upstream docker-library/rabbitmq source) — the cookie file is
          # always auto-generated on first boot by the rabbitmq user (uid/gid 999 in this
          # image) after the entrypoint chowns /var/lib/rabbitmq. On a fresh bind mount that
          # create-then-chown sequence has been unreliable on the runner and leaves the
          # cookie file unreadable (eacces) for the rabbitmq user. Pre-seed the cookie file
          # ourselves with the exact ownership/mode RabbitMQ expects so it never has to
          # create one itself.
          mkdir -p rabbitmq-data
          printf '%s' "TLSTestCookie123" | sudo tee rabbitmq-data/.erlang.cookie > /dev/null
          sudo chown 999:999 rabbitmq-data rabbitmq-data/.erlang.cookie
          sudo chmod 700 rabbitmq-data
          sudo chmod 400 rabbitmq-data/.erlang.cookie

          docker run -d --name rabbitmq-tls --network tls-network \
            -e RABBITMQ_DEFAULT_USER=onlyoffice \
            -e RABBITMQ_DEFAULT_PASS=StrongPass123 \
            -v "$(pwd)/rabbitmq-data":/var/lib/rabbitmq \
            -v "$(pwd)/rabbitmq-certs":/certs:ro \
            -v "$(pwd)/rabbitmq-certs/rabbitmq.conf":/etc/rabbitmq/conf.d/20-tls.conf:ro \
            rabbitmq:4-management

      - name: RABBITMQ_TLS Wait for RabbitMQ to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec rabbitmq-tls rabbitmq-diagnostics -q ping >/dev/null 2>&1; then
              echo "RabbitMQ is ready"
              break
            fi
            echo "Attempt $i/30 — waiting for RabbitMQ..."
            sleep 5
          done
          docker logs rabbitmq-tls --tail 30
          docker exec rabbitmq-tls rabbitmqctl status | grep -A5 "Listeners"

      - name: RABBITMQ_TLS Prepare DS client certificates
        run: |
          mkdir -p ds-rabbitmq-certs
          sudo cp rabbitmq-certs/ca.crt rabbitmq-certs/client.crt rabbitmq-certs/client.key ds-rabbitmq-certs/
          sudo chown "$(id -u)":"$(id -g)" ds-rabbitmq-certs/*
          chmod 644 ds-rabbitmq-certs/ca.crt ds-rabbitmq-certs/client.crt
          chmod 600 ds-rabbitmq-certs/client.key

      # EXPERIMENTAL: there is no confirmed precedent in this repo for RabbitMQ+TLS —
      # ActiveMQ cycles in dev-SERVER-checks.yml only use plain amqp://. This reuses the
      # generic TLS_MODE/TLS_CA_CERT/TLS_CERT/TLS_KEY vars (same as DB_TYPE/Redis cycles
      # above) alongside AMQP_TYPE=rabbitmq; adjust based on what the run/logs show.
      - name: RABBITMQ_TLS Docker pull and run ONLYOFFICE Docs EE with TLS_MODE
        run: |
          docker pull onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

          # No DB_TYPE/DB_HOST is set on purpose — DS falls back to its bundled local
          # PostgreSQL, so this cycle isolates the TLS check to the RabbitMQ connection only.
          docker run -d --name onlyoffice --network tls-network -p 80:80 \
            -e AMQP_TYPE=rabbitmq \
            -e AMQP_URI=amqps://onlyoffice:StrongPass123@rabbitmq-tls:5671 \
            -e TLS_MODE=verify-full \
            -e TLS_CA_CERT=/certs/ca.crt \
            -e TLS_CERT=/certs/client.crt \
            -e TLS_KEY=/certs/client.key \
            -e WOPI_ENABLED=true \
            -v "$(pwd)/ds-rabbitmq-certs":/certs:ro \
            onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

      - name: RABBITMQ_TLS Wait for DS startup
        run: sleep 240

      - name: RABBITMQ_TLS INFO about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          sudo apt-get install jq -y

          echo "-------------healthcheck-------------"
          HEALTHCHECK_RABBITMQ=$(curl -s http://${RUNNER_IP}/healthcheck || echo "error")
          echo "Healthcheck: $HEALTHCHECK_RABBITMQ"
          {
            echo "HEALTHCHECK_RABBITMQ<<EOF_HC"
            echo "$HEALTHCHECK_RABBITMQ"
            echo "EOF_HC"
          } >> "$GITHUB_ENV"
          echo "-------------DS services-------------"
          docker exec onlyoffice supervisorctl status all || true
          echo "---------Installed packages----------"
          docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice" || true
          echo "--------packageType must be 1--------"
          docker exec onlyoffice curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType || true
          echo "-------------RabbitMQ TLS options-------------"
          docker exec onlyoffice cat /etc/onlyoffice/documentserver/local.json

      - name: RABBITMQ_TLS Start ds-example
        run: docker exec onlyoffice supervisorctl start ds:example

      - name: RABBITMQ_TLS Clear puppeteer output
        run: rm -rf Dep.Tests/puppeteer/out

      - name: RABBITMQ_TLS Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          jq --arg url "http://${RUNNER_IP}/example" '.testOptions.url = $url' ../config_chrome_linux.json > tmp.json
          mv tmp.json ../config_chrome_linux.json
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py ../tests/desktop/word/input/input_text.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: RABBITMQ_TLS Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          python3 run.py ../tests/desktop/word/input/input_text.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: RABBITMQ_TLS Parse puppeteer results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition RABBITMQ

      - name: RABBITMQ_TLS Documentserver logs
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: docker-local
          container: onlyoffice

      - name: RABBITMQ_TLS Check DS logs for errors
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: docker-local
          container: onlyoffice
          env_var: DS_LOG_ERRORS_RABBITMQ

      - name: RABBITMQ_TLS Check RabbitMQ sees TLS connection from DS
        continue-on-error: true
        run: |
          echo "-------------rabbitmqctl list_connections (user, ssl, peer_cert_subject)-------------"
          ROWS=$(docker exec rabbitmq-tls rabbitmqctl list_connections user ssl peer_cert_subject 2>&1)
          echo "$ROWS"

          if echo "$ROWS" | grep -q "onlyoffice" && echo "$ROWS" | grep -q "true" && echo "$ROWS" | grep -q "CN=onlyoffice_client"; then
            echo "TLS_CONNECTION_RABBITMQ_OK=true" >> $GITHUB_ENV
          else
            echo "TLS_CONNECTION_RABBITMQ_OK=false" >> $GITHUB_ENV
          fi

      - name: RABBITMQ_TLS Check version
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          VERSION_RABBITMQ_ACTUAL=$(docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice-documentserver-ee" | awk '{print $3}' | head -n 1)
          echo "VERSION_RABBITMQ_ACTUAL=$VERSION_RABBITMQ_ACTUAL" >> "$GITHUB_ENV"
          if [ "$VERSION_RABBITMQ_ACTUAL" = "$EXPECTED" ]; then
            echo "VERSION_RABBITMQ_OK=true" >> "$GITHUB_ENV"
          else
            echo "VERSION_RABBITMQ_OK=false" >> "$GITHUB_ENV"
          fi

      - name: RABBITMQ_TLS Cleanup containers
        if: always()
        run: |
          docker stop onlyoffice rabbitmq-tls 2>/dev/null || true
          docker rm onlyoffice rabbitmq-tls 2>/dev/null || true

      # ==================== FINAL ====================

      - name: Final check
        if: always()
        run: |
          FAILED=0
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"

          declare -A HC_ICON HC_LABEL HC_DETAIL
          declare -A VER_ICON VER_LABEL VER_DETAIL
          declare -A PPT_ICON PPT_LABEL PPT_DETAIL
          declare -A TLS_ICON TLS_LABEL TLS_DETAIL
          declare -A DS_DETAIL

          for CYCLE in POSTGRES MYSQL MARIADB MSSQL REDIS RABBITMQ; do
            HC_VAR="HEALTHCHECK_${CYCLE}"
            if [ "${!HC_VAR}" = "true" ]; then
              HC_ICON[$CYCLE]="✅"; HC_LABEL[$CYCLE]="OK";     HC_DETAIL[$CYCLE]="${!HC_VAR}"
            else
              HC_ICON[$CYCLE]="❌"; HC_LABEL[$CYCLE]="FAILED"; HC_DETAIL[$CYCLE]="${!HC_VAR:-not set}"; FAILED=1
            fi

            VER_VAR="VERSION_${CYCLE}_ACTUAL"
            VER_ACTUAL="${!VER_VAR}"
            VEROK_VAR="VERSION_${CYCLE}_OK"
            if [ "${!VEROK_VAR}" = "true" ]; then
              VER_ICON[$CYCLE]="✅"; VER_LABEL[$CYCLE]="OK"
            else
              VER_ICON[$CYCLE]="❌"; VER_LABEL[$CYCLE]="FAILED"; FAILED=1
            fi
            VER_DETAIL[$CYCLE]="exp: ${EXPECTED}, act: ${VER_ACTUAL:-not set}"

            PPT_VAR="PUPPETEER_${CYCLE}_FAILED"
            PPTR_TOTAL="${!PPT_VAR:-999}"
            PPT_DETAIL[$CYCLE]="${PPTR_TOTAL} (threshold: 0)"
            if [ "$PPTR_TOTAL" -gt 0 ]; then
              PPT_ICON[$CYCLE]="❌"; PPT_LABEL[$CYCLE]="FAILED"; FAILED=1
            else
              PPT_ICON[$CYCLE]="✅"; PPT_LABEL[$CYCLE]="OK"
            fi

            TLSOK_VAR="TLS_CONNECTION_${CYCLE}_OK"
            if [ "${!TLSOK_VAR}" = "true" ]; then
              TLS_ICON[$CYCLE]="✅"; TLS_LABEL[$CYCLE]="OK"
            else
              TLS_ICON[$CYCLE]="❌"; TLS_LABEL[$CYCLE]="FAILED"; FAILED=1
            fi

            DSERR_VAR="DS_LOG_ERRORS_${CYCLE}"
            DS_DETAIL[$CYCLE]="${!DSERR_VAR:-0} errors"
          done

          {
            echo "## Final Check — TLS dependencies"
            echo ""
            echo "| Dependency | Healthcheck | Version | TLS connection | Puppeteer | DS Log Errors |"
            echo "|------------|-------------|---------|-----------------|-----------|----------------|"
            echo "| PostgreSQL | ${HC_ICON[POSTGRES]} ${HC_LABEL[POSTGRES]} | ${VER_ICON[POSTGRES]} \`${VER_DETAIL[POSTGRES]}\` | ${TLS_ICON[POSTGRES]} ${TLS_LABEL[POSTGRES]} | ${PPT_ICON[POSTGRES]} ${PPT_DETAIL[POSTGRES]} | ${DS_DETAIL[POSTGRES]} |"
            echo "| MySQL      | ${HC_ICON[MYSQL]} ${HC_LABEL[MYSQL]}    | ${VER_ICON[MYSQL]} \`${VER_DETAIL[MYSQL]}\`    | ${TLS_ICON[MYSQL]} ${TLS_LABEL[MYSQL]}    | ${PPT_ICON[MYSQL]} ${PPT_DETAIL[MYSQL]}    | ${DS_DETAIL[MYSQL]} |"
            echo "| MariaDB    | ${HC_ICON[MARIADB]} ${HC_LABEL[MARIADB]} | ${VER_ICON[MARIADB]} \`${VER_DETAIL[MARIADB]}\` | ${TLS_ICON[MARIADB]} ${TLS_LABEL[MARIADB]} | ${PPT_ICON[MARIADB]} ${PPT_DETAIL[MARIADB]} | ${DS_DETAIL[MARIADB]} |"
            echo "| MSSQL      | ${HC_ICON[MSSQL]} ${HC_LABEL[MSSQL]}    | ${VER_ICON[MSSQL]} \`${VER_DETAIL[MSSQL]}\`    | ${TLS_ICON[MSSQL]} ${TLS_LABEL[MSSQL]}    | ${PPT_ICON[MSSQL]} ${PPT_DETAIL[MSSQL]}    | ${DS_DETAIL[MSSQL]} |"
            echo "| Redis      | ${HC_ICON[REDIS]} ${HC_LABEL[REDIS]}    | ${VER_ICON[REDIS]} \`${VER_DETAIL[REDIS]}\`    | ${TLS_ICON[REDIS]} ${TLS_LABEL[REDIS]}    | ${PPT_ICON[REDIS]} ${PPT_DETAIL[REDIS]}    | ${DS_DETAIL[REDIS]} |"
            echo "| RabbitMQ   | ${HC_ICON[RABBITMQ]} ${HC_LABEL[RABBITMQ]} | ${VER_ICON[RABBITMQ]} \`${VER_DETAIL[RABBITMQ]}\` | ${TLS_ICON[RABBITMQ]} ${TLS_LABEL[RABBITMQ]} | ${PPT_ICON[RABBITMQ]} ${PPT_DETAIL[RABBITMQ]} | ${DS_DETAIL[RABBITMQ]} |"
            echo ""
            if [ "$FAILED" -eq 1 ]; then
              echo "> ❌ **Final check FAILED**"
            else
              echo "> ✅ **All checks passed**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          SEP="+------------+--------+--------------------------------------------+"
          for CYCLE in POSTGRES MYSQL MARIADB MSSQL REDIS RABBITMQ; do
            echo "$SEP"
            echo "$CYCLE"
            echo "$SEP"
            printf "| %-10s | %-6s | %-42s |\n" "Check" "Result" "Details"
            echo "$SEP"
            printf "| %-10s | %-6s | %-42s |\n" "Healthcheck"    "${HC_LABEL[$CYCLE]}"  "${HC_DETAIL[$CYCLE]}"
            printf "| %-10s | %-6s | %-42s |\n" "Version"        "${VER_LABEL[$CYCLE]}" "${VER_DETAIL[$CYCLE]}"
            printf "| %-10s | %-6s | %-42s |\n" "Puppeteer"      "${PPT_LABEL[$CYCLE]}" "${PPT_DETAIL[$CYCLE]}"
            printf "| %-10s | %-6s | %-42s |\n" "TLS"            "${TLS_LABEL[$CYCLE]}" ""
            printf "| %-10s | %-6s | %-42s |\n" "DS Log Errors"  ""                     "${DS_DETAIL[$CYCLE]}"
            echo "$SEP"
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "FINAL_CONCLUSION=failure" >> "$GITHUB_ENV"
            exit 1
          else
            echo "FINAL_CONCLUSION=success" >> "$GITHUB_ENV"
          fi

      - name: Save results
        if: always()
        continue-on-error: true
        env:
          EXPECTED_VERSION: ${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.DASHBOARD_BUCKET_REGION }}
        run: |
          mkdir -p .github/workflow-results
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          def cycle_data(cycle):
              return {
                  "healthy": os.environ.get(f'HEALTHCHECK_{cycle}', '') == 'true',
                  "version_expected": os.environ.get('EXPECTED_VERSION', ''),
                  "version_actual": os.environ.get(f'VERSION_{cycle}_ACTUAL', 'not set'),
                  "version_ok": os.environ.get(f'VERSION_{cycle}_OK', '') == 'true',
                  "puppeteer_failed": int(os.environ.get(f'PUPPETEER_{cycle}_FAILED', '0') or '0'),
                  "tls_connection_ok": os.environ.get(f'TLS_CONNECTION_{cycle}_OK', '') == 'true',
                  "ds_log_errors": int(os.environ.get(f'DS_LOG_ERRORS_{cycle}', '0') or '0'),
              }

          data = {
              "run_date": datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC'),
              "postgres": cycle_data("POSTGRES"),
              "mysql": cycle_data("MYSQL"),
              "mariadb": cycle_data("MARIADB"),
              "mssql": cycle_data("MSSQL"),
              "redis": cycle_data("REDIS"),
              "rabbitmq": cycle_data("RABBITMQ"),
              "conclusion": os.environ.get('FINAL_CONCLUSION', 'failure'),
          }
          path = '.github/workflow-results/dev-tls-dependencies.json'
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f"Saved: {path}")
          PYEOF

          aws s3 cp .github/workflow-results/dev-tls-dependencies.json \
            s3://${{ vars.DASHBOARD_BUCKET_NAME }}/results/dev-tls-dependencies.json \
            --region ${{ vars.DASHBOARD_BUCKET_REGION }}

      - name: Cleanup network
        if: always()
        run: docker network rm tls-network 2>/dev/null || true
