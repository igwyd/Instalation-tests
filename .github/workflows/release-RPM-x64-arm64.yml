name: release RPM x64-arm64

on:
  workflow_dispatch:

jobs:
  test-install-RPM:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            ami: ami-04331ec57720ee626
            instance_type: t2.medium
          - arch: arm64
            ami: ami-058dc7e5ef5f28287
            instance_type: t4g.medium
    name: release RPM ${{ matrix.arch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region us-east-1

      - name: Create EC2 Instance
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ matrix.ami }} \
            --instance-type ${{ matrix.instance_type }} \
            --key-name demin \
            --security-groups AllPortsOpened \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=demin_release-rpm-${{ matrix.arch }}}]' \
            --block-device-mappings '[{"DeviceName":"/dev/sda1","Ebs":{"VolumeSize":50,"VolumeType":"gp3"}}]' \
            --query "Instances[0].InstanceId" --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Waiting for instance to start..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID

      - name: Get EC2 Public IP
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --query "Reservations[].Instances[].PublicIpAddress" --output text)
          echo "EC2 Public IP: $IP"
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Wait for SSH to be Ready
        run: sleep 120

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa

      - name: Upgrade RPM packages
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          sudo dnf -y clean all
          sudo dnf -y update
          sudo dnf install wget -y
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot after upgrade
        run: sleep 180

      - name: Install ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          scp -o StrictHostKeyChecking=no rpm-check-configs/nginx.repo ec2-user@${{ env.EC2_IP }}:/home/ec2-user/nginx.repo
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          sudo cp /home/ec2-user/nginx.repo /etc/yum.repos.d/nginx.repo
          sudo yum install nginx -y
          EOF
          scp -o StrictHostKeyChecking=no rpm-check-configs/nginx.conf ec2-user@${{ env.EC2_IP }}:/home/ec2-user/nginx.conf
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          sudo cp /home/ec2-user/nginx.conf /etc/nginx/nginx.conf

          sudo yum install epel-release -y

          sudo yum install postgresql postgresql-server -y
          sudo service postgresql initdb
          sudo yum install chkconfig -y
          sudo chkconfig postgresql on
          sudo sed -i '86s/\<ident\>/scram-sha-256/;88s/\<ident\>/scram-sha-256/' /var/lib/pgsql/data/pg_hba.conf
          sudo sed -i "s/^#\?password_encryption *= *.*/password_encryption = 'scram-sha-256'/" /var/lib/pgsql/data/postgresql.conf
          sudo service postgresql restart
          cd /tmp
          sudo -i -u postgres psql -c "CREATE USER onlyoffice WITH PASSWORD 'onlyoffice';"
          sudo -i -u postgres psql -c "CREATE DATABASE onlyoffice OWNER onlyoffice;"

          sudo yum -y install redis
          sudo systemctl enable --now redis

          sudo curl -s https://packagecloud.io/install/repositories/rabbitmq/rabbitmq-server/script.rpm.sh | os=centos dist=9 sudo bash
          sudo curl -s https://packagecloud.io/install/repositories/rabbitmq/erlang/script.rpm.sh | os=centos dist=9 sudo bash
          sudo yum install rabbitmq-server -y
          sudo systemctl enable --now rabbitmq-server

          sudo yum install https://download.onlyoffice.com/repo/centos/main/noarch/onlyoffice-repo.noarch.rpm -y

          sudo yum install cabextract xorg-x11-font-utils -y
          sudo yum install fontconfig -y
          sudo rpm -i https://sourceforge.net/projects/mscorefonts2/files/rpms/msttcore-fonts-installer-2.6-1.noarch.rpm

          sudo yum install onlyoffice-documentserver-ee -y

          sudo service nginx start
          sudo systemctl enable nginx

          printf 'localhost\nonlyoffice\nonlyoffice\nonlyoffice\nlocalhost\nlocalhost\nguest\nguest\n' | sudo documentserver-configure.sh --wopienabled true

          sudo firewall-cmd --zone=public --add-port=80/tcp --permanent
          sudo firewall-cmd --reload
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF

          sudo dnf install jq -y
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo rpm -qa | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: Check DS default services EE
        continue-on-error: true
        run: |
          UNEXPECTED=$(ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            'for svc in ds-example ds-metrics ds-adminpanel; do s=$(systemctl is-enabled $svc 2>/dev/null || true); [ "$s" = "enabled" ] && echo $svc; done')
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_EE_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected enabled services after EE install: $UNEXPECTED"
            echo "SERVICES_EE_OK=false" >> $GITHUB_ENV
          fi

      - name: Check healthcheck EE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck EE: $HC"
          echo "HEALTHCHECK_EE=$HC" >> $GITHUB_ENV

      - name: Check version EE
        continue-on-error: true
        run: |
          VERSION=$(ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            "rpm -q onlyoffice-documentserver-ee --queryformat '%{VERSION}' 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_RELEASE_VERSION }}"
          echo "Version EE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_EE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_EE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_EE_ACTUAL=$VERSION" >> $GITHUB_ENV

      - name: Start ds-example EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            "sudo systemctl start ds-example"

      - name: Clear puppeteer output before EE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${{ env.EC2_IP }}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results EE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition EE

      - name: Documentserver logs ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log  /var/log/onlyoffice/documentserver/docservice/out.log  /var/log/onlyoffice/documentserver/docservice/err.log  /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log  /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log
          EOF

      - name: Check DS logs for errors EE
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ec2-user
          env_var: DS_LOG_ERRORS_EE
          label: EE

      - name: Remove ONLYOFFICE-Docs EE
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          sudo dnf remove onlyoffice-documentserver-ee -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot
        run: sleep 120

      - name: Install ONLYOFFICE-Docs DE
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          sudo dnf install onlyoffice-documentserver-de -y
          sudo service nginx start
          sudo systemctl enable nginx
          printf 'localhost\nonlyoffice\nonlyoffice\nonlyoffice\nlocalhost\nlocalhost\nguest\nguest\n' | sudo documentserver-configure.sh --wopienabled true
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo rpm -qa | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: Check DS default services DE
        continue-on-error: true
        run: |
          UNEXPECTED=$(ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            'for svc in ds-example ds-metrics ds-adminpanel; do s=$(systemctl is-enabled $svc 2>/dev/null || true); [ "$s" = "enabled" ] && echo $svc; done')
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_DE_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected enabled services after DE install: $UNEXPECTED"
            echo "SERVICES_DE_OK=false" >> $GITHUB_ENV
          fi

      - name: Check healthcheck DE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck DE: $HC"
          echo "HEALTHCHECK_DE=$HC" >> $GITHUB_ENV

      - name: Check version DE
        continue-on-error: true
        run: |
          VERSION=$(ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            "rpm -q onlyoffice-documentserver-de --queryformat '%{VERSION}' 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_RELEASE_VERSION }}"
          echo "Version DE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_DE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_DE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_DE_ACTUAL=$VERSION" >> $GITHUB_ENV

      - name: Start ds-example DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            "sudo systemctl start ds-example"

      - name: Clear puppeteer output before DE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results DE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition DE

      - name: Documentserver logs ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log  /var/log/onlyoffice/documentserver/docservice/out.log  /var/log/onlyoffice/documentserver/docservice/err.log  /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log  /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log
          EOF

      - name: Check DS logs for errors DE
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ec2-user
          env_var: DS_LOG_ERRORS_DE
          label: DE

      - name: Remove ONLYOFFICE-Docs DE
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          sudo dnf remove onlyoffice-documentserver-de -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot
        run: sleep 120

      - name: Install ONLYOFFICE-Docs CE
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          sudo dnf install onlyoffice-documentserver -y
          sudo service nginx start
          sudo systemctl enable nginx
          printf 'localhost\nonlyoffice\nonlyoffice\nonlyoffice\nlocalhost\nguest\nguest\n' | sudo documentserver-configure.sh --wopienabled true
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo rpm -qa | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: Check DS default services CE
        continue-on-error: true
        run: |
          UNEXPECTED=$(ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            'for svc in ds-example ds-metrics ds-adminpanel; do s=$(systemctl is-enabled $svc 2>/dev/null || true); [ "$s" = "enabled" ] && echo $svc; done')
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_CE_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected enabled services after CE install: $UNEXPECTED"
            echo "SERVICES_CE_OK=false" >> $GITHUB_ENV
          fi

      - name: Check healthcheck CE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck CE: $HC"
          echo "HEALTHCHECK_CE=$HC" >> $GITHUB_ENV

      - name: Check version CE
        continue-on-error: true
        run: |
          VERSION=$(ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            "rpm -q onlyoffice-documentserver --queryformat '%{VERSION}' 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_RELEASE_VERSION }}"
          echo "Version CE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_CE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_CE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_CE_ACTUAL=$VERSION" >> $GITHUB_ENV

      - name: Start ds-example CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} \
            "sudo systemctl start ds-example"

      - name: Clear puppeteer output before CE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results CE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition CE

      - name: Documentserver logs ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log  /var/log/onlyoffice/documentserver/docservice/out.log  /var/log/onlyoffice/documentserver/docservice/err.log  /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log  /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log
          EOF

      - name: Check DS logs for errors CE
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ec2-user
          env_var: DS_LOG_ERRORS_CE
          label: CE

      - name: Remove ONLYOFFICE-Docs CE
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ env.EC2_IP }} << EOF
          sudo dnf remove onlyoffice-documentserver -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Final check
        if: always()
        run: |
          FAILED=0

          echo "=== Version results ==="
          EXPECTED="${{ vars.ONLYOFFICE_RELEASE_VERSION }}"
          echo "Expected version: $EXPECTED"
          for VAR in VERSION_EE_OK VERSION_DE_OK VERSION_CE_OK; do
            VAL="${!VAR}"
            ACTUAL_VAR="${VAR/_OK/_ACTUAL}"
            ACTUAL="${!ACTUAL_VAR}"
            echo "$VAR: ${VAL:-not set} (actual: ${ACTUAL:-not set})"
            if [ "${VAL}" != "true" ]; then
              echo "$VAR FAILED"
              FAILED=1
            fi
          done

          echo "=== Healthcheck results ==="
          for VAR in HEALTHCHECK_EE HEALTHCHECK_DE HEALTHCHECK_CE; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-not set}"
            if [ "${VAL}" != "true" ]; then
              echo "$VAR FAILED"
              FAILED=1
            fi
          done

          echo "=== DS services check ==="
          for VAR in SERVICES_EE_OK SERVICES_DE_OK SERVICES_CE_OK; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-not set}"
            if [ "${VAL}" != "true" ]; then
              echo "$VAR FAILED — unexpected services enabled after install"
              FAILED=1
            fi
          done

          echo "=== Puppeteer results ==="
          for VAR in PUPPETEER_EE_FAILED PUPPETEER_DE_FAILED PUPPETEER_CE_FAILED; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-0}"
            if [ "${VAL:-0}" -gt 5 ]; then
              echo "$VAR FAILED (threshold: 5)"
              FAILED=1
            else
              echo "$VAR OK (${VAL:-0} failures, threshold: 5)"
            fi
          done

          echo "=== DS log errors ==="
          for VAR in DS_LOG_ERRORS_EE DS_LOG_ERRORS_DE DS_LOG_ERRORS_CE; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-0}"
            if [ "${VAL:-0}" -gt 0 ]; then
              echo "$VAR FAILED"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Delete EC2 Instance
        run: |
          aws ec2 terminate-instances --instance-ids ${{ env.INSTANCE_ID }}
          aws ec2 wait instance-terminated --instance-ids ${{ env.INSTANCE_ID }}
