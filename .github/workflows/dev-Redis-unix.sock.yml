name: dev Redis unix.sock x64

on:
  schedule:
    - cron: '0 14 * * 3'  # Wednesday 17:00 Mosсow time (UTC+3)
  workflow_dispatch:

jobs:
  test-dev-Redis-unix-sock:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        driver: [redis, ioredis]
        include:
          - driver: redis
            container: ds-redis-sock
            config: redis/redis-unix-sock/local-production-linux.json
          - driver: ioredis
            container: ds-ioredis-sock
            config: redis/ioredis-unix-sock/local-production-linux.json

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Get runner IP
        id: runner_ip
        run: |
          IP=$(ip route get 1 | awk '{print $7}')
          echo "RUNNER_IP=$IP" >> $GITHUB_ENV
          echo "Runner IP is $IP"

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Docker run ONLYOFFICE-Docs EE for test ${{ matrix.driver }}
        run: |
          docker run -itd -p 80:80 -e WOPI_ENABLED=true --name ${{ matrix.container }} onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}
          sleep 180
          echo "-------------healthcheck-------------"
          curl -s http://${RUNNER_IP}/healthcheck; echo

      - name: Check DS default services
        continue-on-error: true
        run: |
          UNEXPECTED=$(docker exec ${{ matrix.container }} supervisorctl status all | grep RUNNING | grep -vE 'ds:converter|ds:docservice' || true)
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected running services: $UNEXPECTED"
            echo "SERVICES_OK=false" >> $GITHUB_ENV
          fi

      - name: Change ${{ matrix.driver }} unix.sock configuration
        run: |
          echo "------------ STOP DS services -------------"
          docker exec ${{ matrix.container }} supervisorctl stop all

          echo "------------ Setup unix.sock and STOP redis server -------------"
          docker exec ${{ matrix.container }} bash -c "
            sed -i 's/^port .*/port 0/' /etc/redis/redis.conf
            echo 'unixsocket /run/redis/redis-server.sock' >> /etc/redis/redis.conf
            echo 'unixsocketperm 777' >> /etc/redis/redis.conf
            pkill -f 'redis-server'
          "
          sleep 10
          echo "------------ START REDIS server -------------"
          docker exec ${{ matrix.container }} service redis-server start
          echo "------------ Redis ping -------------"
          docker exec ${{ matrix.container }} redis-cli -s /run/redis/redis-server.sock ping
          echo "------------ Redis ps -------------"
          docker exec ${{ matrix.container }} ps -aux | grep -i redis
          echo "------------ Redis port 6379 must be closed -------------"
          docker exec ${{ matrix.container }} netstat -tulpn

          echo "------------ Copy DS local-production-linux.json config -------------"
          docker cp ${{ matrix.config }} ${{ matrix.container }}:/etc/onlyoffice/documentserver/local-production-linux.json
          docker exec ${{ matrix.container }} cat /etc/onlyoffice/documentserver/local-production-linux.json
          echo "------------ START DS services -------------"
          docker exec ${{ matrix.container }} supervisorctl start ds:converter ds:docservice
          sleep 10

      - name: Check healthcheck and socket configuration
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${RUNNER_IP}/healthcheck" || echo "error")
          echo "Healthcheck: $HC"
          echo "HEALTHCHECK_RESULT=$HC" >> $GITHUB_ENV

          PING=$(docker exec ${{ matrix.container }} redis-cli -s /run/redis/redis-server.sock ping 2>/dev/null || echo "error")
          echo "Redis socket ping: $PING"
          if [ "$PING" = "PONG" ]; then
            echo "REDIS_SOCK_OK=true" >> $GITHUB_ENV
          else
            echo "REDIS_SOCK_OK=false" >> $GITHUB_ENV
          fi

          PORT_CHECK=$(docker exec ${{ matrix.container }} netstat -tulpn 2>/dev/null | grep ':6379' || echo "")
          echo "Port 6379 check: '${PORT_CHECK}'"
          if [ -z "$PORT_CHECK" ]; then
            echo "PORT_6379_CLOSED=true" >> $GITHUB_ENV
          else
            echo "PORT_6379_CLOSED=false" >> $GITHUB_ENV
          fi

      - name: INFO about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          echo "-------------healthcheck-------------"
          curl -s http://${RUNNER_IP}/healthcheck; echo
          echo "-------------DS services-------------"
          docker exec ${{ matrix.container }} supervisorctl status all || true
          echo "---------Installed packages----------"
          docker exec ${{ matrix.container }} bash -c "dpkg -l | grep onlyoffice"
          echo "--------packageType--------"
          docker exec ${{ matrix.container }} curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          output=$(curl -s http://${RUNNER_IP}/hosting/discovery)
          if echo "$output" | grep -q 'value='; then
            echo "$output" | grep -o 'value="[^"]*"' | head -n 5 | cut -c1-100
          else
            echo "$output"
          fi

      - name: Start ds-example
        continue-on-error: true
        run: docker exec ${{ matrix.container }} supervisorctl start ds:example

      - name: Puppeteer API tests with ${{ matrix.driver }}
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${RUNNER_IP}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests with ${{ matrix.driver }}
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Check DS logs for errors ${{ matrix.driver }}
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: docker-local
          container: ${{ matrix.container }}
          env_var: DS_LOG_ERRORS
          label: ${{ matrix.driver }}

      - name: Documentserver logs and remove ${{ matrix.driver }} container
        run: |
          docker logs -n 1000 ${{ matrix.container }}
          docker rm -fv ${{ matrix.container }}

      - name: Parse puppeteer results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py

      - name: Final check
        if: always()
        run: |
          FAILED=0

          echo "=== Healthcheck ==="
          echo "Healthcheck: ${HEALTHCHECK_RESULT:-not set}"
          if [ "${HEALTHCHECK_RESULT}" != "true" ]; then
            echo "Healthcheck FAILED"
            FAILED=1
          fi

          echo "=== Redis socket ==="
          echo "Redis socket ping: ${REDIS_SOCK_OK:-not set}"
          if [ "${REDIS_SOCK_OK}" != "true" ]; then
            echo "Redis socket check FAILED"
            FAILED=1
          fi

          echo "=== Port 6379 ==="
          echo "Port 6379 closed: ${PORT_6379_CLOSED:-not set}"
          if [ "${PORT_6379_CLOSED}" != "true" ]; then
            echo "Port 6379 is not closed!"
            FAILED=1
          fi

          echo "=== DS services check ==="
          echo "Services OK: ${SERVICES_OK:-not set}"
          if [ "${SERVICES_OK}" != "true" ]; then
            echo "DS services check FAILED — unexpected services running after install"
            FAILED=1
          fi

          echo "=== Puppeteer results ==="
          echo "Puppeteer API  failed: ${PUPPETEER_API_FAILED:-0}"
          echo "Puppeteer WOPI failed: ${PUPPETEER_WOPI_FAILED:-0}"
          echo "Puppeteer total failed: ${PUPPETEER_FAILED:-0}"
          if [ "${PUPPETEER_FAILED:-0}" -gt 5 ]; then
            echo "Too many puppeteer failures: ${PUPPETEER_FAILED} (threshold: 5)"
            FAILED=1
          else
            echo "Puppeteer tests OK: ${PUPPETEER_FAILED:-0} failures (threshold: 5)"
          fi

          echo "=== DS log errors ==="
          echo "DS log errors: ${DS_LOG_ERRORS:-0}"
          if [ "${DS_LOG_ERRORS:-0}" -gt 0 ]; then
            echo "DS log errors FAILED"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
