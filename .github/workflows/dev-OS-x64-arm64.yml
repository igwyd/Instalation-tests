name: dev OS x64-arm64

on:
  schedule:
    - cron: '0 11 * * 3'  # Wednesday 14:00 Moscow time (UTC+3)
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    name: ${{ matrix.os_name }} ${{ matrix.arch }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04
          - os_name: Ubuntu 22.04
            os_type: deb
            ssh_user: ubuntu
            device_name: /dev/sda1
            arch: x64
            ami: ami-0030e4319cbf4dbf2
            instance_type: t2.medium
            tag: dev-ubuntu2204-x64

          - os_name: Ubuntu 22.04
            os_type: deb
            ssh_user: ubuntu
            device_name: /dev/sda1
            arch: arm64
            ami: ami-03dc355fadfbaaf26
            instance_type: t4g.medium
            tag: dev-ubuntu2204-arm64

          # Debian 12
          - os_name: Debian 12
            os_type: deb
            ssh_user: admin
            device_name: /dev/xvda
            arch: x64
            ami: ami-095f312bef9bfe5b1
            instance_type: t2.medium
            tag: dev-debian12-x64

          - os_name: Debian 12
            os_type: deb
            ssh_user: admin
            device_name: /dev/xvda
            arch: arm64
            ami: ami-04308cee1a3c8bb1c
            instance_type: t4g.medium
            tag: dev-debian12-arm64

          # Debian 13
          - os_name: Debian 13
            os_type: deb
            ssh_user: admin
            device_name: /dev/xvda
            arch: x64
            ami: ami-023a5c1706f994759
            instance_type: t2.medium
            tag: dev-debian13-x64

          - os_name: Debian 13
            os_type: deb
            ssh_user: admin
            device_name: /dev/xvda
            arch: arm64
            ami: ami-040945d6282a26609
            instance_type: t4g.medium
            tag: dev-debian13-arm64

          # CentOS 10 stream
          - os_name: CentOS 10
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: x64
            ami: ami-011969aa4b0fec8fe
            instance_type: t2.medium
            tag: dev-centos10-x64

          - os_name: CentOS 10
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: arm64
            ami: ami-0da965a0c246cec33
            instance_type: t4g.medium
            tag: dev-centos10-arm64

          # RHEL 8
          - os_name: RHEL 8
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: x64
            ami: ami-06ab04dfd55c423e4
            instance_type: t2.medium
            tag: dev-rhel8-x64

          - os_name: RHEL 8
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: arm64
            ami: ami-088bb968ff4a01d7a
            instance_type: t4g.medium
            tag: dev-rhel8-arm64

          # RHEL 9
          - os_name: RHEL 9
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: x64
            ami: ami-0d8d3b1122e36c000
            instance_type: t2.medium
            tag: dev-rhel9-x64

          - os_name: RHEL 9
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: arm64
            ami: ami-0734d5fad59e3ba53
            instance_type: t4g.medium
            tag: dev-rhel9-arm64

          # RHEL 10
          - os_name: RHEL 10
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: x64
            ami: ami-0ad50334604831820
            instance_type: t2.medium
            tag: dev-rhel10-x64

          - os_name: RHEL 10
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: arm64
            ami: ami-02d5b54ba15715d30
            instance_type: t4g.medium
            tag: dev-rhel10-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Initialize check defaults
        run: |
          echo "DOCKER_HEALTHY=false" >> $GITHUB_ENV
          echo "DOCKER_VERSION_OK=false" >> $GITHUB_ENV
          echo "NATIVE_HEALTHY=false" >> $GITHUB_ENV
          echo "NATIVE_VERSION_OK=false" >> $GITHUB_ENV
          echo "PUPPETEER_TOTAL_FAILED=0" >> $GITHUB_ENV
          echo "DS_LOG_ERRORS_DOCKER=0" >> $GITHUB_ENV
          echo "DS_LOG_ERRORS_NATIVE=0" >> $GITHUB_ENV

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region us-east-1

      - name: Create EC2 Instance
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ matrix.ami }} \
            --instance-type ${{ matrix.instance_type }} \
            --key-name demin \
            --security-groups AllPortsOpened \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=demin_${{ matrix.tag }}}]' \
            --block-device-mappings '[{"DeviceName":"${{ matrix.device_name }}","Ebs":{"VolumeSize":50,"VolumeType":"gp3"}}]' \
            --query "Instances[0].InstanceId" --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Waiting for instance to start..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID

      - name: Get EC2 Public IP
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --query "Reservations[].Instances[].PublicIpAddress" --output text)
          echo "EC2 Public IP: $IP"
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Wait for SSH to be Ready
        run: sleep 120

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa

      - name: Upgrade packages
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          if command -v apt-get &>/dev/null; then
            sudo apt-get update && sudo apt-get upgrade -y
          else
            sudo dnf -y clean all && sudo dnf -y update
          fi
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot after upgrade
        run: sleep 180

      # ==================== Docker install (printf "y") ====================
      - name: Download install script
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          curl -O https://download.onlyoffice.com/docs/docs-enterprise-install.sh
          sudo chmod +x docs-enterprise-install.sh
          EOF

      - name: Install ONLYOFFICE Docs in Docker
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << EOF
          printf "y\n" | sudo bash docs-enterprise-install.sh --documentimage onlyoffice/4testing-documentserver-ee --documentversion ${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }} --skiphardwarecheck true
          EOF

      - name: Wait for Docker install to start
        run: sleep 300

      - name: Check DS default services Docker install
        continue-on-error: true
        run: |
          UNEXPECTED=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'sudo docker exec $(sudo docker ps -q --filter "name=onlyoffice") supervisorctl status all' | grep RUNNING | grep -vE 'ds:converter|ds:docservice' || true)
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_DOCKER_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected running services Docker: $UNEXPECTED"
            echo "SERVICES_DOCKER_OK=false" >> $GITHUB_ENV
          fi

      - name: Healthcheck Docker install
        continue-on-error: true
        run: |
          RESULT=$(curl -s http://${{ env.EC2_IP }}/healthcheck)
          echo "Healthcheck result: $RESULT"
          if [ "$RESULT" = "true" ]; then
            echo "DOCKER_HEALTHY=true" >> $GITHUB_ENV
          else
            echo "DOCKER_HEALTHY=false" >> $GITHUB_ENV
          fi

      - name: Check version Docker install
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          ACTUAL=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'sudo docker exec $(sudo docker ps -q --filter "name=onlyoffice") dpkg-query -W onlyoffice-documentserver-ee' | awk '{print $2}')
          echo "Expected version: $EXPECTED"
          echo "Actual version: $ACTUAL"
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            echo "DOCKER_VERSION_OK=true" >> $GITHUB_ENV
          else
            echo "DOCKER_VERSION_OK=false" >> $GITHUB_ENV
          fi

      - name: Documentserver logs Docker install
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          sudo docker logs $(sudo docker ps -q --filter "name=onlyoffice") 2>&1 | tail -n 1000 || true
          EOF

      - name: Check DS logs for errors Docker install
        continue-on-error: true
        run: |
          ERRORS=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'sudo docker exec $(sudo docker ps -q --filter "name=onlyoffice") bash -c "grep -Ph \"\\[ERROR\\]|(?i)(typeerror|failed to load|load error)\" /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/nginx.error.log 2>/dev/null | wc -l"' 2>/dev/null || echo "0")
          echo "DS log errors Docker: $ERRORS"
          echo "DS_LOG_ERRORS_DOCKER=$ERRORS" >> $GITHUB_ENV

      - name: Start ds:example Docker install
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'sudo docker exec $(sudo docker ps -q --filter "name=onlyoffice") supervisorctl start ds:example'

      - name: Clear puppeteer output before Docker tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests Docker install
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${{ env.EC2_IP }}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests Docker install
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results Docker
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition DOCKER

      - name: Remove Docker containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          sudo docker rm -f $(sudo docker ps -aq) 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          EOF

      # ==================== Native install (printf "n") ====================
      - name: Install ONLYOFFICE Docs natively
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          printf "n\n" | sudo bash docs-enterprise-install.sh --skiphardwarecheck true
          EOF

      - name: Add dev repo
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << EOF
          if [ "${{ matrix.os_type }}" = "deb" ]; then
            echo "deb [trusted=yes] https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/repo/debian stable ${{ vars.ONLYOFFICE_DEV_VERSION }}" | sudo tee /etc/apt/sources.list.d/onlyoffice-dev.list
            sudo apt-get update
          else
            sudo dnf config-manager --add-repo https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/repo/centos/onlyoffice-dev-${{ vars.ONLYOFFICE_DEV_VERSION }}.repo
          fi
          EOF

      - name: Install ONLYOFFICE Docs EE dev version
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << EOF
          if [ "${{ matrix.os_type }}" = "deb" ]; then
            sudo apt-get install onlyoffice-documentserver-ee=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          else
            sudo dnf install onlyoffice-documentserver-ee-${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}.el7 -y
          fi
          EOF

      - name: Wait for native install to start
        run: sleep 10

      - name: Check DS default services native install
        continue-on-error: true
        run: |
          UNEXPECTED=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'for svc in ds-example ds-metrics ds-adminpanel; do s=$(systemctl is-enabled $svc 2>/dev/null || true); [ "$s" = "enabled" ] && echo $svc; done')
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_NATIVE_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected enabled services native: $UNEXPECTED"
            echo "SERVICES_NATIVE_OK=false" >> $GITHUB_ENV
          fi

      - name: Healthcheck native install
        continue-on-error: true
        run: |
          RESULT=$(curl -s http://${{ env.EC2_IP }}/healthcheck)
          echo "Healthcheck result: $RESULT"
          if [ "$RESULT" = "true" ]; then
            echo "NATIVE_HEALTHY=true" >> $GITHUB_ENV
          else
            echo "NATIVE_HEALTHY=false" >> $GITHUB_ENV
          fi

      - name: Check version native install
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          if [ "${{ matrix.os_type }}" = "deb" ]; then
            ACTUAL=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'dpkg-query -W onlyoffice-documentserver-ee' | awk '{print $2}')
          else
            ACTUAL=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'rpm -q --qf "%{VERSION}-%{RELEASE}" onlyoffice-documentserver-ee' | sed 's/\.el[0-9]*//')
          fi
          echo "Expected version: $EXPECTED"
          echo "Actual version: $ACTUAL"
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            echo "NATIVE_VERSION_OK=true" >> $GITHUB_ENV
          else
            echo "NATIVE_VERSION_OK=false" >> $GITHUB_ENV
          fi

      - name: Documentserver logs native install
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          sudo tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log
          EOF

      - name: Check DS logs for errors native install
        continue-on-error: true
        run: |
          ERRORS=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'sudo grep -Ph "\[ERROR\]|(?i)(typeerror|failed to load|load error)" /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/nginx.error.log 2>/dev/null | wc -l' 2>/dev/null || echo "0")
          echo "DS log errors native: $ERRORS"
          echo "DS_LOG_ERRORS_NATIVE=$ERRORS" >> $GITHUB_ENV

      - name: Start ds:example native install
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'sudo systemctl start ds-example || true'

      - name: Clear puppeteer output before Native tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests Native install
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests Native install
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results Native
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition NATIVE

      # ==================== Final check + Cleanup ====================
      - name: Final check
        if: always()
        run: |
          FAILED=0

          echo "=== Docker healthcheck ==="
          echo "Docker healthy: ${DOCKER_HEALTHY:-not set}"
          if [ "${DOCKER_HEALTHY}" != "true" ]; then
            echo "Docker healthcheck FAILED"
            FAILED=1
          else
            echo "Docker healthcheck passed"
          fi

          echo "=== Docker version ==="
          echo "Docker version OK: ${DOCKER_VERSION_OK:-not set}"
          if [ "${DOCKER_VERSION_OK}" != "true" ]; then
            echo "Docker version check FAILED"
            FAILED=1
          else
            echo "Docker version check passed"
          fi

          echo "=== Native healthcheck ==="
          echo "Native healthy: ${NATIVE_HEALTHY:-not set}"
          if [ "${NATIVE_HEALTHY}" != "true" ]; then
            echo "Native healthcheck FAILED"
            FAILED=1
          else
            echo "Native healthcheck passed"
          fi

          echo "=== Native version ==="
          echo "Native version OK: ${NATIVE_VERSION_OK:-not set}"
          if [ "${NATIVE_VERSION_OK}" != "true" ]; then
            echo "Native version check FAILED"
            FAILED=1
          else
            echo "Native version check passed"
          fi

          echo "=== DS services check ==="
          echo "Services Docker OK: ${SERVICES_DOCKER_OK:-not set}"
          if [ "${SERVICES_DOCKER_OK}" != "true" ]; then
            echo "Docker services check FAILED — unexpected services running after install"
            FAILED=1
          fi
          echo "Services Native OK: ${SERVICES_NATIVE_OK:-not set}"
          if [ "${SERVICES_NATIVE_OK}" != "true" ]; then
            echo "Native services check FAILED — unexpected services enabled after install"
            FAILED=1
          fi

          echo "=== Puppeteer results ==="
          echo "Puppeteer Docker  failed: ${PUPPETEER_DOCKER_FAILED:-0}"
          echo "Puppeteer Native  failed: ${PUPPETEER_NATIVE_FAILED:-0}"
          echo "Puppeteer total   failed: ${PUPPETEER_TOTAL_FAILED:-0}"
          if [ "${PUPPETEER_TOTAL_FAILED:-0}" -gt 5 ]; then
            echo "Too many puppeteer failures: ${PUPPETEER_TOTAL_FAILED} (threshold: 5)"
            FAILED=1
          else
            echo "Puppeteer tests OK: ${PUPPETEER_TOTAL_FAILED:-0} failures (threshold: 5)"
          fi

          echo "=== DS log errors ==="
          echo "DS log errors Docker: ${DS_LOG_ERRORS_DOCKER:-0}"
          echo "DS log errors Native: ${DS_LOG_ERRORS_NATIVE:-0}"

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Instance: ${{ env.INSTANCE_ID }}, IP: ${{ env.EC2_IP }}, Tag: ${{ matrix.tag }}"
            exit 1
          fi

      - name: Delete EC2 Instance
        if: always()
        run: |
          aws ec2 terminate-instances --instance-ids ${{ env.INSTANCE_ID }}
          aws ec2 wait instance-terminated --instance-ids ${{ env.INSTANCE_ID }}
