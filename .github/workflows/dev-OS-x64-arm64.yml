name: dev OS x64-arm64

on:
  schedule:
    - cron: '0 11 * * 3'  # Wednesday 14:00 Moscow time (UTC+3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-24.04
    name: ${{ matrix.os_name }} ${{ matrix.arch }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 26.04
          - os_name: Ubuntu 26.04
            os_type: deb
            ssh_user: ubuntu
            device_name: /dev/sda1
            arch: x64
            ami: ami-091138d0f0d41ff90
            instance_type: t2.medium
            tag: dev-ubuntu2604-x64

          - os_name: Ubuntu 26.04
            os_type: deb
            ssh_user: ubuntu
            device_name: /dev/sda1
            arch: arm64
            ami: ami-07ad186bc37b8dac4
            instance_type: t4g.medium
            tag: dev-ubuntu2604-arm64

          # Debian 12
          - os_name: Debian 12
            os_type: deb
            ssh_user: admin
            device_name: /dev/xvda
            arch: x64
            ami: ami-095f312bef9bfe5b1
            instance_type: t2.medium
            tag: dev-debian12-x64

          - os_name: Debian 12
            os_type: deb
            ssh_user: admin
            device_name: /dev/xvda
            arch: arm64
            ami: ami-04308cee1a3c8bb1c
            instance_type: t4g.medium
            tag: dev-debian12-arm64

          # Debian 13
          - os_name: Debian 13
            os_type: deb
            ssh_user: admin
            device_name: /dev/xvda
            arch: x64
            ami: ami-023a5c1706f994759
            instance_type: t2.medium
            tag: dev-debian13-x64

          - os_name: Debian 13
            os_type: deb
            ssh_user: admin
            device_name: /dev/xvda
            arch: arm64
            ami: ami-040945d6282a26609
            instance_type: t4g.medium
            tag: dev-debian13-arm64

          # CentOS 10 stream
          - os_name: CentOS 10
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: x64
            ami: ami-011969aa4b0fec8fe
            instance_type: t2.medium
            tag: dev-centos10-x64

          - os_name: CentOS 10
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: arm64
            ami: ami-0da965a0c246cec33
            instance_type: t4g.medium
            tag: dev-centos10-arm64

          # RHEL 8
          - os_name: RHEL 8
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: x64
            ami: ami-06ab04dfd55c423e4
            instance_type: t2.medium
            tag: dev-rhel8-x64

          - os_name: RHEL 8
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: arm64
            ami: ami-088bb968ff4a01d7a
            instance_type: t4g.medium
            tag: dev-rhel8-arm64

          # RHEL 9
          - os_name: RHEL 9
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: x64
            ami: ami-0d8d3b1122e36c000
            instance_type: t2.medium
            tag: dev-rhel9-x64

          - os_name: RHEL 9
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: arm64
            ami: ami-0734d5fad59e3ba53
            instance_type: t4g.medium
            tag: dev-rhel9-arm64

          # RHEL 10
          - os_name: RHEL 10
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: x64
            ami: ami-0ad50334604831820
            instance_type: t2.medium
            tag: dev-rhel10-x64

          - os_name: RHEL 10
            os_type: rpm
            ssh_user: ec2-user
            device_name: /dev/sda1
            arch: arm64
            ami: ami-02d5b54ba15715d30
            instance_type: t4g.medium
            tag: dev-rhel10-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Initialize check defaults
        run: |
          echo "DOCKER_HEALTHY=false" >> $GITHUB_ENV
          echo "DOCKER_VERSION_OK=false" >> $GITHUB_ENV
          echo "NATIVE_HEALTHY=false" >> $GITHUB_ENV
          echo "NATIVE_VERSION_OK=false" >> $GITHUB_ENV
          echo "PUPPETEER_TOTAL_FAILED=0" >> $GITHUB_ENV
          echo "DS_LOG_ERRORS_DOCKER=0" >> $GITHUB_ENV
          echo "DS_LOG_ERRORS_NATIVE=0" >> $GITHUB_ENV

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region us-east-1

      - name: Create EC2 Instance
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ matrix.ami }} \
            --instance-type ${{ matrix.instance_type }} \
            --key-name demin \
            --security-groups AllPortsOpened \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=demin_${{ matrix.tag }}}]' \
            --block-device-mappings '[{"DeviceName":"${{ matrix.device_name }}","Ebs":{"VolumeSize":50,"VolumeType":"gp3"}}]' \
            --query "Instances[0].InstanceId" --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Waiting for instance to start..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID

      - name: Get EC2 Public IP
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --query "Reservations[].Instances[].PublicIpAddress" --output text)
          echo "EC2 Public IP: $IP"
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Wait for SSH to be Ready
        run: sleep 120

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa

      - name: Upgrade packages
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          if command -v apt-get &>/dev/null; then
            for i in 1 2 3; do
              sudo apt-get update && sudo apt-get upgrade -y && break
              if [ $i -lt 3 ]; then
                echo "Attempt $i failed, retrying in 30s..."
                sleep 30
              else
                echo "All attempts failed"
                exit 1
              fi
            done
          else
            sudo dnf -y clean all && sudo dnf -y update
          fi
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot after upgrade
        run: sleep 180

      # ==================== Docker install (printf "y") ====================
      - name: Download install script
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          curl -O https://download.onlyoffice.com/docs/docs-enterprise-install.sh
          sudo chmod +x docs-enterprise-install.sh
          EOF

      - name: Install ONLYOFFICE Docs in Docker
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << EOF
          printf "y\n" | sudo bash docs-enterprise-install.sh --documentimage onlyoffice/4testing-documentserver-ee \
            --documentversion ${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }} \
            --skiphardwarecheck true \
            --wopienabled true
          EOF

      - name: TEMP Workaround for Docker install issues
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << EOF
          sudo docker run -i -t -d -p 80:80 --name onlyoffice \
            -e WOPI_ENABLED=true onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}
          EOF

      - name: Wait for Docker install to start
        run: sleep 300

      - name: INFO Docker install
        continue-on-error: true
        run: |
          echo "=== Docker containers ==="
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'sudo docker ps'

          echo "=== Docker version ==="
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'sudo docker version'

          echo "=== Healthcheck ==="
          RESULT=$(curl -s http://${{ env.EC2_IP }}/healthcheck)
          echo "Healthcheck result: $RESULT"
          if [ "$RESULT" = "true" ]; then
            echo "DOCKER_HEALTHY=true" >> $GITHUB_ENV
          else
            echo "DOCKER_HEALTHY=false" >> $GITHUB_ENV
          fi

      - name: Check version Docker install
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          ACTUAL=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'sudo docker exec $(sudo docker ps -q --filter "name=onlyoffice") dpkg-query -W onlyoffice-documentserver-ee' | awk '{print $2}')
          echo "Expected version: $EXPECTED"
          echo "Actual version: $ACTUAL"
          echo "DOCKER_VERSION_ACTUAL=$ACTUAL" >> $GITHUB_ENV
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            echo "DOCKER_VERSION_OK=true" >> $GITHUB_ENV
          else
            echo "DOCKER_VERSION_OK=false" >> $GITHUB_ENV
          fi

      - name: Get DS container ID for Docker install check
        id: ds-container
        run: |
          CONTAINER_ID=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'sudo docker ps -q --filter "name=onlyoffice"')
          echo "id=$CONTAINER_ID" >> $GITHUB_OUTPUT

      - name: Start ds:example Docker install
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'sudo docker exec $(sudo docker ps -q --filter "name=onlyoffice") supervisorctl start ds:example'

      - name: Clear puppeteer output before Docker tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests Docker install
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${{ env.EC2_IP }}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests Docker install
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results Docker
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition DOCKER

      - name: LOGS Documentserver Docker install
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: ssh-docker
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ${{ matrix.ssh_user }}
          container: ${{ steps.ds-container.outputs.id }}

      - name: Check DS logs for errors Docker install
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-docker
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ${{ matrix.ssh_user }}
          container: ${{ steps.ds-container.outputs.id }}
          env_var: DS_LOG_ERRORS_DOCKER
          label: Docker

      - name: Remove Docker containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          sudo docker rm -f $(sudo docker ps -aq) 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          EOF

      - name: TEST docker cleanup
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'sudo docker ps -a'

      # ==================== Native install (printf "n") ====================
      - name: Install ONLYOFFICE Docs natively RELEASE version
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << 'EOF'
          printf "n\n" | sudo bash docs-enterprise-install.sh --skiphardwarecheck true --wopienabled true
          EOF

      - name: INFO native install RELEASE
        continue-on-error: true
        run: |
          echo "----------Healthcheck----------"
          RESULT=$(curl -s http://${{ env.EC2_IP }}/healthcheck)
          echo "Healthcheck result: $RESULT"
          if [ "$RESULT" = "true" ]; then
            echo "NATIVE_HEALTHY=true" >> $GITHUB_ENV
          else
            echo "NATIVE_HEALTHY=false" >> $GITHUB_ENV
          fi

          echo "---------Installed packages----------"
          if [ "${{ matrix.os_type }}" = "deb" ]; then
            ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
              'dpkg-query -l | grep onlyoffice-documentserver'
          else
            ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
              'rpm -qa | grep onlyoffice-documentserver'
          fi

          echo "---------Services started----------"
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'sudo systemctl list-unit-files --type=service | grep ds-'

      - name: Add dev repo
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << EOF
          if [ "${{ matrix.os_type }}" = "deb" ]; then
            echo "deb [trusted=yes] https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/repo/debian stable ${{ vars.ONLYOFFICE_DEV_VERSION }}" | sudo tee /etc/apt/sources.list.d/onlyoffice-dev.list
            sudo apt-get update
          else
            sudo dnf config-manager --add-repo https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/repo/centos/onlyoffice-dev-${{ vars.ONLYOFFICE_DEV_VERSION }}.repo
          fi
          EOF

      - name: Install ONLYOFFICE Docs EE dev version
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} << EOF
          if [ "${{ matrix.os_type }}" = "deb" ]; then
            sudo apt-get install onlyoffice-documentserver-ee=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          else
            sudo dnf install onlyoffice-documentserver-ee-${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}.el7 -y
          fi
          EOF

      - name: Wait for native install to start
        run: sleep 10

      - name: INFO native install DEV
        continue-on-error: true
        run: |
          echo "----------Healthcheck----------"
          RESULT=$(curl -s http://${{ env.EC2_IP }}/healthcheck)
          echo "Healthcheck result: $RESULT"
          if [ "$RESULT" = "true" ]; then
            echo "NATIVE_HEALTHY=true" >> $GITHUB_ENV
          else
            echo "NATIVE_HEALTHY=false" >> $GITHUB_ENV
          fi

          echo "---------Installed packages----------"
          if [ "${{ matrix.os_type }}" = "deb" ]; then
            ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
              'dpkg-query -l | grep onlyoffice-documentserver'
          else
            ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
              'rpm -qa | grep onlyoffice-documentserver'
          fi

          echo "---------Services started----------"
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'sudo systemctl list-unit-files --type=service | grep ds-'

      - name: Check version native install
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          if [ "${{ matrix.os_type }}" = "deb" ]; then
            ACTUAL=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'dpkg-query -W onlyoffice-documentserver-ee' | awk '{print $2}')
          else
            ACTUAL=$(ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} 'rpm -q --qf "%{VERSION}-%{RELEASE}" onlyoffice-documentserver-ee' | sed 's/\.el[0-9]*//')
          fi
          echo "Expected version: $EXPECTED"
          echo "Actual version: $ACTUAL"
          echo "NATIVE_VERSION_ACTUAL=$ACTUAL" >> $GITHUB_ENV
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            echo "NATIVE_VERSION_OK=true" >> $GITHUB_ENV
          else
            echo "NATIVE_VERSION_OK=false" >> $GITHUB_ENV
          fi

      - name: Start ds-example native install
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ${{ matrix.ssh_user }}@${{ env.EC2_IP }} \
            'sudo systemctl start ds-example'

      - name: Clear puppeteer output before Native tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests Native install
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests Native install
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results Native
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition NATIVE

      - name: LOGS Documentserver native install
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ${{ matrix.ssh_user }}

      - name: Check DS logs for errors native install
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ${{ matrix.ssh_user }}
          env_var: DS_LOG_ERRORS_NATIVE
          label: native

      # ==================== Final check + Cleanup ====================
      - name: Final check
        if: always()
        run: |
          FAILED=0
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"

          # ── Docker ───────────────────────────────────────────────────────
          if [ "${DOCKER_HEALTHY}" = "true" ]; then
            D_HC_ICON="✅"; D_HC_LABEL="OK"
          else
            D_HC_ICON="❌"; D_HC_LABEL="FAILED"; FAILED=1
          fi
          if [ "${DOCKER_VERSION_OK}" = "true" ]; then
            D_VER_ICON="✅"; D_VER_LABEL="OK"
          else
            D_VER_ICON="❌"; D_VER_LABEL="FAILED"; FAILED=1
          fi
          D_P="${PUPPETEER_DOCKER_FAILED:-0}"
          if [ "${D_P}" -gt 5 ]; then
            D_PPT_ICON="❌"; D_PPT_LABEL="FAILED"; FAILED=1
          else
            D_PPT_ICON="✅"; D_PPT_LABEL="OK"
          fi
          D_ERR="${DS_LOG_ERRORS_DOCKER:-0}"
          if [ "${D_ERR}" -gt 0 ]; then
            D_DS_ICON="❌"; D_DS_LABEL="FAILED"; FAILED=1
          else
            D_DS_ICON="✅"; D_DS_LABEL="OK"
          fi

          # ── Native ───────────────────────────────────────────────────────
          if [ "${NATIVE_HEALTHY}" = "true" ]; then
            N_HC_ICON="✅"; N_HC_LABEL="OK"
          else
            N_HC_ICON="❌"; N_HC_LABEL="FAILED"; FAILED=1
          fi
          if [ "${NATIVE_VERSION_OK}" = "true" ]; then
            N_VER_ICON="✅"; N_VER_LABEL="OK"
          else
            N_VER_ICON="❌"; N_VER_LABEL="FAILED"; FAILED=1
          fi
          N_P="${PUPPETEER_NATIVE_FAILED:-0}"
          if [ "${N_P}" -gt 5 ]; then
            N_PPT_ICON="❌"; N_PPT_LABEL="FAILED"; FAILED=1
          else
            N_PPT_ICON="✅"; N_PPT_LABEL="OK"
          fi
          N_ERR="${DS_LOG_ERRORS_NATIVE:-0}"
          if [ "${N_ERR}" -gt 0 ]; then
            N_DS_ICON="❌"; N_DS_LABEL="FAILED"; FAILED=1
          else
            N_DS_ICON="✅"; N_DS_LABEL="OK"
          fi

          # ── GITHUB_STEP_SUMMARY ──────────────────────────────────────────
          {
            echo "## Final Check — ${{ matrix.os_name }} ${{ matrix.arch }}"
            echo ""
            echo "**Expected version:** \`${EXPECTED}\`"
            echo ""
            echo "| Install | Healthcheck | Version | Puppeteer (≤5) | DS Log Errors |"
            echo "|---------|-------------|---------|----------------|---------------|"
            echo "| Docker | ${D_HC_ICON} ${D_HC_LABEL} | ${D_VER_ICON} \`${DOCKER_VERSION_ACTUAL:-?}\` | ${D_PPT_ICON} ${D_PPT_LABEL} (${D_P}) | ${D_DS_ICON} ${D_DS_LABEL} (${D_ERR}) |"
            echo "| Native | ${N_HC_ICON} ${N_HC_LABEL} | ${N_VER_ICON} \`${NATIVE_VERSION_ACTUAL:-?}\` | ${N_PPT_ICON} ${N_PPT_LABEL} (${N_P}) | ${N_DS_ICON} ${N_DS_LABEL} (${N_ERR}) |"
            echo ""
            if [ "$FAILED" -eq 1 ]; then
              echo "> ❌ **Final check FAILED**"
            else
              echo "> ✅ **All checks passed**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Console (ASCII table) ────────────────────────────────────────
          SEP="+--------+--------+-----------------+---------------+-----------+"
          echo "$SEP"
          printf "| %-6s | %-6s | %-15s | %-13s | %-9s |\n" "Install" "HC" "Version" "Puppeteer(≤5)" "DS Errors"
          echo "$SEP"
          printf "| %-6s | %-6s | %-15s | %-13s | %-9s |\n" "Docker" "${D_HC_LABEL}" "${DOCKER_VERSION_ACTUAL:-?}" "${D_PPT_LABEL}(${D_P})" "${D_DS_LABEL}(${D_ERR})"
          printf "| %-6s | %-6s | %-15s | %-13s | %-9s |\n" "Native" "${N_HC_LABEL}" "${NATIVE_VERSION_ACTUAL:-?}" "${N_PPT_LABEL}(${N_P})" "${N_DS_LABEL}(${N_ERR})"
          echo "$SEP"

          if [ "$FAILED" -eq 1 ]; then
            echo "FINAL_CONCLUSION=failure" >> "$GITHUB_ENV"
            echo "::error::Instance: ${{ env.INSTANCE_ID }}, IP: ${{ env.EC2_IP }}, Tag: ${{ matrix.tag }}"
            exit 1
          else
            echo "FINAL_CONCLUSION=success" >> "$GITHUB_ENV"
          fi

      - name: Save results
        if: always()
        continue-on-error: true
        env:
          OS_NAME: ${{ matrix.os_name }}
          ARCH: ${{ matrix.arch }}
          TAG: ${{ matrix.tag }}
          EXPECTED_VERSION: ${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}
        run: |
          mkdir -p .github/workflow-results
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          def b(v):   return os.environ.get(v, 'false') == 'true'
          def n(v):   return int(os.environ.get(v, '0') or '0')
          def s(v):   return os.environ.get(v, 'not set')
          def ok5(v): return n(v) <= 5

          data = {
              'run_date': datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC'),
              'os_name':  s('OS_NAME'),
              'arch':     s('ARCH'),
              'docker': {
                  'healthy':          b('DOCKER_HEALTHY'),
                  'version_ok':       b('DOCKER_VERSION_OK'),
                  'version_actual':   s('DOCKER_VERSION_ACTUAL'),
                  'puppeteer_failed': n('PUPPETEER_DOCKER_FAILED'),
                  'ds_log_errors':    n('DS_LOG_ERRORS_DOCKER'),
                  'conclusion': 'success' if (b('DOCKER_HEALTHY') and b('DOCKER_VERSION_OK') and ok5('PUPPETEER_DOCKER_FAILED') and n('DS_LOG_ERRORS_DOCKER') == 0) else 'failure',
              },
              'native': {
                  'healthy':          b('NATIVE_HEALTHY'),
                  'version_ok':       b('NATIVE_VERSION_OK'),
                  'version_actual':   s('NATIVE_VERSION_ACTUAL'),
                  'puppeteer_failed': n('PUPPETEER_NATIVE_FAILED'),
                  'ds_log_errors':    n('DS_LOG_ERRORS_NATIVE'),
                  'conclusion': 'success' if (b('NATIVE_HEALTHY') and b('NATIVE_VERSION_OK') and ok5('PUPPETEER_NATIVE_FAILED') and n('DS_LOG_ERRORS_NATIVE') == 0) else 'failure',
              },
              'conclusion': os.environ.get('FINAL_CONCLUSION', 'failure'),
          }
          tag  = s('TAG')
          path = f'.github/workflow-results/{tag}.json'
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Saved: {path}')
          PYEOF

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/workflow-results/${{ matrix.tag }}.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[dev OS x64-arm64] Save ${{ matrix.os_name }} ${{ matrix.arch }} results"
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD && break
              echo "Attempt $i failed, retrying..."
              sleep $((5 + RANDOM % 10))
            done
          fi

      - name: Delete EC2 Instance
        if: always()
        run: |
          aws ec2 terminate-instances --instance-ids ${{ env.INSTANCE_ID }}
          aws ec2 wait instance-terminated --instance-ids ${{ env.INSTANCE_ID }}
