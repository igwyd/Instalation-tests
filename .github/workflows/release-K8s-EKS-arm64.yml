      #       eksctl delete cluster \
      #         --name ${{ env.CLUSTER_NAME }} \
      #         --region ${{ env.AWS_REGION }} \
      #         --wait
      #     else
      #       echo "Cluster ${{ env.CLUSTER_NAME }} not found, nothing to delete"
      #     fi
