name: dev DEB x64-arm64

on:
  schedule:
    - cron: '0 11 * * 3'  # Wednesday 14:00 Mosсow time (UTC+3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-install-DEB:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            ami: ami-0b6c6ebed2801a5cb
            instance_type: t2.medium
          - arch: arm64
            ami: ami-0a7a4e87939439934
            instance_type: t4g.medium
    name: dev DEB ${{ matrix.arch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region us-east-1

      - name: Create EC2 Instance
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ matrix.ami }} \
            --instance-type ${{ matrix.instance_type }} \
            --key-name demin \
            --security-groups AllPortsOpened \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=demin_dev-deb-${{ matrix.arch }}}]' \
            --block-device-mappings '[{"DeviceName":"/dev/sda1","Ebs":{"VolumeSize":50,"VolumeType":"gp3"}}]' \
            --query "Instances[0].InstanceId" --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Waiting for instance to start..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID

      - name: Get EC2 Public IP
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --query "Reservations[].Instances[].PublicIpAddress" --output text)
          echo "EC2 Public IP: $IP"
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Wait for SSH to be Ready
        run: sleep 120

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa

      - name: Initialize check defaults
        run: |
          echo "HEALTHCHECK_EE=false"          >> $GITHUB_ENV
          echo "HEALTHCHECK_DE=false"          >> $GITHUB_ENV
          echo "HEALTHCHECK_CE=false"          >> $GITHUB_ENV
          echo "HEALTHCHECK_EE_RELEASE=false"  >> $GITHUB_ENV
          echo "HEALTHCHECK_EE_UPGRADE=false"  >> $GITHUB_ENV
          echo "VERSION_EE_OK=false"           >> $GITHUB_ENV
          echo "VERSION_DE_OK=false"           >> $GITHUB_ENV
          echo "VERSION_CE_OK=false"           >> $GITHUB_ENV
          echo "VERSION_EE_UPGRADE_OK=false"   >> $GITHUB_ENV
          echo "VERSION_EE_ACTUAL=not set"     >> $GITHUB_ENV
          echo "VERSION_DE_ACTUAL=not set"     >> $GITHUB_ENV
          echo "VERSION_CE_ACTUAL=not set"     >> $GITHUB_ENV
          echo "VERSION_EE_UPGRADE_ACTUAL=not set" >> $GITHUB_ENV
          echo "SERVICES_EE_OK=false"          >> $GITHUB_ENV
          echo "SERVICES_DE_OK=false"          >> $GITHUB_ENV
          echo "SERVICES_CE_OK=false"          >> $GITHUB_ENV
          echo "VERSION_EE_RELEASE_ACTUAL=not set" >> $GITHUB_ENV
          echo "JWT_EE_RELEASE_EXISTS=false"   >> $GITHUB_ENV
          echo "JWT_MATCH=false"               >> $GITHUB_ENV
          echo "PUPPETEER_EE_FAILED=0"         >> $GITHUB_ENV
          echo "PUPPETEER_DE_FAILED=0"         >> $GITHUB_ENV
          echo "PUPPETEER_CE_FAILED=0"         >> $GITHUB_ENV
          echo "PUPPETEER_EE_UPGRADE_FAILED=0" >> $GITHUB_ENV
          echo "DS_LOG_ERRORS_EE=0"            >> $GITHUB_ENV
          echo "DS_LOG_ERRORS_DE=0"            >> $GITHUB_ENV
          echo "DS_LOG_ERRORS_CE=0"            >> $GITHUB_ENV
          echo "DS_LOG_ERRORS_EE_UPGRADE=0"    >> $GITHUB_ENV

      - name: Upgrade DEB packages
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo apt-get update
          sudo apt-get upgrade -y
          sleep 10
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot after upgrade
        run: sleep 180

      - name: Install ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo apt-get install postgresql -y
          sudo -i -u postgres psql -c "CREATE USER onlyoffice WITH PASSWORD 'onlyoffice';"
          sudo -i -u postgres psql -c "CREATE DATABASE onlyoffice OWNER onlyoffice;"
          echo onlyoffice-documentserver-ee onlyoffice/db-pwd select onlyoffice | sudo debconf-set-selections

          sudo apt-get install redis-server -y

          sudo apt-get install rabbitmq-server -y

          mkdir -p -m 700 ~/.gnupg
          curl -fsSL https://download.onlyoffice.com/GPG-KEY-ONLYOFFICE | gpg --no-default-keyring --keyring gnupg-ring:/tmp/onlyoffice.gpg --import
          chmod 644 /tmp/onlyoffice.gpg
          sudo chown root:root /tmp/onlyoffice.gpg
          sudo mv /tmp/onlyoffice.gpg /usr/share/keyrings/onlyoffice.gpg

          echo "deb [signed-by=/usr/share/keyrings/onlyoffice.gpg] https://download.onlyoffice.com/repo/debian squeeze main" | sudo tee /etc/apt/sources.list.d/onlyoffice.list

          sudo apt-get update
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get install ttf-mscorefonts-installer -y

          echo onlyoffice-documentserver-ee onlyoffice/wopi-enabled boolean true | sudo debconf-set-selections
          echo "deb [trusted=yes] https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/repo/debian stable ${{ vars.ONLYOFFICE_DEV_VERSION }}" | sudo tee /etc/apt/sources.list.d/onlyoffice-dev.list
          sudo apt-get update
          sudo apt-get install onlyoffice-documentserver-ee=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          EOF


      - name: Info about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF

          sudo apt-get install jq -y
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: Check DS default services EE
        continue-on-error: true
        run: |
          UNEXPECTED=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            'for svc in ds-example ds-metrics ds-adminpanel; do s=$(systemctl is-enabled $svc 2>/dev/null || true); if [ "$s" = "enabled" ]; then echo "$svc"; fi; done')
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_EE_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected enabled services after EE install: $UNEXPECTED"
            echo "SERVICES_EE_OK=false" >> $GITHUB_ENV
          fi

      - name: Check healthcheck and version EE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck EE: $HC"
          echo "HEALTHCHECK_EE=$HC" >> $GITHUB_ENV

          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver-ee 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version EE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_EE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_EE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_EE_ACTUAL=$VERSION" >> $GITHUB_ENV

      - name: Start ds-example EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo systemctl start ds-example"

      - name: Clear puppeteer output before EE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${{ env.EC2_IP }}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results EE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition EE

      - name: Documentserver logs ONLYOFFICE-Docs EE
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ubuntu

      - name: Check DS logs for errors EE
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ubuntu
          env_var: DS_LOG_ERRORS_EE
          label: EE

      - name: Remove ONLYOFFICE-Docs EE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          printf "n/n" | sudo apt-get purge onlyoffice-documentserver* -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot
        run: sleep 120

      - name: Install ONLYOFFICE-Docs DE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo onlyoffice-documentserver-de onlyoffice/db-pwd select onlyoffice | sudo debconf-set-selections
          echo onlyoffice-documentserver-de onlyoffice/wopi-enabled boolean true | sudo debconf-set-selections
          sudo apt-get install onlyoffice-documentserver-de=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: Check DS default services DE
        continue-on-error: true
        run: |
          UNEXPECTED=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            'for svc in ds-example ds-metrics ds-adminpanel; do s=$(systemctl is-enabled $svc 2>/dev/null || true); if [ "$s" = "enabled" ]; then echo "$svc"; fi; done')
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_DE_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected enabled services after DE install: $UNEXPECTED"
            echo "SERVICES_DE_OK=false" >> $GITHUB_ENV
          fi

      - name: Check healthcheck and version DE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck DE: $HC"
          echo "HEALTHCHECK_DE=$HC" >> $GITHUB_ENV

          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver-de 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version DE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_DE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_DE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_DE_ACTUAL=$VERSION" >> $GITHUB_ENV

      - name: Start ds-example DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo systemctl start ds-example"

      - name: Clear puppeteer output before DE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results DE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition DE

      - name: Documentserver logs ONLYOFFICE-Docs DE
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ubuntu

      - name: Check DS logs for errors DE
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ubuntu
          env_var: DS_LOG_ERRORS_DE
          label: DE

      - name: Remove ONLYOFFICE-Docs DE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          printf "n/n" | sudo apt-get purge onlyoffice-documentserver* -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot
        run: sleep 120

      - name: Install ONLYOFFICE-Docs CE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo onlyoffice-documentserver onlyoffice/db-pwd select onlyoffice | sudo debconf-set-selections
          echo onlyoffice-documentserver onlyoffice/wopi-enabled boolean true | sudo debconf-set-selections
          sudo apt-get install onlyoffice-documentserver=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: Check DS default services CE
        continue-on-error: true
        run: |
          UNEXPECTED=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            'for svc in ds-example ds-metrics ds-adminpanel; do s=$(systemctl is-enabled $svc 2>/dev/null || true); if [ "$s" = "enabled" ]; then echo "$svc"; fi; done')
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_CE_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected enabled services after CE install: $UNEXPECTED"
            echo "SERVICES_CE_OK=false" >> $GITHUB_ENV
          fi

      - name: Check healthcheck and version CE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck CE: $HC"
          echo "HEALTHCHECK_CE=$HC" >> $GITHUB_ENV

          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version CE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_CE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_CE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_CE_ACTUAL=$VERSION" >> $GITHUB_ENV

      - name: Start ds-example CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo systemctl start ds-example"

      - name: Clear puppeteer output before CE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results CE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition CE

      - name: Documentserver logs ONLYOFFICE-Docs CE
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ubuntu

      - name: Check DS logs for errors CE
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ubuntu
          env_var: DS_LOG_ERRORS_CE
          label: CE

      - name: Remove ONLYOFFICE-Docs CE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          printf "n/n" | sudo apt-get purge onlyoffice-documentserver* -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot
        run: sleep 120

      - name: Install ONLYOFFICE-Docs EE RELEASE for testing UPGRADE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo rm -rf /etc/apt/sources.list.d/onlyoffice-dev.list
          echo onlyoffice-documentserver-ee onlyoffice/db-pwd select onlyoffice | sudo debconf-set-selections
          echo onlyoffice-documentserver-ee onlyoffice/wopi-enabled boolean true | sudo debconf-set-selections
          sudo apt-get install onlyoffice-documentserver-ee -y
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs EE RELEASE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "------------JWT settings-------------"
          sudo jq -r '.services.CoAuthoring.token' /etc/onlyoffice/documentserver/local.json
          sudo jq -r '.services.CoAuthoring.secret' /etc/onlyoffice/documentserver/local.json
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: Check healthcheck EE RELEASE and save JWT before upgrade
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck EE RELEASE: $HC"
          echo "HEALTHCHECK_EE_RELEASE=$HC" >> $GITHUB_ENV

          VERSION_RELEASE=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver-ee 2>/dev/null || echo 'not-found'")
          echo "Version EE Release: $VERSION_RELEASE"
          echo "VERSION_EE_RELEASE_ACTUAL=$VERSION_RELEASE" >> $GITHUB_ENV

          JWT_ENABLE=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo jq -r '.services.CoAuthoring.token.enable.browser // false' /etc/onlyoffice/documentserver/local.json 2>/dev/null || echo 'false'")
          echo "JWT enable: $JWT_ENABLE"
          if [ "$JWT_ENABLE" = "true" ]; then
            echo "JWT_EE_RELEASE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "JWT_EE_RELEASE_EXISTS=false" >> $GITHUB_ENV
          fi

          JWT_HASH=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo jq -c '{token: .services.CoAuthoring.token, secret: .services.CoAuthoring.secret}' /etc/onlyoffice/documentserver/local.json | md5sum | cut -d' ' -f1")
          echo "JWT hash before upgrade: $JWT_HASH"
          echo "JWT_BEFORE=$JWT_HASH" >> $GITHUB_ENV

      - name: Update ONLYOFFICE-EE to the DEV
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "deb [trusted=yes] https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/repo/debian stable ${{ vars.ONLYOFFICE_DEV_VERSION }}" | sudo tee /etc/apt/sources.list.d/onlyoffice-dev.list
          sudo apt-get update
          sudo apt-get install onlyoffice-documentserver-ee=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs EE DEV and JWT has not been modified
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "------------JWT settings-------------"
          sudo jq -r '.services.CoAuthoring.token' /etc/onlyoffice/documentserver/local.json
          sudo jq -r '.services.CoAuthoring.secret' /etc/onlyoffice/documentserver/local.json
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: Check healthcheck, version and JWT after upgrade
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck EE after upgrade: $HC"
          echo "HEALTHCHECK_EE_UPGRADE=$HC" >> $GITHUB_ENV

          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver-ee 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version after upgrade: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_EE_UPGRADE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_EE_UPGRADE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_EE_UPGRADE_ACTUAL=$VERSION" >> $GITHUB_ENV

          JWT_AFTER=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo jq -c '{token: .services.CoAuthoring.token, secret: .services.CoAuthoring.secret}' /etc/onlyoffice/documentserver/local.json | md5sum | cut -d' ' -f1")
          echo "JWT hash before upgrade: $JWT_BEFORE"
          echo "JWT hash after  upgrade: $JWT_AFTER"
          if [ "$JWT_BEFORE" = "$JWT_AFTER" ]; then
            echo "JWT settings preserved after upgrade"
            echo "JWT_MATCH=true" >> $GITHUB_ENV
          else
            echo "JWT settings changed after upgrade!"
            echo "JWT_MATCH=false" >> $GITHUB_ENV
          fi

      - name: Start ds-example EE after upgrade
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo systemctl start ds-example"

      - name: Clear puppeteer output before EE upgrade tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results EE after upgrade
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition EE_UPGRADE

      - name: Documentserver logs ONLYOFFICE-Docs EE after UPGRADE
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ubuntu

      - name: Check DS logs for errors EE after UPGRADE
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-native
          ssh_host: ${{ env.EC2_IP }}
          ssh_user: ubuntu
          env_var: DS_LOG_ERRORS_EE_UPGRADE
          label: EE_UPGRADE

      - name: Final check
        if: always()
        run: |
          FAILED=0
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"

          # ── EE ──────────────────────────────────────────────────────────
          if [ "${HEALTHCHECK_EE}" = "true" ]; then
            EE_HC_ICON="✅"; EE_HC_LABEL="OK"
          else
            EE_HC_ICON="❌"; EE_HC_LABEL="FAILED"; FAILED=1
          fi
          if [ "${VERSION_EE_OK}" = "true" ]; then
            EE_VER_ICON="✅"; EE_VER_LABEL="OK"
          else
            EE_VER_ICON="❌"; EE_VER_LABEL="FAILED"; FAILED=1
          fi
          if [ "${SERVICES_EE_OK}" = "true" ]; then
            EE_SVC_ICON="✅"; EE_SVC_LABEL="OK"
          else
            EE_SVC_ICON="❌"; EE_SVC_LABEL="FAILED"; FAILED=1
          fi
          EE_P="${PUPPETEER_EE_FAILED:-0}"
          if [ "${EE_P}" -gt 5 ]; then
            EE_PPT_ICON="❌"; EE_PPT_LABEL="FAILED"; FAILED=1
          else
            EE_PPT_ICON="✅"; EE_PPT_LABEL="OK"
          fi
          EE_D="${DS_LOG_ERRORS_EE:-0}"
          if [ "${EE_D}" -gt 0 ]; then
            EE_DS_ICON="❌"; EE_DS_LABEL="FAILED"; FAILED=1
          else
            EE_DS_ICON="✅"; EE_DS_LABEL="OK"
          fi

          # ── DE ──────────────────────────────────────────────────────────
          if [ "${HEALTHCHECK_DE}" = "true" ]; then
            DE_HC_ICON="✅"; DE_HC_LABEL="OK"
          else
            DE_HC_ICON="❌"; DE_HC_LABEL="FAILED"; FAILED=1
          fi
          if [ "${VERSION_DE_OK}" = "true" ]; then
            DE_VER_ICON="✅"; DE_VER_LABEL="OK"
          else
            DE_VER_ICON="❌"; DE_VER_LABEL="FAILED"; FAILED=1
          fi
          if [ "${SERVICES_DE_OK}" = "true" ]; then
            DE_SVC_ICON="✅"; DE_SVC_LABEL="OK"
          else
            DE_SVC_ICON="❌"; DE_SVC_LABEL="FAILED"; FAILED=1
          fi
          DE_P="${PUPPETEER_DE_FAILED:-0}"
          if [ "${DE_P}" -gt 5 ]; then
            DE_PPT_ICON="❌"; DE_PPT_LABEL="FAILED"; FAILED=1
          else
            DE_PPT_ICON="✅"; DE_PPT_LABEL="OK"
          fi
          DE_D="${DS_LOG_ERRORS_DE:-0}"
          if [ "${DE_D}" -gt 0 ]; then
            DE_DS_ICON="❌"; DE_DS_LABEL="FAILED"; FAILED=1
          else
            DE_DS_ICON="✅"; DE_DS_LABEL="OK"
          fi

          # ── CE ──────────────────────────────────────────────────────────
          if [ "${HEALTHCHECK_CE}" = "true" ]; then
            CE_HC_ICON="✅"; CE_HC_LABEL="OK"
          else
            CE_HC_ICON="❌"; CE_HC_LABEL="FAILED"; FAILED=1
          fi
          if [ "${VERSION_CE_OK}" = "true" ]; then
            CE_VER_ICON="✅"; CE_VER_LABEL="OK"
          else
            CE_VER_ICON="❌"; CE_VER_LABEL="FAILED"; FAILED=1
          fi
          if [ "${SERVICES_CE_OK}" = "true" ]; then
            CE_SVC_ICON="✅"; CE_SVC_LABEL="OK"
          else
            CE_SVC_ICON="❌"; CE_SVC_LABEL="FAILED"; FAILED=1
          fi
          CE_P="${PUPPETEER_CE_FAILED:-0}"
          if [ "${CE_P}" -gt 5 ]; then
            CE_PPT_ICON="❌"; CE_PPT_LABEL="FAILED"; FAILED=1
          else
            CE_PPT_ICON="✅"; CE_PPT_LABEL="OK"
          fi
          CE_D="${DS_LOG_ERRORS_CE:-0}"
          if [ "${CE_D}" -gt 0 ]; then
            CE_DS_ICON="❌"; CE_DS_LABEL="FAILED"; FAILED=1
          else
            CE_DS_ICON="✅"; CE_DS_LABEL="OK"
          fi

          # ── EE Release ───────────────────────────────────────────────────
          if [ "${HEALTHCHECK_EE_RELEASE}" = "true" ]; then
            RH_HC_ICON="✅"; RH_HC_LABEL="OK"
          else
            RH_HC_ICON="❌"; RH_HC_LABEL="FAILED"; FAILED=1
          fi
          if [ "${JWT_EE_RELEASE_EXISTS}" = "true" ]; then
            RH_JWT_ICON="✅"; RH_JWT_LABEL="YES"
          else
            RH_JWT_ICON="❌"; RH_JWT_LABEL="FAIL"
          fi

          # ── EE Upgrade ───────────────────────────────────────────────────
          if [ "${HEALTHCHECK_EE_UPGRADE}" = "true" ]; then
            UG_HC_ICON="✅"; UG_HC_LABEL="OK"
          else
            UG_HC_ICON="❌"; UG_HC_LABEL="FAILED"; FAILED=1
          fi
          if [ "${VERSION_EE_UPGRADE_OK}" = "true" ]; then
            UG_VER_ICON="✅"; UG_VER_LABEL="OK"
          else
            UG_VER_ICON="❌"; UG_VER_LABEL="FAILED"; FAILED=1
          fi
          if [ "${JWT_MATCH}" = "true" ]; then
            JWT_ICON="✅"; JWT_LABEL="MATCH"
          else
            JWT_ICON="❌"; JWT_LABEL="FAIL"; FAILED=1
          fi
          UG_P="${PUPPETEER_EE_UPGRADE_FAILED:-0}"
          if [ "${UG_P}" -gt 5 ]; then
            UG_PPT_ICON="❌"; UG_PPT_LABEL="FAILED"; FAILED=1
          else
            UG_PPT_ICON="✅"; UG_PPT_LABEL="OK"
          fi
          UG_D="${DS_LOG_ERRORS_EE_UPGRADE:-0}"
          if [ "${UG_D}" -gt 0 ]; then
            UG_DS_ICON="❌"; UG_DS_LABEL="FAILED"; FAILED=1
          else
            UG_DS_ICON="✅"; UG_DS_LABEL="OK"
          fi

          # ── GITHUB_STEP_SUMMARY ──────────────────────────────────────────
          {
            echo "## Final Check — ${{ matrix.arch }}"
            echo ""
            echo "**Expected version:** \`${EXPECTED}\`"
            echo ""
            echo "| Edition | Healthcheck | Version | SVC/JWT | Puppeteer (≤5) | DS Log Errors |"
            echo "|---------|-------------|---------|---------|----------------|---------------|"
            echo "| EE         | ${EE_HC_ICON} ${EE_HC_LABEL}  | ${EE_VER_ICON} \`${VERSION_EE_ACTUAL:-?}\`            | SVC: ${EE_SVC_ICON} ${EE_SVC_LABEL}  | ${EE_PPT_ICON} ${EE_PPT_LABEL} (${EE_P})  | ${EE_DS_ICON} ${EE_DS_LABEL} (${EE_D})  |"
            echo "| DE         | ${DE_HC_ICON} ${DE_HC_LABEL}  | ${DE_VER_ICON} \`${VERSION_DE_ACTUAL:-?}\`            | SVC: ${DE_SVC_ICON} ${DE_SVC_LABEL}  | ${DE_PPT_ICON} ${DE_PPT_LABEL} (${DE_P})  | ${DE_DS_ICON} ${DE_DS_LABEL} (${DE_D})  |"
            echo "| CE         | ${CE_HC_ICON} ${CE_HC_LABEL}  | ${CE_VER_ICON} \`${VERSION_CE_ACTUAL:-?}\`            | SVC: ${CE_SVC_ICON} ${CE_SVC_LABEL}  | ${CE_PPT_ICON} ${CE_PPT_LABEL} (${CE_P})  | ${CE_DS_ICON} ${CE_DS_LABEL} (${CE_D})  |"
            echo "| EE Release | ${RH_HC_ICON} ${RH_HC_LABEL}  | \`${VERSION_EE_RELEASE_ACTUAL:-?}\`  | JWT: ${RH_JWT_ICON} ${RH_JWT_LABEL}  | —  | —  |"
            echo "| EE Upgrade | ${UG_HC_ICON} ${UG_HC_LABEL}  | ${UG_VER_ICON} \`${VERSION_EE_UPGRADE_ACTUAL:-?}\` | JWT: ${JWT_ICON} ${JWT_LABEL}  | ${UG_PPT_ICON} ${UG_PPT_LABEL} (${UG_P}) | ${UG_DS_ICON} ${UG_DS_LABEL} (${UG_D}) |"
            echo ""
            if [ "$FAILED" -eq 1 ]; then
              echo "> ❌ **Final check FAILED**"
            else
              echo "> ✅ **All checks passed**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Console (ASCII table) ────────────────────────────────────────
          SEP="+---------------+--------+---------+--------+----------+-----------+"
          echo "$SEP"
          printf "| %-13s | %-6s | %-7s | %-6s | %-8s | %-9s |\n" "Edition" "HC" "Version" "Svc/JWT" "Puppeteer" "DS Errors"
          echo "$SEP"
          printf "| %-13s | %-6s | %-7s | %-6s | %-8s | %-9s |\n" "EE"          "${EE_HC_LABEL}"  "${EE_VER_LABEL}"  "SVC:${EE_SVC_LABEL}"  "${EE_PPT_LABEL}(${EE_P})"  "${EE_DS_LABEL}(${EE_D})"
          printf "| %-13s | %-6s | %-7s | %-6s | %-8s | %-9s |\n" "DE"          "${DE_HC_LABEL}"  "${DE_VER_LABEL}"  "SVC:${DE_SVC_LABEL}"  "${DE_PPT_LABEL}(${DE_P})"  "${DE_DS_LABEL}(${DE_D})"
          printf "| %-13s | %-6s | %-7s | %-6s | %-8s | %-9s |\n" "CE"          "${CE_HC_LABEL}"  "${CE_VER_LABEL}"  "SVC:${CE_SVC_LABEL}"  "${CE_PPT_LABEL}(${CE_P})"  "${CE_DS_LABEL}(${CE_D})"
          printf "| %-13s | %-6s | %-7s | %-6s | %-8s | %-9s |\n" "EE Release"  "${RH_HC_LABEL}"  "${VERSION_EE_RELEASE_ACTUAL:-?}"  "JWT:${RH_JWT_LABEL}"  "—"  "—"
          printf "| %-13s | %-6s | %-7s | %-6s | %-8s | %-9s |\n" "EE Upgrade"  "${UG_HC_LABEL}"  "${UG_VER_LABEL}"  "${JWT_LABEL}"     "${UG_PPT_LABEL}(${UG_P})"  "${UG_DS_LABEL}(${UG_D})"
          echo "$SEP"

          if [ "$FAILED" -eq 1 ]; then
            echo "FINAL_CONCLUSION=failure" >> "$GITHUB_ENV"
            exit 1
          else
            echo "FINAL_CONCLUSION=success" >> "$GITHUB_ENV"
          fi

      - name: Save results
        if: always()
        continue-on-error: true
        env:
          ARCH: ${{ matrix.arch }}
          EXPECTED_VERSION: ${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}
        run: |
          mkdir -p .github/workflow-results
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          def b(v):   return os.environ.get(v, 'false') == 'true'
          def n(v):   return int(os.environ.get(v, '0') or '0')
          def s(v):   return os.environ.get(v, 'not set')
          def ok5(v): return n(v) <= 5

          arch = s('ARCH')
          data = {
              'run_date': datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC'),
              'ee': {
                  'healthy':          b('HEALTHCHECK_EE'),
                  'version_ok':       b('VERSION_EE_OK'),
                  'version_actual':   s('VERSION_EE_ACTUAL'),
                  'services_ok':      b('SERVICES_EE_OK'),
                  'puppeteer_failed': n('PUPPETEER_EE_FAILED'),
                  'ds_log_errors':    n('DS_LOG_ERRORS_EE'),
                  'conclusion': 'success' if (b('HEALTHCHECK_EE') and b('VERSION_EE_OK') and b('SERVICES_EE_OK') and ok5('PUPPETEER_EE_FAILED') and n('DS_LOG_ERRORS_EE') == 0) else 'failure',
              },
              'de': {
                  'healthy':          b('HEALTHCHECK_DE'),
                  'version_ok':       b('VERSION_DE_OK'),
                  'version_actual':   s('VERSION_DE_ACTUAL'),
                  'services_ok':      b('SERVICES_DE_OK'),
                  'puppeteer_failed': n('PUPPETEER_DE_FAILED'),
                  'ds_log_errors':    n('DS_LOG_ERRORS_DE'),
                  'conclusion': 'success' if (b('HEALTHCHECK_DE') and b('VERSION_DE_OK') and b('SERVICES_DE_OK') and ok5('PUPPETEER_DE_FAILED') and n('DS_LOG_ERRORS_DE') == 0) else 'failure',
              },
              'ce': {
                  'healthy':          b('HEALTHCHECK_CE'),
                  'version_ok':       b('VERSION_CE_OK'),
                  'version_actual':   s('VERSION_CE_ACTUAL'),
                  'services_ok':      b('SERVICES_CE_OK'),
                  'puppeteer_failed': n('PUPPETEER_CE_FAILED'),
                  'ds_log_errors':    n('DS_LOG_ERRORS_CE'),
                  'conclusion': 'success' if (b('HEALTHCHECK_CE') and b('VERSION_CE_OK') and b('SERVICES_CE_OK') and ok5('PUPPETEER_CE_FAILED') and n('DS_LOG_ERRORS_CE') == 0) else 'failure',
              },
              'ee_upgrade': {
                  'healthy_release':         b('HEALTHCHECK_EE_RELEASE'),
                  'healthy_upgrade':         b('HEALTHCHECK_EE_UPGRADE'),
                  'version_release_actual':  s('VERSION_EE_RELEASE_ACTUAL'),
                  'jwt_ee_release_exists':   b('JWT_EE_RELEASE_EXISTS'),
                  'version_ok':              b('VERSION_EE_UPGRADE_OK'),
                  'version_actual':          s('VERSION_EE_UPGRADE_ACTUAL'),
                  'jwt_match':               b('JWT_MATCH'),
                  'puppeteer_failed':        n('PUPPETEER_EE_UPGRADE_FAILED'),
                  'ds_log_errors':           n('DS_LOG_ERRORS_EE_UPGRADE'),
                  'conclusion': 'success' if (b('HEALTHCHECK_EE_RELEASE') and b('HEALTHCHECK_EE_UPGRADE') and b('VERSION_EE_UPGRADE_OK') and b('JWT_MATCH') and ok5('PUPPETEER_EE_UPGRADE_FAILED') and n('DS_LOG_ERRORS_EE_UPGRADE') == 0) else 'failure',
              },
              'conclusion': os.environ.get('FINAL_CONCLUSION', 'failure'),
          }
          path = f'.github/workflow-results/dev-deb-{arch}.json'
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Saved: {path}')
          PYEOF

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/workflow-results/dev-deb-${{ matrix.arch }}.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[dev DEB x64-arm64] Save ${{ matrix.arch }} results"
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD && break
              echo "Attempt $i failed, retrying..."
              sleep $((5 + RANDOM % 10))
            done
          fi

      - name: Delete EC2 Instance
        if: always()
        run: |
          aws ec2 terminate-instances --instance-ids ${{ env.INSTANCE_ID }}
          aws ec2 wait instance-terminated --instance-ids ${{ env.INSTANCE_ID }}
