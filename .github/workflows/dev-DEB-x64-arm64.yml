name: dev DEB x64-arm64

on:
  schedule:
    - cron: '0 12 * * 3'  # Wednesday 15:00 Mosсow time (UTC+3)
  workflow_dispatch:

jobs:
  test-install-DEB:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            ami: ami-0b6c6ebed2801a5cb
            instance_type: t2.medium
          - arch: arm64
            ami: ami-0a7a4e87939439934
            instance_type: t4g.medium
    name: dev DEB ${{ matrix.arch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region us-east-1

      - name: Create EC2 Instance
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ matrix.ami }} \
            --instance-type ${{ matrix.instance_type }} \
            --key-name demin \
            --security-groups AllPortsOpened \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=demin_dev-deb-${{ matrix.arch }}}]' \
            --block-device-mappings '[{"DeviceName":"/dev/sda1","Ebs":{"VolumeSize":50,"VolumeType":"gp3"}}]' \
            --query "Instances[0].InstanceId" --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Waiting for instance to start..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID

      - name: Get EC2 Public IP
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --query "Reservations[].Instances[].PublicIpAddress" --output text)
          echo "EC2 Public IP: $IP"
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Wait for SSH to be Ready
        run: sleep 120

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa

      - name: Upgrade DEB packages
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo apt-get update
          sudo apt-get upgrade -y
          sleep 10
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot after upgrade
        run: sleep 180

      - name: Install ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo apt-get install postgresql -y
          sudo -i -u postgres psql -c "CREATE USER onlyoffice WITH PASSWORD 'onlyoffice';"
          sudo -i -u postgres psql -c "CREATE DATABASE onlyoffice OWNER onlyoffice;"
          echo onlyoffice-documentserver-ee onlyoffice/db-pwd select onlyoffice | sudo debconf-set-selections

          sudo apt-get install redis-server -y

          sudo apt-get install rabbitmq-server -y

          mkdir -p -m 700 ~/.gnupg
          curl -fsSL https://download.onlyoffice.com/GPG-KEY-ONLYOFFICE | gpg --no-default-keyring --keyring gnupg-ring:/tmp/onlyoffice.gpg --import
          chmod 644 /tmp/onlyoffice.gpg
          sudo chown root:root /tmp/onlyoffice.gpg
          sudo mv /tmp/onlyoffice.gpg /usr/share/keyrings/onlyoffice.gpg

          echo "deb [signed-by=/usr/share/keyrings/onlyoffice.gpg] https://download.onlyoffice.com/repo/debian squeeze main" | sudo tee /etc/apt/sources.list.d/onlyoffice.list

          sudo apt-get update
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get install ttf-mscorefonts-installer -y

          echo onlyoffice-documentserver-ee onlyoffice/wopi-enabled boolean true | sudo debconf-set-selections
          echo "deb [trusted=yes] https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/repo/debian stable ${{ vars.ONLYOFFICE_DEV_VERSION }}" | sudo tee /etc/apt/sources.list.d/onlyoffice-dev.list
          sudo apt-get update
          sudo apt-get install onlyoffice-documentserver-ee=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          EOF


      - name: Info about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF

          sudo apt-get install jq -y
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          echo "-------------DS-example-------------"
          sudo systemctl start ds-example
          sudo systemctl status ds-example
          EOF

      - name: Check healthcheck and version EE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck EE: $HC"
          echo "HEALTHCHECK_EE=$HC" >> $GITHUB_ENV

          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver-ee 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version EE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_EE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_EE_OK=false" >> $GITHUB_ENV
          fi

      - name: Clear puppeteer output before EE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${{ env.EC2_IP }}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results EE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition EE

      - name: Documentserver logs ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log  /var/log/onlyoffice/documentserver/docservice/out.log  /var/log/onlyoffice/documentserver/docservice/err.log  /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log  /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log
          EOF

      - name: Check DS logs for errors EE
        continue-on-error: true
        run: |
          ERRORS=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            'sudo grep -iEh "\[error\]|typeerror" /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/nginx.error.log 2>/dev/null | wc -l' 2>/dev/null || echo "0")
          echo "DS log errors EE: $ERRORS"
          echo "DS_LOG_ERRORS_EE=$ERRORS" >> $GITHUB_ENV

      - name: Remove ONLYOFFICE-Docs EE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          printf "n/n" | sudo apt-get purge onlyoffice-documentserver* -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot
        run: sleep 60

      - name: Install ONLYOFFICE-Docs DE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo onlyoffice-documentserver-de onlyoffice/db-pwd select onlyoffice | sudo debconf-set-selections
          echo onlyoffice-documentserver-de onlyoffice/wopi-enabled boolean true | sudo debconf-set-selections
          sudo apt-get install onlyoffice-documentserver-de=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          echo "-------------DS-example-------------"
          sudo systemctl start ds-example
          sudo systemctl status ds-example
          EOF

      - name: Check healthcheck and version DE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck DE: $HC"
          echo "HEALTHCHECK_DE=$HC" >> $GITHUB_ENV

          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver-de 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version DE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_DE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_DE_OK=false" >> $GITHUB_ENV
          fi

      - name: Clear puppeteer output before DE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results DE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition DE

      - name: Documentserver logs ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log  /var/log/onlyoffice/documentserver/docservice/out.log  /var/log/onlyoffice/documentserver/docservice/err.log  /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log  /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log
          EOF

      - name: Check DS logs for errors DE
        continue-on-error: true
        run: |
          ERRORS=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            'sudo grep -iEh "\[error\]|typeerror" /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/nginx.error.log 2>/dev/null | wc -l' 2>/dev/null || echo "0")
          echo "DS log errors DE: $ERRORS"
          echo "DS_LOG_ERRORS_DE=$ERRORS" >> $GITHUB_ENV

      - name: Remove ONLYOFFICE-Docs DE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          printf "n/n" | sudo apt-get purge onlyoffice-documentserver* -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot
        run: sleep 60

      - name: Install ONLYOFFICE-Docs CE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo onlyoffice-documentserver onlyoffice/db-pwd select onlyoffice | sudo debconf-set-selections
          echo onlyoffice-documentserver onlyoffice/wopi-enabled boolean true | sudo debconf-set-selections
          sudo apt-get install onlyoffice-documentserver=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          echo "-------------DS-example-------------"
          sudo systemctl start ds-example
          sudo systemctl status ds-example
          EOF

      - name: Check healthcheck and version CE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck CE: $HC"
          echo "HEALTHCHECK_CE=$HC" >> $GITHUB_ENV

          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version CE: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_CE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_CE_OK=false" >> $GITHUB_ENV
          fi

      - name: Clear puppeteer output before CE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results CE
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition CE

      - name: Documentserver logs ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log  /var/log/onlyoffice/documentserver/docservice/out.log  /var/log/onlyoffice/documentserver/docservice/err.log  /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log  /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log
          EOF

      - name: Check DS logs for errors CE
        continue-on-error: true
        run: |
          ERRORS=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            'sudo grep -iEh "\[error\]|typeerror" /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/nginx.error.log 2>/dev/null | wc -l' 2>/dev/null || echo "0")
          echo "DS log errors CE: $ERRORS"
          echo "DS_LOG_ERRORS_CE=$ERRORS" >> $GITHUB_ENV

      - name: Remove ONLYOFFICE-Docs CE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          printf "n/n" | sudo apt-get purge onlyoffice-documentserver* -y
          sudo rm -rvf /etc/onlyoffice /var/www/onlyoffice /var/log/onlyoffice
          EOF

      - name: Reboot EC2 Instance
        run: aws ec2 reboot-instances --instance-ids ${{ env.INSTANCE_ID }}

      - name: Wait for instance to reboot
        run: sleep 60

      - name: Install ONLYOFFICE-Docs EE RELEASE for testing UPGRADE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo rm -rf /etc/apt/sources.list.d/onlyoffice-dev.list
          echo onlyoffice-documentserver-ee onlyoffice/db-pwd select onlyoffice | sudo debconf-set-selections
          echo onlyoffice-documentserver-ee onlyoffice/wopi-enabled boolean true | sudo debconf-set-selections
          sudo apt-get install onlyoffice-documentserver-ee -y
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs EE RELEASE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "------------JWT settings-------------"
          sudo jq -r '.services.CoAuthoring.token' /etc/onlyoffice/documentserver/local.json
          sudo jq -r '.services.CoAuthoring.secret' /etc/onlyoffice/documentserver/local.json
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          echo "-------------DS-example-------------"
          sudo systemctl start ds-example
          sudo systemctl status ds-example
          EOF

      - name: Check healthcheck EE RELEASE and save JWT before upgrade
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck EE RELEASE: $HC"
          echo "HEALTHCHECK_EE_RELEASE=$HC" >> $GITHUB_ENV

          JWT_HASH=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo jq -c '{token: .services.CoAuthoring.token, secret: .services.CoAuthoring.secret}' /etc/onlyoffice/documentserver/local.json | md5sum | cut -d' ' -f1")
          echo "JWT hash before upgrade: $JWT_HASH"
          echo "JWT_BEFORE=$JWT_HASH" >> $GITHUB_ENV

      - name: Update ONLYOFFICE-EE to the DEV
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "deb [trusted=yes] https://s3.eu-west-1.amazonaws.com/repo-doc-onlyoffice-com/repo/debian stable ${{ vars.ONLYOFFICE_DEV_VERSION }}" | sudo tee /etc/apt/sources.list.d/onlyoffice-dev.list
          sudo apt-get update
          sudo apt-get install onlyoffice-documentserver-ee=${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }} -y
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs EE DEV and JWT has not been modified
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "------------JWT settings-------------"
          sudo jq -r '.services.CoAuthoring.token' /etc/onlyoffice/documentserver/local.json
          sudo jq -r '.services.CoAuthoring.secret' /etc/onlyoffice/documentserver/local.json
          echo "-------------healthcheck-------------"
          sudo sleep 10
          sudo curl -s http://${{ env.EC2_IP }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo systemctl list-unit-files --type=service | grep ds-
          echo "---------Installed packages----------"
          sudo dpkg-query -l | grep onlyoffice-documentserver
          echo "--------packageType--------"
          sudo curl -s http://127.0.0.1:8000/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          sudo curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "------------WOPI external------------"
          sudo curl -s http://${{ env.EC2_IP }}/hosting/discovery | tail -c 150; echo
          echo "-------------DS-example-------------"
          sudo systemctl start ds-example
          sudo systemctl status ds-example
          EOF

      - name: Check healthcheck, version and JWT after upgrade
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck EE after upgrade: $HC"
          echo "HEALTHCHECK_EE_UPGRADE=$HC" >> $GITHUB_ENV

          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "dpkg-query -W -f='\${Version}' onlyoffice-documentserver-ee 2>/dev/null || echo 'not-found'")
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version after upgrade: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_EE_UPGRADE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_EE_UPGRADE_OK=false" >> $GITHUB_ENV
          fi

          JWT_AFTER=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            "sudo jq -c '{token: .services.CoAuthoring.token, secret: .services.CoAuthoring.secret}' /etc/onlyoffice/documentserver/local.json | md5sum | cut -d' ' -f1")
          echo "JWT hash before upgrade: $JWT_BEFORE"
          echo "JWT hash after  upgrade: $JWT_AFTER"
          if [ "$JWT_BEFORE" = "$JWT_AFTER" ]; then
            echo "JWT settings preserved after upgrade"
            echo "JWT_MATCH=true" >> $GITHUB_ENV
          else
            echo "JWT settings changed after upgrade!"
            echo "JWT_MATCH=false" >> $GITHUB_ENV
          fi

      - name: Clear puppeteer output before EE upgrade tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results EE after upgrade
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition EE_UPGRADE

      - name: Documentserver logs ONLYOFFICE-Docs EE after UPGRADE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log  /var/log/onlyoffice/documentserver/docservice/out.log  /var/log/onlyoffice/documentserver/docservice/err.log  /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log  /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log
          EOF

      - name: Check DS logs for errors EE after UPGRADE
        continue-on-error: true
        run: |
          ERRORS=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} \
            'sudo grep -iEh "\[error\]|typeerror" /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/nginx.error.log 2>/dev/null | wc -l' 2>/dev/null || echo "0")
          echo "DS log errors EE_UPGRADE: $ERRORS"
          echo "DS_LOG_ERRORS_EE_UPGRADE=$ERRORS" >> $GITHUB_ENV

      - name: Final check
        if: always()
        run: |
          FAILED=0

          echo "=== Healthcheck results ==="
          for VAR in HEALTHCHECK_EE HEALTHCHECK_DE HEALTHCHECK_CE HEALTHCHECK_EE_RELEASE HEALTHCHECK_EE_UPGRADE; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-not set}"
            if [ "${VAL}" != "true" ]; then
              echo "$VAR FAILED"
              FAILED=1
            fi
          done

          echo "=== Version check results ==="
          for VAR in VERSION_EE_OK VERSION_DE_OK VERSION_CE_OK VERSION_EE_UPGRADE_OK; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-not set}"
            if [ "${VAL}" != "true" ]; then
              echo "$VAR FAILED"
              FAILED=1
            fi
          done

          echo "=== JWT check ==="
          echo "JWT_MATCH: ${JWT_MATCH:-not set}"
          if [ "${JWT_MATCH}" != "true" ]; then
            echo "JWT check FAILED — JWT settings changed after upgrade"
            FAILED=1
          fi

          echo "=== Puppeteer results ==="
          for VAR in PUPPETEER_EE_FAILED PUPPETEER_DE_FAILED PUPPETEER_CE_FAILED PUPPETEER_EE_UPGRADE_FAILED; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-0}"
            if [ "${VAL:-0}" -gt 5 ]; then
              echo "$VAR FAILED (threshold: 5)"
              FAILED=1
            else
              echo "$VAR OK (${VAL:-0} failures, threshold: 5)"
            fi
          done

          echo "=== DS log errors ==="
          for VAR in DS_LOG_ERRORS_EE DS_LOG_ERRORS_DE DS_LOG_ERRORS_CE DS_LOG_ERRORS_EE_UPGRADE; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-0}"
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Delete EC2 Instance
        run: |
          aws ec2 terminate-instances --instance-ids ${{ env.INSTANCE_ID }}
          aws ec2 wait instance-terminated --instance-ids ${{ env.INSTANCE_ID }}
