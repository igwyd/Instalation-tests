name: release Docker DEB x64-arm64

on:
  workflow_dispatch:

jobs:
  check-docker-deb:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            ami: ami-0b6c6ebed2801a5cb
            instance_type: t2.medium
          - arch: arm64
            ami: ami-0a7a4e87939439934
            instance_type: t4g.medium
    name: release Docker DEB ${{ matrix.arch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install prerequisites for puppeteer tests
        run: |
          sudo apt-get update
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb
          sudo apt-get install -f -y
          google-chrome --version
          python3 --version
          pip3 --version
          node -v
          npm -v

          mkdir -p ~/.ssh
          echo "${{ secrets.GIT_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          ssh-keyscan git.onlyoffice.com >> ~/.ssh/known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone git@git.onlyoffice.com:ONLYOFFICE-QA/Dep.Tests.git
          cd Dep.Tests
          sed -i 's/url=https:\/\/github.com\/ONLYOFFICE-data\/pp-files.git/url = git@github.com:ONLYOFFICE-data\/pp-files.git/' .gitmodules
          git submodule update --init puppeteer/files
          cd puppeteer/engine
          npm install
          cp ../config_chrome_linux.json ../config_chrome_linux.json.bak

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region us-east-1

      - name: Create EC2 Instance
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ matrix.ami }} \
            --instance-type ${{ matrix.instance_type }} \
            --key-name demin \
            --security-groups AllPortsOpened \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=demin_release-docker-deb-${{ matrix.arch }}}]' \
            --block-device-mappings '[{"DeviceName":"/dev/sda1","Ebs":{"VolumeSize":50,"VolumeType":"gp3"}}]' \
            --query "Instances[0].InstanceId" --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "Waiting for instance to start..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID

      - name: Get EC2 Public IP
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --query "Reservations[].Instances[].PublicIpAddress" --output text)
          echo "EC2 Public IP: $IP"
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Wait for SSH to be Ready
        run: sleep 120

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa

      - name: Install Docker on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=\$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \$(. /etc/os-release && echo "\$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io
          sudo systemctl start docker
          EOF

      - name: Docker run ONLYOFFICE-Docs EE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo docker pull onlyoffice/documentserver-ee
          sudo docker run -itd -p 80:80 -e WOPI_ENABLED=true --name ds-ee-release onlyoffice/documentserver-ee
          sleep 90
          sudo docker exec ds-ee-release supervisorctl start all
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo apt-get install jq -y
          echo "-------------healthcheck-------------"
          curl -s http://127.0.0.1/healthcheck; echo
          echo "-------------DS services-------------"
          sudo docker exec ds-ee-release supervisorctl status all || true
          echo "---------Installed packages----------"
          sudo docker exec ds-ee-release bash -c "dpkg -l | grep onlyoffice"
          echo "--------packageType--------"
          sudo docker exec ds-ee-release curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "-------------DS-example-------------"
          sudo docker exec ds-ee-release supervisorctl start ds:example
          sudo docker exec ds-ee-release supervisorctl status ds:example
          EOF

      - name: Check healthcheck EE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck EE: $HC"
          echo "HEALTHCHECK_EE=$HC" >> $GITHUB_ENV

      - name: Clear puppeteer output before EE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${{ env.EC2_IP }}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results EE
        if: always()
        run: |
          python3 - <<'PYEOF'
          import os

          def count_results(path):
              if not os.path.exists(path):
                  print(f"Report not found: {path}")
                  return 0, 0
              with open(path) as f:
                  content = f.read()
              ok  = content.count("<td>OK</td>")
              err = content.count("<td>Error in script terminal.</td>")
              return ok, err

          api_ok,  api_err  = count_results("Dep.Tests/puppeteer/out/example/report.html")
          wopi_ok, wopi_err = count_results("Dep.Tests/puppeteer/out/wopi/report.html")
          total_ok  = api_ok  + wopi_ok
          total_err = api_err + wopi_err

          print(f"EE API tests:  OK={api_ok},  Failed={api_err}")
          print(f"EE WOPI tests: OK={wopi_ok}, Failed={wopi_err}")
          print(f"EE Total:      OK={total_ok}, Failed={total_err}")

          prev_total = int(os.environ.get("PUPPETEER_TOTAL_FAILED", "0"))
          new_total = prev_total + total_err

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PUPPETEER_EE_FAILED={total_err}\n")
              f.write(f"PUPPETEER_TOTAL_FAILED={new_total}\n")
          PYEOF

      - name: Documentserver logs ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo docker exec ds-ee-release bash -c "tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log"
          EOF

      - name: Remove ONLYOFFICE-Docs EE and Install ONLYOFFICE-Docs DE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo docker stop ds-ee-release
          sudo docker rm ds-ee-release
          sudo docker rmi onlyoffice/documentserver-ee
          sudo docker pull onlyoffice/documentserver-de
          sudo docker run -itd -p 80:80 -e WOPI_ENABLED=true --name ds-de-release onlyoffice/documentserver-de
          sleep 90
          sudo docker exec ds-de-release supervisorctl start all
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "-------------healthcheck-------------"
          curl -s http://127.0.0.1/healthcheck; echo
          echo "-------------DS services-------------"
          sudo docker exec ds-de-release supervisorctl status all || true
          echo "---------Installed packages----------"
          sudo docker exec ds-de-release bash -c "dpkg -l | grep onlyoffice"
          echo "--------packageType--------"
          sudo docker exec ds-de-release curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "-------------DS-example-------------"
          sudo docker exec ds-de-release supervisorctl start ds:example
          sudo docker exec ds-de-release supervisorctl status ds:example
          EOF

      - name: Check healthcheck DE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck DE: $HC"
          echo "HEALTHCHECK_DE=$HC" >> $GITHUB_ENV

      - name: Clear puppeteer output before DE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results DE
        if: always()
        run: |
          python3 - <<'PYEOF'
          import os

          def count_results(path):
              if not os.path.exists(path):
                  print(f"Report not found: {path}")
                  return 0, 0
              with open(path) as f:
                  content = f.read()
              ok  = content.count("<td>OK</td>")
              err = content.count("<td>Error in script terminal.</td>")
              return ok, err

          api_ok,  api_err  = count_results("Dep.Tests/puppeteer/out/example/report.html")
          wopi_ok, wopi_err = count_results("Dep.Tests/puppeteer/out/wopi/report.html")
          total_ok  = api_ok  + wopi_ok
          total_err = api_err + wopi_err

          print(f"DE API tests:  OK={api_ok},  Failed={api_err}")
          print(f"DE WOPI tests: OK={wopi_ok}, Failed={wopi_err}")
          print(f"DE Total:      OK={total_ok}, Failed={total_err}")

          prev_total = int(os.environ.get("PUPPETEER_TOTAL_FAILED", "0"))
          new_total = prev_total + total_err

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PUPPETEER_DE_FAILED={total_err}\n")
              f.write(f"PUPPETEER_TOTAL_FAILED={new_total}\n")
          PYEOF

      - name: Documentserver logs ONLYOFFICE-Docs DE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo docker exec ds-de-release bash -c "tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log"
          EOF

      - name: Remove ONLYOFFICE-Docs DE and Install ONLYOFFICE-Docs CE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo docker stop ds-de-release
          sudo docker rm ds-de-release
          sudo docker rmi onlyoffice/documentserver-de
          sudo docker pull onlyoffice/documentserver
          sudo docker run -itd -p 80:80 -e WOPI_ENABLED=true --name ds-release onlyoffice/documentserver
          sleep 90
          sudo docker exec ds-release supervisorctl start all
          EOF

      - name: Info about installed Package, must be ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          echo "-------------healthcheck-------------"
          curl -s http://127.0.0.1/healthcheck; echo
          echo "-------------DS services-------------"
          sudo docker exec ds-release supervisorctl status all || true
          echo "---------Installed packages----------"
          sudo docker exec ds-release bash -c "dpkg -l | grep onlyoffice"
          echo "--------packageType--------"
          sudo docker exec ds-release curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          curl -s http://127.0.0.1/hosting/discovery | tail -c 150; echo
          echo "-------------DS-example-------------"
          sudo docker exec ds-release supervisorctl start ds:example
          sudo docker exec ds-release supervisorctl status ds:example
          EOF

      - name: Check healthcheck CE
        continue-on-error: true
        run: |
          HC=$(curl -s "http://${{ env.EC2_IP }}/healthcheck" || echo "error")
          echo "Healthcheck CE: $HC"
          echo "HEALTHCHECK_CE=$HC" >> $GITHUB_ENV

      - name: Clear puppeteer output before CE tests
        run: rm -rf Dep.Tests/puppeteer/out

      - name: Puppeteer API tests ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Parse puppeteer results CE
        if: always()
        run: |
          python3 - <<'PYEOF'
          import os

          def count_results(path):
              if not os.path.exists(path):
                  print(f"Report not found: {path}")
                  return 0, 0
              with open(path) as f:
                  content = f.read()
              ok  = content.count("<td>OK</td>")
              err = content.count("<td>Error in script terminal.</td>")
              return ok, err

          api_ok,  api_err  = count_results("Dep.Tests/puppeteer/out/example/report.html")
          wopi_ok, wopi_err = count_results("Dep.Tests/puppeteer/out/wopi/report.html")
          total_ok  = api_ok  + wopi_ok
          total_err = api_err + wopi_err

          print(f"CE API tests:  OK={api_ok},  Failed={api_err}")
          print(f"CE WOPI tests: OK={wopi_ok}, Failed={wopi_err}")
          print(f"CE Total:      OK={total_ok}, Failed={total_err}")

          prev_total = int(os.environ.get("PUPPETEER_TOTAL_FAILED", "0"))
          new_total = prev_total + total_err

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PUPPETEER_CE_FAILED={total_err}\n")
              f.write(f"PUPPETEER_TOTAL_FAILED={new_total}\n")
          PYEOF

      - name: Documentserver logs ONLYOFFICE-Docs CE
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo docker exec ds-release bash -c "tail -n 1000 /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/metrics/out.log /var/log/onlyoffice/documentserver/metrics/err.log /var/log/onlyoffice/documentserver/nginx.error.log /var/log/onlyoffice/documentserver-example/out.log /var/log/onlyoffice/documentserver/adminpanel/out.log /var/log/onlyoffice/documentserver/adminpanel/err.log"
          EOF

      - name: Remove ONLYOFFICE-Docs CE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_IP }} << EOF
          sudo docker stop ds-release
          sudo docker rm ds-release
          sudo docker rmi onlyoffice/documentserver
          EOF

      - name: Final check
        if: always()
        run: |
          FAILED=0

          echo "=== Healthcheck results ==="
          for VAR in HEALTHCHECK_EE HEALTHCHECK_DE HEALTHCHECK_CE; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-not set}"
            if [ "${VAL}" != "true" ]; then
              echo "$VAR FAILED"
              FAILED=1
            fi
          done

          echo "=== Puppeteer results ==="
          for VAR in PUPPETEER_EE_FAILED PUPPETEER_DE_FAILED PUPPETEER_CE_FAILED; do
            VAL="${!VAR}"
            echo "$VAR: ${VAL:-0}"
            if [ "${VAL:-0}" -gt 12 ]; then
              echo "$VAR FAILED (threshold: 12)"
              FAILED=1
            else
              echo "$VAR OK (${VAL:-0} failures, threshold: 12)"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Delete EC2 Instance
        if: always()
        run: |
          aws ec2 terminate-instances --instance-ids ${{ env.INSTANCE_ID }}
          aws ec2 wait instance-terminated --instance-ids ${{ env.INSTANCE_ID }}
