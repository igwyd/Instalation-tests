name: dev ActiveMQ x64

on:
  schedule:
    - cron: '0 12 * * 3'  # Wednesday 15:00 Moscow time (UTC+3)
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    name: dev ActiveMQ ${{ matrix.mq }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - mq: artemis
            mq_image: apache/activemq-artemis:2.40.0-alpine
            mq_user: artemis
            mq_password: artemis

          - mq: classic
            mq_image: apache/activemq-classic:latest
            mq_user: admin
            mq_password: admin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create docker network and start containers
        run: |
          docker network create ds-network

          if [ "${{ matrix.mq }}" = "artemis" ]; then
            docker run -d --network ds-network \
              --name onlyoffice-mq \
              -e ARTEMIS_USER=${{ matrix.mq_user }} \
              -e ARTEMIS_PASSWORD=${{ matrix.mq_password }} \
              ${{ matrix.mq_image }}
          else
            docker run -d --network ds-network \
              --name onlyoffice-mq \
              -e ACTIVEMQ_USERNAME=${{ matrix.mq_user }} \
              -e ACTIVEMQ_PASSWORD=${{ matrix.mq_password }} \
              ${{ matrix.mq_image }}
          fi

          docker run -d --network ds-network -p 80:80 \
            --name onlyoffice \
            -e AMQP_TYPE=activemq \
            -e AMQP_URI=amqp://${{ matrix.mq_user }}:${{ matrix.mq_password }}@onlyoffice-mq \
            -e JWT_ENABLED=true \
            -e JWT_SECRET=MYSECRET \
            -e WOPI_ENABLED=true \
            onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

      - name: Docker containers STATUS
        run: docker ps -a

      - name: Wait for ${{ matrix.mq }} and ONLYOFFICE to be ready
        run: sleep 180

      - name: Get runner IP
        run: |
          IP=$(ip route get 1 | awk '{print $7}')
          echo "RUNNER_IP=$IP" >> $GITHUB_ENV
          echo "Runner IP is $IP"

      - name: Initialize check defaults
        run: |
          echo "HEALTHY=false" >> $GITHUB_ENV
          echo "VERSION_OK=false" >> $GITHUB_ENV
          echo "PUPPETEER_FAILED=0" >> $GITHUB_ENV
          echo "PUPPETEER_API_FAILED=0" >> $GITHUB_ENV
          echo "PUPPETEER_WOPI_FAILED=0" >> $GITHUB_ENV

      - name: INFO
        continue-on-error: true
        run: |
          sudo apt-get install jq -y

          echo "-------------healthcheck-------------"
          HEALTHCHECK_RESULT=$(curl -s http://${RUNNER_IP}/healthcheck || echo "error")
          echo "Healthcheck: $HEALTHCHECK_RESULT"
          if [ "$HEALTHCHECK_RESULT" = "true" ]; then
            echo "HEALTHY=true" >> $GITHUB_ENV
          fi
          echo "-------------DS services-------------"
          docker exec onlyoffice supervisorctl status all || true
          echo "--------installed packages-----------"
          docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice"
          echo "--------packageType must be 1--------"
          docker exec onlyoffice curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "----------${{ matrix.mq }} logs-----------"
          docker logs --tail 50 onlyoffice-mq

      - name: Check version
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          ACTUAL=$(docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice" | awk '{print $3}' | head -n 1)
          echo "Expected version: $EXPECTED"
          echo "Actual version:   $ACTUAL"
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            echo "VERSION_OK=true" >> $GITHUB_ENV
          fi

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Start ds-example
        run: docker exec onlyoffice supervisorctl start ds:example

      - name: Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${RUNNER_IP}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Documentserver logs PUPPETEER TEST
        continue-on-error: true
        run: docker logs --tail 500 onlyoffice

      - name: Check DS logs for errors
        continue-on-error: true
        run: |
          ERRORS=$(docker exec onlyoffice bash -c 'grep -iEh "\[error\]|typeerror" /var/log/onlyoffice/documentserver/converter/out.log /var/log/onlyoffice/documentserver/converter/err.log /var/log/onlyoffice/documentserver/docservice/out.log /var/log/onlyoffice/documentserver/docservice/err.log /var/log/onlyoffice/documentserver/nginx.error.log 2>/dev/null | wc -l' 2>/dev/null || echo "0")
          echo "DS log errors: $ERRORS"
          echo "DS_LOG_ERRORS=$ERRORS" >> $GITHUB_ENV

      - name: Parse PUPPETEER TEST results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py

      - name: Final check
        if: always()
        run: |
          FAILED=0

          echo "=== Healthcheck ==="
          echo "Healthcheck: ${HEALTHY:-not set}"
          if [ "${HEALTHY}" != "true" ]; then
            echo "Healthcheck FAILED"
            FAILED=1
          else
            echo "Healthcheck passed"
          fi

          echo "=== Version ==="
          echo "Version OK: ${VERSION_OK:-not set}"
          if [ "${VERSION_OK}" != "true" ]; then
            echo "Version check FAILED"
            FAILED=1
          else
            echo "Version check passed"
          fi

          echo "=== Puppeteer results ==="
          echo "Puppeteer API  failed: ${PUPPETEER_API_FAILED:-0}"
          echo "Puppeteer WOPI failed: ${PUPPETEER_WOPI_FAILED:-0}"
          echo "Puppeteer total failed: ${PUPPETEER_FAILED:-0}"
          if [ "${PUPPETEER_FAILED:-0}" -gt 5 ]; then
            echo "Too many puppeteer failures: ${PUPPETEER_FAILED} (threshold: 5)"
            FAILED=1
          else
            echo "Puppeteer tests OK: ${PUPPETEER_FAILED:-0} failures (threshold: 5)"
          fi

          echo "=== DS log errors ==="
          echo "DS log errors: ${DS_LOG_ERRORS:-0}"

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
