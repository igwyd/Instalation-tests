name: dev ActiveMQ x64

on:
  schedule:
    - cron: '0 14 * * 3'  # Wednesday 17:00 Moscow time (UTC+3)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    name: dev ActiveMQ ${{ matrix.mq }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - mq: artemis
            mq_image: apache/activemq-artemis:2.40.0-alpine
            mq_user: artemis
            mq_password: artemis

          - mq: classic
            mq_image: apache/activemq-classic:latest
            mq_user: admin
            mq_password: admin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create docker network and start containers
        run: |
          docker network create ds-network

          if [ "${{ matrix.mq }}" = "artemis" ]; then
            docker run -d --network ds-network \
              --name onlyoffice-mq \
              -e ARTEMIS_USER=${{ matrix.mq_user }} \
              -e ARTEMIS_PASSWORD=${{ matrix.mq_password }} \
              ${{ matrix.mq_image }}
          else
            docker run -d --network ds-network \
              --name onlyoffice-mq \
              -e ACTIVEMQ_USERNAME=${{ matrix.mq_user }} \
              -e ACTIVEMQ_PASSWORD=${{ matrix.mq_password }} \
              ${{ matrix.mq_image }}
          fi

          docker run -d --network ds-network -p 80:80 \
            --name onlyoffice \
            -e AMQP_TYPE=activemq \
            -e AMQP_URI=amqp://${{ matrix.mq_user }}:${{ matrix.mq_password }}@onlyoffice-mq \
            -e JWT_ENABLED=true \
            -e JWT_SECRET=MYSECRET \
            -e WOPI_ENABLED=true \
            onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

      - name: Docker containers STATUS
        run: docker ps -a

      - name: Wait for ${{ matrix.mq }} and ONLYOFFICE to be ready
        run: sleep 240

      - name: Get runner IP
        run: |
          IP=$(ip route get 1 | awk '{print $7}')
          echo "RUNNER_IP=$IP" >> $GITHUB_ENV
          echo "Runner IP is $IP"

      - name: Initialize check defaults
        run: |
          echo "HEALTHY=false" >> $GITHUB_ENV
          echo "VERSION_OK=false" >> $GITHUB_ENV
          echo "PUPPETEER_FAILED=0" >> $GITHUB_ENV
          echo "PUPPETEER_API_FAILED=0" >> $GITHUB_ENV
          echo "PUPPETEER_WOPI_FAILED=0" >> $GITHUB_ENV


      - name: INFO
        continue-on-error: true
        run: |
          sudo apt-get install jq -y

          echo "-------------healthcheck-------------"
          HEALTHCHECK_RESULT=$(curl -s http://${RUNNER_IP}/healthcheck || echo "error")
          echo "Healthcheck: $HEALTHCHECK_RESULT"
          if [ "$HEALTHCHECK_RESULT" = "true" ]; then
            echo "HEALTHY=true" >> $GITHUB_ENV
          fi
          echo "-------------DS services-------------"
          docker exec onlyoffice supervisorctl status all || true
          echo "--------installed packages-----------"
          docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice"
          echo "--------packageType must be 1--------"
          docker exec onlyoffice curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "----------${{ matrix.mq }} logs-----------"
          docker logs --tail 50 onlyoffice-mq

      - name: Check version
        continue-on-error: true
        run: |
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          ACTUAL=$(docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice" | awk '{print $3}' | head -n 1)
          echo "Expected version: $EXPECTED"
          echo "Actual version:   $ACTUAL"
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            echo "VERSION_OK=true" >> $GITHUB_ENV
          fi
          echo "VERSION_ACTUAL=$ACTUAL" >> $GITHUB_ENV

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Start ds-example
        run: docker exec onlyoffice supervisorctl start ds:example

      - name: Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${RUNNER_IP}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Documentserver logs
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: docker-local
          container: onlyoffice

      - name: Check DS logs for errors
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: docker-local
          container: onlyoffice
          env_var: DS_LOG_ERRORS

      - name: Parse PUPPETEER TEST results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py

      - name: Final check
        if: always()
        run: |
          FAILED=0
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"

          # --- Evaluate each check ---
          if [ "${HEALTHY}" = "true" ]; then
            HC_ICON="✅"; HC_LABEL="OK";     HC_DETAIL="${HEALTHY}"
          else
            HC_ICON="❌"; HC_LABEL="FAILED"; HC_DETAIL="${HEALTHY:-not set}"; FAILED=1
          fi

          if [ "${VERSION_OK}" = "true" ]; then
            VER_ICON="✅"; VER_LABEL="OK"
          else
            VER_ICON="❌"; VER_LABEL="FAILED"; FAILED=1
          fi
          VER_DETAIL="exp: ${EXPECTED}, act: ${VERSION_ACTUAL:-not set}"

          PPTR_TOTAL="${PUPPETEER_FAILED:-0}"
          PPT_DETAIL="API: ${PUPPETEER_API_FAILED:-0}, WOPI: ${PUPPETEER_WOPI_FAILED:-0}, Total: ${PPTR_TOTAL} (threshold: 5)"
          if [ "$PPTR_TOTAL" -gt 5 ]; then
            PPT_ICON="❌"; PPT_LABEL="FAILED"; FAILED=1
          else
            PPT_ICON="✅"; PPT_LABEL="OK"
          fi

          DS_ERRORS="${DS_LOG_ERRORS:-0}"
          DS_DETAIL="${DS_ERRORS} errors"
          if [ "$DS_ERRORS" -gt 0 ]; then
            DS_ICON="❌"; DS_LABEL="FAILED"; FAILED=1
          else
            DS_ICON="✅"; DS_LABEL="OK"
          fi

          # --- GITHUB_STEP_SUMMARY (markdown table) ---
          {
            echo "## Final Check — ${{ matrix.mq }}"
            echo ""
            echo "| Check | Result | Details |"
            echo "|-------|--------|---------|"
            echo "| Healthcheck   | ${HC_ICON} ${HC_LABEL}  | ${HC_DETAIL} |"
            echo "| Version       | ${VER_ICON} ${VER_LABEL} | \`${EXPECTED}\` → \`${VERSION_ACTUAL:-not set}\` |"
            echo "| Puppeteer     | ${PPT_ICON} ${PPT_LABEL} | ${PPT_DETAIL} |"
            echo "| DS Log Errors | ${DS_ICON} ${DS_LABEL}  | ${DS_DETAIL} |"
            echo ""
            if [ "$FAILED" -eq 1 ]; then
              echo "> ❌ **Final check FAILED**"
            else
              echo "> ✅ **All checks passed**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # --- Console log (ASCII table) ---
          SEP="+----------------------+--------+--------------------------------------------+"
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Check" "Result" "Details"
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Healthcheck"   "${HC_LABEL}"  "${HC_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Version"       "${VER_LABEL}" "${VER_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Puppeteer"     "${PPT_LABEL}" "${PPT_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "DS Log Errors" "${DS_LABEL}"  "${DS_DETAIL}"
          echo "$SEP"

          if [ "$FAILED" -eq 1 ]; then
            echo "FINAL_CONCLUSION=failure" >> "$GITHUB_ENV"
            exit 1
          else
            echo "FINAL_CONCLUSION=success" >> "$GITHUB_ENV"
          fi

      - name: Save results
        if: always()
        continue-on-error: true
        env:
          MQ_NAME: ${{ matrix.mq }}
          EXPECTED_VERSION: ${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.DASHBOARD_BUCKET_REGION }}
        run: |
          mkdir -p .github/workflow-results
          python3 - << 'PYEOF'
          import json, os

          data = {
              "healthy": os.environ.get('HEALTHY', '') == 'true',
              "version_expected": os.environ.get('EXPECTED_VERSION', ''),
              "version_actual": os.environ.get('VERSION_ACTUAL', 'not set'),
              "version_ok": os.environ.get('VERSION_OK', '') == 'true',
              "puppeteer_api_failed": int(os.environ.get('PUPPETEER_API_FAILED', '0') or '0'),
              "puppeteer_wopi_failed": int(os.environ.get('PUPPETEER_WOPI_FAILED', '0') or '0'),
              "puppeteer_total_failed": int(os.environ.get('PUPPETEER_FAILED', '0') or '0'),
              "ds_log_errors": int(os.environ.get('DS_LOG_ERRORS', '0') or '0'),
              "conclusion": os.environ.get('FINAL_CONCLUSION', 'failure'),
          }
          mq = os.environ.get('MQ_NAME', 'unknown')
          path = f'.github/workflow-results/dev-activemq-{mq}.json'
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f"Saved: {path}")
          PYEOF

          aws s3 cp .github/workflow-results/dev-activemq-${{ matrix.mq }}.json \
            s3://${{ vars.DASHBOARD_BUCKET_NAME }}/results/dev-activemq-${{ matrix.mq }}.json \
            --region ${{ vars.DASHBOARD_BUCKET_REGION }}
