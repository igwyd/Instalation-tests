name: dev SERVER checks

on:
  schedule:
    - cron: '0 13 * * 3'  # Wednesday 16:00 Moscow time (UTC+3)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-server:
    runs-on: ubuntu-24.04
    name: dev SERVER checks x64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region us-east-1

      - name: Start EC2 Instance
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.AWS_DEV_SERVER_INSTANCE_ID }}
          echo "Waiting for instance to start..."
          aws ec2 wait instance-running --instance-ids ${{ secrets.AWS_DEV_SERVER_INSTANCE_ID }}

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa

      - name: Wait for SSH to be Ready
        run: |
          for i in $(seq 1 10); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} exit 2>/dev/null; then
              echo "SSH is ready"
              exit 0
            fi
            echo "Attempt $i/10 — Waiting for SSH..."
            sleep 10
          done
          echo "SSH not available after 10 attempts"
          exit 1

      - name: Update EC2 Instance
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo apt-get update && sudo apt-get upgrade -y"

      - name: Reboot EC2 Instance
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} "sudo reboot" || true

      - name: Wait for instance to reboot
        run: |
          sleep 60
          for i in $(seq 1 10); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} exit 2>/dev/null; then
              echo "SSH is ready"
              exit 0
            fi
            echo "Attempt $i/10 — Waiting for SSH..."
            sleep 10
          done
          echo "SSH not available after 10 attempts"
          exit 1

      - name: Renew SSL certificates
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo certbot renew && sudo systemctl reload nginx"

      - name: Docker cleanup before run
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker stop \$(sudo docker ps -q) 2>/dev/null || true && sudo docker system prune -af"

      - name: Docker run ONLYOFFICE-Docs EE
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} << EOF
          sudo docker pull onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}
          sudo docker run -itd -p 8080:80 -e WOPI_ENABLED=true --name ds-ee-dev onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}
          EOF

      - name: Wait for DS startup 240
        run: sleep 240

      - name: AWS_S3_FALSE Enable nginx config
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo rm -f /etc/nginx/sites-enabled/* && \
             sudo ln -s /etc/nginx/sites-available/default_proxy-https-to-http.conf /etc/nginx/sites-enabled/default_proxy-https-to-http.conf && \
             sudo nginx -t && sudo systemctl reload nginx"

      - name: AWS_S3_FALSE Configure
        env:
          AWS_DEV_SERVER_BUCKET_NAME: ${{ secrets.AWS_DEV_SERVER_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          envsubst '${AWS_DEV_SERVER_BUCKET_NAME} ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}' \
            < dev-SERVER-checks/aws-s3/useDirectStorageUrls-false/local-production-linux.json \
            > /tmp/local-production-linux.json
          scp -o StrictHostKeyChecking=no /tmp/local-production-linux.json \
            ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }}:~/local-production-linux.json
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} << EOF
          sudo docker cp ~/local-production-linux.json ds-ee-dev:/etc/onlyoffice/documentserver/local-production-linux.json
          sudo rm ~/local-production-linux.json
          sudo docker exec ds-ee-dev supervisorctl restart ds:converter ds:docservice
          sleep 30
          EOF

      - name: AWS_S3_FALSE Info
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} << EOF
          sudo apt-get install jq -y
          echo "-------------healthcheck-------------"
          curl -s https://${{ secrets.AWS_DEV_SERVER_DOMAIN }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo docker exec ds-ee-dev supervisorctl status all || true
          echo "---------Installed packages----------"
          sudo docker exec ds-ee-dev bash -c "dpkg -l | grep onlyoffice"
          echo "--------packageType--------"
          sudo docker exec ds-ee-dev curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI--------------"
          curl -s https://${{ secrets.AWS_DEV_SERVER_DOMAIN }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: AWS_S3_FALSE Check healthcheck
        continue-on-error: true
        run: |
          HC=$(curl -s "https://${{ secrets.AWS_DEV_SERVER_DOMAIN }}/healthcheck" || echo "error")
          echo "Healthcheck: $HC"
          echo "HEALTHCHECK_AWS_S3_FALSE=$HC" >> $GITHUB_ENV

      - name: AWS_S3_FALSE Check version
        continue-on-error: true
        run: |
          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker exec ds-ee-dev dpkg-query -W onlyoffice-documentserver-ee" | awk '{print $2}')
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_AWS_S3_FALSE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_AWS_S3_FALSE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_AWS_S3_FALSE_ACTUAL=$VERSION" >> $GITHUB_ENV

      - name: AWS_S3_FALSE Start ds-example
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker exec ds-ee-dev supervisorctl start ds:example"

      - name: Clear puppeteer output
        run: rm -rf Dep.Tests/puppeteer/out

      - name: AWS_S3_FALSE Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"https://${{ secrets.AWS_DEV_SERVER_DOMAIN }}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py ../tests/desktop/word/smoke/open-close-file-tab.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: AWS_S3_FALSE Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py ../tests/desktop/word/smoke/open-close-file-tab.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: AWS_S3_FALSE Parse puppeteer results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition AWS_S3_FALSE

      - name: AWS_S3_FALSE Documentserver logs
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: ssh-docker
          ssh_host: ${{ secrets.AWS_DEV_SERVER_EC2_IP }}
          container: ds-ee-dev

      - name: AWS_S3_FALSE Check DS logs for errors
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-docker-logs
          ssh_host: ${{ secrets.AWS_DEV_SERVER_EC2_IP }}
          container: ds-ee-dev
          env_var: DS_LOG_ERRORS_AWS_S3_FALSE
          label: AWS_S3_FALSE

      - name: AWS_S3_TRUE Docker reInstall
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} << EOF
          sudo docker stop ds-ee-dev || true
          sudo docker rm ds-ee-dev || true
          sudo docker run -itd -p 8080:80 -e WOPI_ENABLED=true --name ds-ee-dev onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}
          EOF

      - name: Wait for DS startup 240
        run: sleep 240

      - name: AWS_S3_TRUE Enable nginx config
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo rm -f /etc/nginx/sites-enabled/* && \
             sudo ln -s /etc/nginx/sites-available/default_proxy-https-to-http.conf /etc/nginx/sites-enabled/default_proxy-https-to-http.conf && \
             sudo nginx -t && sudo systemctl reload nginx"

      - name: AWS_S3_TRUE Configure
        env:
          AWS_DEV_SERVER_BUCKET_NAME: ${{ secrets.AWS_DEV_SERVER_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          envsubst '${AWS_DEV_SERVER_BUCKET_NAME} ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}' \
            < dev-SERVER-checks/aws-s3/useDirectStorageUrls-true/local-production-linux.json \
            > /tmp/local-production-linux.json
          scp -o StrictHostKeyChecking=no /tmp/local-production-linux.json \
            ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }}:~/local-production-linux.json
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} << EOF
          sudo docker cp ~/local-production-linux.json ds-ee-dev:/etc/onlyoffice/documentserver/local-production-linux.json
          sudo rm ~/local-production-linux.json
          sudo docker exec ds-ee-dev supervisorctl restart ds:converter ds:docservice
          sleep 30
          EOF

      - name: AWS_S3_TRUE Info
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} << EOF
          sudo apt-get install jq -y
          echo "-------------healthcheck-------------"
          curl -s https://${{ secrets.AWS_DEV_SERVER_DOMAIN }}/healthcheck; echo
          echo "-------------DS services-------------"
          sudo docker exec ds-ee-dev supervisorctl status all || true
          echo "---------Installed packages----------"
          sudo docker exec ds-ee-dev bash -c "dpkg -l | grep onlyoffice"
          echo "--------packageType--------"
          sudo docker exec ds-ee-dev curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI--------------"
          curl -s https://${{ secrets.AWS_DEV_SERVER_DOMAIN }}/hosting/discovery | tail -c 150; echo
          EOF

      - name: AWS_S3_TRUE Check healthcheck
        continue-on-error: true
        run: |
          HC=$(curl -s "https://${{ secrets.AWS_DEV_SERVER_DOMAIN }}/healthcheck" || echo "error")
          echo "Healthcheck: $HC"
          echo "HEALTHCHECK_AWS_S3_TRUE=$HC" >> $GITHUB_ENV

      - name: AWS_S3_TRUE Check version
        continue-on-error: true
        run: |
          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker exec ds-ee-dev dpkg-query -W onlyoffice-documentserver-ee" | awk '{print $2}')
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_AWS_S3_TRUE_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_AWS_S3_TRUE_OK=false" >> $GITHUB_ENV
          fi
          echo "VERSION_AWS_S3_TRUE_ACTUAL=$VERSION" >> $GITHUB_ENV

      - name: AWS_S3_TRUE Start ds-example
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker exec ds-ee-dev supervisorctl start ds:example"

      - name: Clear puppeteer output
        run: rm -rf Dep.Tests/puppeteer/out

      - name: AWS_S3_TRUE Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py ../tests/desktop/word/smoke/open-close-file-tab.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: AWS_S3_TRUE Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          jq -r '.testOptions.url' ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py ../tests/desktop/word/smoke/open-close-file-tab.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

