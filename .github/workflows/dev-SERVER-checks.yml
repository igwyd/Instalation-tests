          printf "| %-20s | %-6s | %-42s |\n" "Version"         "${VER7_LABEL}"  "${VER7_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Redis sock ping" "${SOCK7_LABEL}" "${SOCK7_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Port 6379"       "${PORT7_LABEL}" "${PORT7_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Puppeteer"       "${PPT7_LABEL}"  "${PPT7_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "DS Log Errors"   ""   "${DS7_DETAIL}"
          echo "$SEP"

          if [ "$FAILED" -eq 1 ]; then
            echo "FINAL_CONCLUSION=failure" >> "$GITHUB_ENV"
            exit 1
          else
            echo "FINAL_CONCLUSION=success" >> "$GITHUB_ENV"
          fi

      - name: Save results
        if: always()
        continue-on-error: true
        run: |
          mkdir -p .github/workflow-results
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          def b(v): return os.environ.get(v, 'false') == 'true'
          def n(v): return int(os.environ.get(v, '0') or '0')
          def s(v): return os.environ.get(v, 'not set')

          def ok5(ppt): return ppt == 0

          s3f_ppt      = n('PUPPETEER_AWS_S3_FALSE_FAILED')
          s3f_api_ppt  = n('PUPPETEER_AWS_S3_FALSE_API_FAILED')
          s3f_wopi_ppt = n('PUPPETEER_AWS_S3_FALSE_WOPI_FAILED')
          s3t_ppt      = n('PUPPETEER_AWS_S3_TRUE_FAILED')
          s3t_api_ppt  = n('PUPPETEER_AWS_S3_TRUE_API_FAILED')
          s3t_wopi_ppt = n('PUPPETEER_AWS_S3_TRUE_WOPI_FAILED')
          vp_ppt       = n('PUPPETEER_DS_VPATH_FAILED')
          vp_api_ppt   = n('PUPPETEER_DS_VPATH_API_FAILED')
          vp_wopi_ppt  = n('PUPPETEER_DS_VPATH_WOPI_FAILED')
          art_ppt      = n('PUPPETEER_AMQP_ARTEMIS_FAILED')
          art_api_ppt  = n('PUPPETEER_AMQP_ARTEMIS_API_FAILED')
          art_wopi_ppt = n('PUPPETEER_AMQP_ARTEMIS_WOPI_FAILED')
          cls_ppt      = n('PUPPETEER_AMQP_CLASSIC_FAILED')
          cls_api_ppt  = n('PUPPETEER_AMQP_CLASSIC_API_FAILED')
          cls_wopi_ppt = n('PUPPETEER_AMQP_CLASSIC_WOPI_FAILED')
          rr_ppt       = n('PUPPETEER_REDIS_REDIS_FAILED')
          rr_api_ppt   = n('PUPPETEER_REDIS_REDIS_API_FAILED')
          rr_wopi_ppt  = n('PUPPETEER_REDIS_REDIS_WOPI_FAILED')
          ri_ppt       = n('PUPPETEER_REDIS_IOREDIS_FAILED')
          ri_api_ppt   = n('PUPPETEER_REDIS_IOREDIS_API_FAILED')
          ri_wopi_ppt  = n('PUPPETEER_REDIS_IOREDIS_WOPI_FAILED')
          s3f_ds  = n('DS_LOG_ERRORS_AWS_S3_FALSE')
          s3t_ds  = n('DS_LOG_ERRORS_AWS_S3_TRUE')
          vp_ds   = n('DS_LOG_ERRORS_DS_VPATH')
          art_ds  = n('DS_LOG_ERRORS_AMQP_ARTEMIS')
          cls_ds  = n('DS_LOG_ERRORS_AMQP_CLASSIC')
          rr_ds   = n('DS_LOG_ERRORS_REDIS_REDIS')
          ri_ds   = n('DS_LOG_ERRORS_REDIS_IOREDIS')

          data = {
              'run_date': datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC'),
              's3_false': {
                  'healthy':               b('HEALTHCHECK_AWS_S3_FALSE'),
                  'version_ok':            b('VERSION_AWS_S3_FALSE_OK'),
                  'version_actual':        s('VERSION_AWS_S3_FALSE_ACTUAL'),
                  'puppeteer_failed':      s3f_ppt,
                  'puppeteer_api_failed':  s3f_api_ppt,
                  'puppeteer_wopi_failed': s3f_wopi_ppt,
                  'ds_log_errors':         s3f_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_AWS_S3_FALSE') and b('VERSION_AWS_S3_FALSE_OK') and ok5(s3f_ppt) and s3f_ds == 0) else 'failure',
              },
              's3_true': {
                  'healthy':               b('HEALTHCHECK_AWS_S3_TRUE'),
                  'version_ok':            b('VERSION_AWS_S3_TRUE_OK'),
                  'version_actual':        s('VERSION_AWS_S3_TRUE_ACTUAL'),
                  'puppeteer_failed':      s3t_ppt,
                  'puppeteer_api_failed':  s3t_api_ppt,
                  'puppeteer_wopi_failed': s3t_wopi_ppt,
                  'ds_log_errors':         s3t_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_AWS_S3_TRUE') and b('VERSION_AWS_S3_TRUE_OK') and ok5(s3t_ppt) and s3t_ds == 0) else 'failure',
              },
              'vpath': {
                  'healthy':               b('HEALTHCHECK_DS_VPATH'),
                  'version_ok':            b('VERSION_DS_VPATH_OK'),
                  'version_actual':        s('VERSION_DS_VPATH_ACTUAL'),
                  'puppeteer_failed':      vp_ppt,
                  'puppeteer_api_failed':  vp_api_ppt,
                  'puppeteer_wopi_failed': vp_wopi_ppt,
                  'ds_log_errors':         vp_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_DS_VPATH') and b('VERSION_DS_VPATH_OK') and ok5(vp_ppt) and vp_ds == 0) else 'failure',
              },
              'amqp_artemis': {
                  'healthy':               b('HEALTHCHECK_AMQP_ARTEMIS'),
                  'version_ok':            b('VERSION_AMQP_ARTEMIS_OK'),
                  'version_actual':        s('VERSION_AMQP_ARTEMIS_ACTUAL'),
                  'puppeteer_failed':      art_ppt,
                  'puppeteer_api_failed':  art_api_ppt,
                  'puppeteer_wopi_failed': art_wopi_ppt,
                  'ds_log_errors':         art_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_AMQP_ARTEMIS') and b('VERSION_AMQP_ARTEMIS_OK') and ok5(art_ppt) and art_ds == 0) else 'failure',
              },
              'amqp_classic': {
                  'healthy':               b('HEALTHCHECK_AMQP_CLASSIC'),
                  'version_ok':            b('VERSION_AMQP_CLASSIC_OK'),
                  'version_actual':        s('VERSION_AMQP_CLASSIC_ACTUAL'),
                  'puppeteer_failed':      cls_ppt,
                  'puppeteer_api_failed':  cls_api_ppt,
                  'puppeteer_wopi_failed': cls_wopi_ppt,
                  'ds_log_errors':         cls_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_AMQP_CLASSIC') and b('VERSION_AMQP_CLASSIC_OK') and ok5(cls_ppt) and cls_ds == 0) else 'failure',
              },
              'redis_redis': {
                  'healthy':               b('HEALTHCHECK_REDIS_REDIS'),
                  'version_ok':            b('VERSION_REDIS_REDIS_OK'),
                  'version_actual':        s('VERSION_REDIS_REDIS_ACTUAL'),
                  'redis_sock_ok':         b('REDIS_SOCK_OK_REDIS_REDIS'),
                  'port_6379_closed':      b('PORT_6379_CLOSED_REDIS_REDIS'),
                  'puppeteer_failed':      rr_ppt,
                  'puppeteer_api_failed':  rr_api_ppt,
                  'puppeteer_wopi_failed': rr_wopi_ppt,
                  'ds_log_errors':         rr_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_REDIS_REDIS') and b('VERSION_REDIS_REDIS_OK') and b('REDIS_SOCK_OK_REDIS_REDIS') and b('PORT_6379_CLOSED_REDIS_REDIS') and ok5(rr_ppt) and rr_ds == 0) else 'failure',
              },
              'redis_ioredis': {
                  'healthy':               b('HEALTHCHECK_REDIS_IOREDIS'),
                  'version_ok':            b('VERSION_REDIS_IOREDIS_OK'),
                  'version_actual':        s('VERSION_REDIS_IOREDIS_ACTUAL'),
                  'redis_sock_ok':         b('REDIS_SOCK_OK_REDIS_IOREDIS'),
                  'port_6379_closed':      b('PORT_6379_CLOSED_REDIS_IOREDIS'),
                  'puppeteer_failed':      ri_ppt,
                  'puppeteer_api_failed':  ri_api_ppt,
                  'puppeteer_wopi_failed': ri_wopi_ppt,
                  'ds_log_errors':         ri_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_REDIS_IOREDIS') and b('VERSION_REDIS_IOREDIS_OK') and b('REDIS_SOCK_OK_REDIS_IOREDIS') and b('PORT_6379_CLOSED_REDIS_IOREDIS') and ok5(ri_ppt) and ri_ds == 0) else 'failure',
              },
              'conclusion': os.environ.get('FINAL_CONCLUSION', 'failure'),
          }
          path = '.github/workflow-results/dev-server-checks.json'
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Saved: {path}')
          PYEOF

          aws s3 cp .github/workflow-results/dev-server-checks.json \
            s3://${{ vars.DASHBOARD_BUCKET_NAME }}/results/dev-server-checks.json \
            --region ${{ vars.DASHBOARD_BUCKET_REGION }}

      - name: Clear S3 bucket files folder
        if: always()
        run: |
          sleep 10 && aws s3 rm s3://${{ secrets.AWS_DEV_SERVER_BUCKET_NAME }}/files/ --recursive

      - name: Docker cleanup after run
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker stop \$(sudo docker ps -q) 2>/dev/null || true && sudo docker system prune -af"

      - name: Stop EC2 Instance
        if: always()
        run: |
          aws ec2 stop-instances --instance-ids ${{ secrets.AWS_DEV_SERVER_INSTANCE_ID }}
          aws ec2 wait instance-stopped --instance-ids ${{ secrets.AWS_DEV_SERVER_INSTANCE_ID }}
