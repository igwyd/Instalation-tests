          echo "Healthcheck: $HC"
          echo "HEALTHCHECK_REDIS_IOREDIS=$HC" >> $GITHUB_ENV

          PING=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker exec ds-ee-dev redis-cli -s /run/redis/redis-server.sock ping 2>/dev/null || echo 'error'")
          echo "Redis socket ping: $PING"
          if [ "$PING" = "PONG" ]; then
            echo "REDIS_SOCK_OK_REDIS_IOREDIS=true" >> $GITHUB_ENV
          else
            echo "REDIS_SOCK_OK_REDIS_IOREDIS=false" >> $GITHUB_ENV
          fi

          PORT_CHECK=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker exec ds-ee-dev netstat -tulpn 2>/dev/null | grep ':6379' || echo ''")
          echo "Port 6379 check: '${PORT_CHECK}'"
          if [ -z "$PORT_CHECK" ]; then
            echo "PORT_6379_CLOSED_REDIS_IOREDIS=true" >> $GITHUB_ENV
          else
            echo "PORT_6379_CLOSED_REDIS_IOREDIS=false" >> $GITHUB_ENV
          fi

      - name: REDIS_IOREDIS Check version
        continue-on-error: true
        run: |
          VERSION=$(ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker exec ds-ee-dev dpkg-query -W onlyoffice-documentserver-ee" | awk '{print $2}')
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          echo "Version: installed=$VERSION, expected=$EXPECTED"
          if [ "$VERSION" = "$EXPECTED" ]; then
            echo "VERSION_REDIS_IOREDIS_OK=true" >> $GITHUB_ENV
          else
            echo "VERSION_REDIS_IOREDIS_OK=false" >> $GITHUB_ENV
          fi
