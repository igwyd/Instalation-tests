          printf "| %-20s | %-6s | %-42s |\n" "Puppeteer"       "${PPT6_LABEL}"  "${PPT6_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "DS Log Errors"   ""   "${DS6_DETAIL}"
