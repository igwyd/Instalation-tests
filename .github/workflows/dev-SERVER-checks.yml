          sudo docker exec ds-ee-dev bash -c "sed -i 's/^port .*/port 0/' /etc/redis/redis.conf && echo 'unixsocket /run/redis/redis-server.sock' >> /etc/redis/redis.conf && echo 'unixsocketperm 777' >> /etc/redis/redis.conf && pkill -f redis-server"
          sleep 10
          echo "------------ START REDIS server -------------"
          sudo docker exec ds-ee-dev service redis-server start
          echo "------------ Redis ping -------------"
          sudo docker exec ds-ee-dev redis-cli -s /run/redis/redis-server.sock ping
          echo "------------ Redis port 6379 must be closed -------------"
          sudo docker exec ds-ee-dev netstat -tulpn
          echo "------------ Copy DS local-production-linux.json config -------------"
          sudo docker cp ~/local-production-linux.json ds-ee-dev:/etc/onlyoffice/documentserver/local-production-linux.json
          sudo rm ~/local-production-linux.json
          sudo docker exec ds-ee-dev cat /etc/onlyoffice/documentserver/local-production-linux.json
          echo "------------ START DS services -------------"
          sudo docker exec ds-ee-dev supervisorctl start ds:converter ds:docservice
          sleep 10
          EOF

      - name: REDIS_IOREDIS Info
