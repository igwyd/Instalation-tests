          echo "-------------------------------------"
          python3 run.py ../tests/desktop/word/smoke/open-close-file-tab.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/spreadsheets/hometab/font/font_bold.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/presentation/hometab/input/input_text_and_download.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf/smoke/check_find_for_a_specific_pdf.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi
          python3 run.py ../tests/desktop/pdf-form/rightmenu/insert_checkbox.js --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: DS-VPATH Parse puppeteer results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py --edition DS_VPATH

      - name: DS-VPATH Documentserver logs
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: ssh-docker
          ssh_host: ${{ secrets.AWS_DEV_SERVER_EC2_IP }}
          container: ds-ee-dev

      - name: DS-VPATH Check DS logs for errors
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: ssh-docker-logs
          ssh_host: ${{ secrets.AWS_DEV_SERVER_EC2_IP }}
          container: ds-ee-dev
          env_var: DS_LOG_ERRORS_DS_VPATH
          label: DS_VPATH

      - name: Final check
        if: always()
        run: |
          FAILED=0
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"

          # --- AWS_S3_FALSE ---
          if [ "${HEALTHCHECK_AWS_S3_FALSE}" = "true" ]; then
            HC1_ICON="✅"; HC1_LABEL="OK";     HC1_DETAIL="${HEALTHCHECK_AWS_S3_FALSE}"
          else
            HC1_ICON="❌"; HC1_LABEL="FAILED"; HC1_DETAIL="${HEALTHCHECK_AWS_S3_FALSE:-not set}"; FAILED=1
          fi

          if [ "${VERSION_AWS_S3_FALSE_OK}" = "true" ]; then
            VER1_ICON="✅"; VER1_LABEL="OK"
          else
            VER1_ICON="❌"; VER1_LABEL="FAILED"; FAILED=1
          fi
          VER1_DETAIL="exp: ${EXPECTED}, act: ${VERSION_AWS_S3_FALSE_ACTUAL:-not set}"

          PPT1="${PUPPETEER_AWS_S3_FALSE_FAILED:-0}"
          PPT1_DETAIL="${PPT1} failures (threshold: 0)"
          if [ "$PPT1" -gt 0 ]; then
            PPT1_ICON="❌"; PPT1_LABEL="FAILED"; FAILED=1
          else
            PPT1_ICON="✅"; PPT1_LABEL="OK"
          fi

          DS1="${DS_LOG_ERRORS_AWS_S3_FALSE:-0}"
          DS1_DETAIL="${DS1} errors"
          if [ "$DS1" -gt 0 ]; then
            DS1_ICON="❌"; DS1_LABEL="FAILED"
          else
            DS1_ICON="✅"; DS1_LABEL="OK"
          fi

          # --- AWS_S3_TRUE ---
          if [ "${HEALTHCHECK_AWS_S3_TRUE}" = "true" ]; then
            HC2_ICON="✅"; HC2_LABEL="OK";     HC2_DETAIL="${HEALTHCHECK_AWS_S3_TRUE}"
          else
            HC2_ICON="❌"; HC2_LABEL="FAILED"; HC2_DETAIL="${HEALTHCHECK_AWS_S3_TRUE:-not set}"; FAILED=1
          fi

          if [ "${VERSION_AWS_S3_TRUE_OK}" = "true" ]; then
            VER2_ICON="✅"; VER2_LABEL="OK"
          else
            VER2_ICON="❌"; VER2_LABEL="FAILED"; FAILED=1
          fi
          VER2_DETAIL="exp: ${EXPECTED}, act: ${VERSION_AWS_S3_TRUE_ACTUAL:-not set}"

          PPT2="${PUPPETEER_AWS_S3_TRUE_FAILED:-0}"
          PPT2_DETAIL="${PPT2} failures (threshold: 0)"
          if [ "$PPT2" -gt 0 ]; then
            PPT2_ICON="❌"; PPT2_LABEL="FAILED"; FAILED=1
          else
            PPT2_ICON="✅"; PPT2_LABEL="OK"
          fi

          DS2="${DS_LOG_ERRORS_AWS_S3_TRUE:-0}"
          DS2_DETAIL="${DS2} errors"
          if [ "$DS2" -gt 0 ]; then
            DS2_ICON="❌"; DS2_LABEL="FAILED"
          else
            DS2_ICON="✅"; DS2_LABEL="OK"
          fi

          # --- DS_VPATH ---
          if [ "${HEALTHCHECK_DS_VPATH}" = "true" ]; then
            HC3_ICON="✅"; HC3_LABEL="OK";     HC3_DETAIL="${HEALTHCHECK_DS_VPATH}"
          else
            HC3_ICON="❌"; HC3_LABEL="FAILED"; HC3_DETAIL="${HEALTHCHECK_DS_VPATH:-not set}"; FAILED=1
          fi

          if [ "${VERSION_DS_VPATH_OK}" = "true" ]; then
            VER3_ICON="✅"; VER3_LABEL="OK"
          else
            VER3_ICON="❌"; VER3_LABEL="FAILED"; FAILED=1
          fi
          VER3_DETAIL="exp: ${EXPECTED}, act: ${VERSION_DS_VPATH_ACTUAL:-not set}"

          PPT3="${PUPPETEER_DS_VPATH_FAILED:-0}"
          PPT3_DETAIL="${PPT3} failures (threshold: 0)"
          if [ "$PPT3" -gt 0 ]; then
            PPT3_ICON="❌"; PPT3_LABEL="FAILED"; FAILED=1
          else
            PPT3_ICON="✅"; PPT3_LABEL="OK"
          fi

          DS3="${DS_LOG_ERRORS_DS_VPATH:-0}"
          DS3_DETAIL="${DS3} errors"
          if [ "$DS3" -gt 0 ]; then
            DS3_ICON="❌"; DS3_LABEL="FAILED"
          else
            DS3_ICON="✅"; DS3_LABEL="OK"
          fi

          # --- GITHUB_STEP_SUMMARY (markdown table) ---
          {
            echo "## Final Check"
            echo ""
            echo "### S3 useDirectStorageUrls=false"
            echo ""
            echo "| Check | Result | Details |"
            echo "|-------|--------|---------|"
            echo "| Healthcheck   | ${HC1_ICON} ${HC1_LABEL}  | ${HC1_DETAIL} |"
            echo "| Version       | ${VER1_ICON} ${VER1_LABEL} | \`${VERSION_AWS_S3_FALSE_ACTUAL:-not set}\` |"
            echo "| Puppeteer     | ${PPT1_ICON} ${PPT1_LABEL} | ${PPT1_DETAIL} |"
            echo "| DS Log Errors | ${DS1_DETAIL} | |"
            echo ""
            echo "### S3 useDirectStorageUrls=true"
            echo ""
            echo "| Check | Result | Details |"
            echo "|-------|--------|---------|"
            echo "| Healthcheck   | ${HC2_ICON} ${HC2_LABEL}  | ${HC2_DETAIL} |"
            echo "| Version       | ${VER2_ICON} ${VER2_LABEL} | \`${VERSION_AWS_S3_TRUE_ACTUAL:-not set}\` |"
            echo "| Puppeteer     | ${PPT2_ICON} ${PPT2_LABEL} | ${PPT2_DETAIL} |"
            echo "| DS Log Errors | ${DS2_DETAIL} | |"
            echo ""
            echo "### Virtual Path"
            echo ""
            echo "| Check | Result | Details |"
            echo "|-------|--------|---------|"
            echo "| Healthcheck   | ${HC3_ICON} ${HC3_LABEL}  | ${HC3_DETAIL} |"
            echo "| Version       | ${VER3_ICON} ${VER3_LABEL} | \`${VERSION_DS_VPATH_ACTUAL:-not set}\` |"
            echo "| Puppeteer     | ${PPT3_ICON} ${PPT3_LABEL} | ${PPT3_DETAIL} |"
            echo "| DS Log Errors | ${DS3_DETAIL} | |"
            echo ""
            if [ "$FAILED" -eq 1 ]; then
              echo "> ❌ **Final check FAILED**"
            else
              echo "> ✅ **All checks passed**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # --- Console log (ASCII table) ---
          SEP="+----------------------+--------+--------------------------------------------+"
          echo "=== S3 useDirectStorageUrls=false ==="
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Check" "Result" "Details"
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Healthcheck"   "${HC1_LABEL}"  "${HC1_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Version"       "${VER1_LABEL}" "${VER1_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Puppeteer"     "${PPT1_LABEL}" "${PPT1_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "DS Log Errors" ""  "${DS1_DETAIL}"
          echo "$SEP"
          echo ""
          echo "=== S3 useDirectStorageUrls=true ==="
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Check" "Result" "Details"
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Healthcheck"   "${HC2_LABEL}"  "${HC2_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Version"       "${VER2_LABEL}" "${VER2_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Puppeteer"     "${PPT2_LABEL}" "${PPT2_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "DS Log Errors" ""  "${DS2_DETAIL}"
          echo "$SEP"
          echo ""
          echo "=== Virtual Path ==="
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Check" "Result" "Details"
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Healthcheck"   "${HC3_LABEL}"  "${HC3_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Version"       "${VER3_LABEL}" "${VER3_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Puppeteer"     "${PPT3_LABEL}" "${PPT3_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "DS Log Errors" ""  "${DS3_DETAIL}"
          echo "$SEP"

          if [ "$FAILED" -eq 1 ]; then
            echo "FINAL_CONCLUSION=failure" >> "$GITHUB_ENV"
            exit 1
          else
            echo "FINAL_CONCLUSION=success" >> "$GITHUB_ENV"
          fi

      - name: Save results
        if: always()
        continue-on-error: true
        run: |
          mkdir -p .github/workflow-results
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          def b(v): return os.environ.get(v, 'false') == 'true'
          def n(v): return int(os.environ.get(v, '0') or '0')
          def s(v): return os.environ.get(v, 'not set')

          def ok5(ppt): return ppt == 0

          s3f_ppt      = n('PUPPETEER_AWS_S3_FALSE_FAILED')
          s3f_api_ppt  = n('PUPPETEER_AWS_S3_FALSE_API_FAILED')
          s3f_wopi_ppt = n('PUPPETEER_AWS_S3_FALSE_WOPI_FAILED')
          s3t_ppt      = n('PUPPETEER_AWS_S3_TRUE_FAILED')
          s3t_api_ppt  = n('PUPPETEER_AWS_S3_TRUE_API_FAILED')
          s3t_wopi_ppt = n('PUPPETEER_AWS_S3_TRUE_WOPI_FAILED')
          vp_ppt       = n('PUPPETEER_DS_VPATH_FAILED')
          vp_api_ppt   = n('PUPPETEER_DS_VPATH_API_FAILED')
          vp_wopi_ppt  = n('PUPPETEER_DS_VPATH_WOPI_FAILED')
          s3f_ds  = n('DS_LOG_ERRORS_AWS_S3_FALSE')
          s3t_ds  = n('DS_LOG_ERRORS_AWS_S3_TRUE')
          vp_ds   = n('DS_LOG_ERRORS_DS_VPATH')

          data = {
              'run_date': datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC'),
              's3_false': {
                  'healthy':               b('HEALTHCHECK_AWS_S3_FALSE'),
                  'version_ok':            b('VERSION_AWS_S3_FALSE_OK'),
                  'version_actual':        s('VERSION_AWS_S3_FALSE_ACTUAL'),
                  'puppeteer_failed':      s3f_ppt,
                  'puppeteer_api_failed':  s3f_api_ppt,
                  'puppeteer_wopi_failed': s3f_wopi_ppt,
                  'ds_log_errors':         s3f_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_AWS_S3_FALSE') and b('VERSION_AWS_S3_FALSE_OK') and ok5(s3f_ppt) and s3f_ds == 0) else 'failure',
              },
              's3_true': {
                  'healthy':               b('HEALTHCHECK_AWS_S3_TRUE'),
                  'version_ok':            b('VERSION_AWS_S3_TRUE_OK'),
                  'version_actual':        s('VERSION_AWS_S3_TRUE_ACTUAL'),
                  'puppeteer_failed':      s3t_ppt,
                  'puppeteer_api_failed':  s3t_api_ppt,
                  'puppeteer_wopi_failed': s3t_wopi_ppt,
                  'ds_log_errors':         s3t_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_AWS_S3_TRUE') and b('VERSION_AWS_S3_TRUE_OK') and ok5(s3t_ppt) and s3t_ds == 0) else 'failure',
              },
              'vpath': {
                  'healthy':               b('HEALTHCHECK_DS_VPATH'),
                  'version_ok':            b('VERSION_DS_VPATH_OK'),
                  'version_actual':        s('VERSION_DS_VPATH_ACTUAL'),
                  'puppeteer_failed':      vp_ppt,
                  'puppeteer_api_failed':  vp_api_ppt,
                  'puppeteer_wopi_failed': vp_wopi_ppt,
                  'ds_log_errors':         vp_ds,
                  'conclusion': 'success' if (b('HEALTHCHECK_DS_VPATH') and b('VERSION_DS_VPATH_OK') and ok5(vp_ppt) and vp_ds == 0) else 'failure',
              },
              'conclusion': os.environ.get('FINAL_CONCLUSION', 'failure'),
          }
          path = '.github/workflow-results/dev-server-checks.json'
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Saved: {path}')
          PYEOF

          aws s3 cp .github/workflow-results/dev-server-checks.json \
            s3://${{ vars.DASHBOARD_BUCKET_NAME }}/results/dev-server-checks.json \
            --region ${{ vars.DASHBOARD_BUCKET_REGION }}

      - name: Clear S3 bucket files folder
        if: always()
        run: |
          sleep 10 && aws s3 rm s3://${{ secrets.AWS_DEV_SERVER_BUCKET_NAME }}/files/ --recursive

      - name: Docker cleanup after run
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_DEV_SERVER_EC2_IP }} \
            "sudo docker stop \$(sudo docker ps -q) 2>/dev/null || true && sudo docker system prune -af"

      - name: Stop EC2 Instance
        if: always()
        run: |
          aws ec2 stop-instances --instance-ids ${{ secrets.AWS_DEV_SERVER_INSTANCE_ID }}
          aws ec2 wait instance-stopped --instance-ids ${{ secrets.AWS_DEV_SERVER_INSTANCE_ID }}
