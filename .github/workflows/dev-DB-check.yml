name: dev DB check x64

on:
  schedule:
    - cron: '0 14 * * 3'  # Wednesday 17:00 Mosсow time (UTC+3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  db-check:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: mysql
            db_image: mysql:latest
            db_name: mysqldb
            db_port: 3306
            db_type: mysql
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres
            db_image: postgres:latest
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres14
            db_image: postgres:14
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres15
            db_image: postgres:15
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres16
            db_image: postgres:16
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres17
            db_image: postgres:17
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: mssql
            db_image: docker.io/igwyd890/mssql-onlyoffice:2025
            db_name: mssqldb
            db_port: 1433
            db_type: mssql
            db_user: sa
            db_pwd: onlYoff1ce
            k6_stage_ramp: "1m:50"
            k6_stage_main: "9m:50"
          - db: oracle
            db_image: gvenzl/oracle-xe:21-slim
            db_name: oracledb
            db_port: 1521
            db_type: oracle
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: dameng
            db_image: igwyd890/dameng-onlyoffice:8.1.3
            db_name: damengdb
            db_port: 5236
            db_type: dameng
            db_user: onlyoffice
            db_pwd: Onlyoffice_2026
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: mariadb
            db_image: mariadb:latest
            db_name: mariadbdb
            db_port: 3306
            db_type: mysql
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create docker network and start containers
        run: |
          docker network create ds-network

          case "${{ matrix.db }}" in
            mysql)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e MYSQL_ROOT_PASSWORD=onlyoffice \
                -e MYSQL_DATABASE=onlyoffice \
                -e MYSQL_USER=onlyoffice \
                -e MYSQL_PASSWORD=onlyoffice \
                ${{ matrix.db_image }}
              ;;
            postgres | postgres14 | postgres15 | postgres16 | postgres17)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e POSTGRES_DB=onlyoffice \
                -e POSTGRES_USER=onlyoffice \
                -e POSTGRES_PASSWORD=onlyoffice \
                ${{ matrix.db_image }}
              ;;
            mssql)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e ACCEPT_EULA=Y \
                -e SA_PASSWORD=onlYoff1ce \
                ${{ matrix.db_image }}
              ;;
            oracle)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e ORACLE_PASSWORD=admin \
                -e ORACLE_DATABASE=onlyoffice \
                -e APP_USER=onlyoffice \
                -e APP_USER_PASSWORD=onlyoffice \
                ${{ matrix.db_image }}
              ;;
            dameng)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e PAGE_SIZE=16 \
                -e LD_LIBRARY_PATH=/opt/dmdbms/bin \
                -e INSTANCE_NAME=dm8_01 \
                ${{ matrix.db_image }}
              ;;
            mariadb)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e MARIADB_ROOT_PASSWORD=onlyoffice \
                -e MARIADB_DATABASE=onlyoffice \
                -e MARIADB_USER=onlyoffice \
                -e MARIADB_PASSWORD=onlyoffice \
                ${{ matrix.db_image }}
              ;;
          esac

          docker run -d --network ds-network -p 80:80 \
            -e DB_TYPE=${{ matrix.db_type }} \
            -e DB_HOST=${{ matrix.db_name }} \
            -e DB_PORT=${{ matrix.db_port }} \
            -e DB_NAME=onlyoffice \
            -e DB_USER=${{ matrix.db_user }} \
            -e DB_PWD=${{ matrix.db_pwd }} \
            -e WOPI_ENABLED=true \
            -e JWT_SECRET=MYSECRET \
            --name onlyoffice \
            onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

      - name: docker containers STATUS
        run: |
          docker ps -a

      - name: Wait for ${{ matrix.db }} DB and ONLYOFFICE to be ready
        run: sleep 240

      - name: Get runner IP
        id: runner_ip
        run: |
          IP=$(ip route get 1 | awk '{print $7}')
          echo "RUNNER_IP=$IP" >> $GITHUB_ENV
          echo "Runner IP is $IP"

      - name: ADD document, dummy_end_points and license for tests
        run: |
          docker exec onlyoffice wget -O /var/www/onlyoffice/documentserver/sample.zip https://nct2.onlyoffice.com/s/y-3qCyC7GkMcYv8
          docker exec onlyoffice unzip /var/www/onlyoffice/documentserver/sample.zip -d /var/www/onlyoffice/documentserver/
          docker cp performance-test/local-production-linux.json onlyoffice:/etc/onlyoffice/documentserver/local-production-linux.json
          docker exec onlyoffice supervisorctl restart ds:docservice
          docker exec onlyoffice supervisorctl restart ds:converter

          cat <<'EOF' > license.lic
          ${{ secrets.LICENSE_KEY }}
          EOF
          docker cp license.lic onlyoffice:/var/www/onlyoffice/Data/license.lic

      - name: CHECK document, dummy_end_points and license
        run: |
          echo '--- local-production-linux.json  ---'
          docker exec onlyoffice cat /etc/onlyoffice/documentserver/local-production-linux.json
          echo '--- Sample.docx in documentserver ---'
          docker exec onlyoffice ls /var/www/onlyoffice/documentserver/
          echo '--- license ---'
          docker exec onlyoffice ls /var/www/onlyoffice/Data/

      - name: INFO about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          sudo apt-get install jq -y

          echo "-------------healthcheck-------------"
          HEALTHCHECK_RESULT=$(curl -s http://${RUNNER_IP}/healthcheck || echo "error")
          echo "Healthcheck: $HEALTHCHECK_RESULT"
          echo "HEALTHCHECK_RESULT=$HEALTHCHECK_RESULT" >> $GITHUB_ENV
          echo "-------------DS services-------------"
          docker exec onlyoffice supervisorctl status all || true
          echo "---------Installed packages----------"
          docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice"
          echo "----------${{ matrix.db }} version-----------"
          case "${{ matrix.db }}" in
            mysql)
              docker exec ${{ matrix.db_name }} mysql --version
              ;;
            postgres | postgres14 | postgres15 | postgres16 | postgres17)
              docker exec ${{ matrix.db_name }} psql --version
              ;;
            mssql)
              docker exec ${{ matrix.db_name }} /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "onlYoff1ce" -Q "SELECT @@VERSION" -C
              ;;
            oracle)
              docker exec ${{ matrix.db_name }} sqlplus -version
              ;;
            dameng)
              docker exec ${{ matrix.db_name }} bash -c '/opt/dmdbms/bin/disql -S SYSDBA/SYSDBA_dm001@localhost:5236 -E "SELECT banner FROM v\$version;"'
              ;;
            mariadb)
              docker exec ${{ matrix.db_name }} mariadb --version
              ;;
          esac
          echo "--------packageType must be 1--------"
          docker exec onlyoffice curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          output=$(curl -s http://${RUNNER_IP}/hosting/discovery)
          if echo "$output" | grep -q 'value='; then
            echo "$output" | grep -o 'value="[^"]*"' | head -n 5 | cut -c1-100
          else
            echo "$output"
          fi

      - name: Check DS default services
        continue-on-error: true
        run: |
          UNEXPECTED=$(docker exec onlyoffice supervisorctl status all | grep RUNNING | grep -vE 'ds:converter|ds:docservice' || true)
          if [ -z "$UNEXPECTED" ]; then
            echo "SERVICES_OK=true" >> $GITHUB_ENV
          else
            echo "Unexpected running services: $UNEXPECTED"
            echo "SERVICES_OK=false" >> $GITHUB_ENV
          fi

      - name: Setup Puppeteer
        uses: ./.github/actions/setup-puppeteer
        with:
          git_ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Start ds-example
        run: docker exec onlyoffice supervisorctl start ds:example

      - name: Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${RUNNER_IP}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Documentserver logs PUPPETEER TEST
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: docker-local
          container: onlyoffice

      - name: Parse PUPPETEER TEST results
        if: always()
        run: python3 .github/scripts/parse-puppeteer-results.py

      - name: Install pre-requisites for LOAD test
        run: |
          git clone https://github.com/ONLYOFFICE/document-server-stress-testing.git -b ${{ vars.K6_BRANCH }}
          cd document-server-stress-testing/K6/

          sed -i 's|"serverNameOrIp": "localhost"|"serverNameOrIp": "onlyoffice"|' save-changes-document-random-close.json
          sed -i 's|"documentUrl": "https://example.com/url-to-example-document"|"documentUrl": "http://onlyoffice/wopi/files/docid/contents"|' save-changes-document-random-close.json
          sed -i 's|"callbackUrl": "https://example.com/url-to-callback"|"callbackUrl": "http://onlyoffice/dummyCallback"|' save-changes-document-random-close.json
          sed -i 's|"jwtSecret": ""|"jwtSecret": "MYSECRET"|' save-changes-document-random-close.json

      - name: INFO about save-changes-document-random-close.json
        run: |
          echo "------ Updated json ------"
          cd document-server-stress-testing/K6/
          cat save-changes-document-random-close.json

      - name: Run K6 LOAD test
        working-directory: document-server-stress-testing/K6
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            --network ds-network \
            -v "$(pwd)":/k6 \
            grafana/k6 run /k6/save-changes-document-random-close.js \
            --quiet \
            -s "${{ matrix.k6_stage_ramp }}" -s "${{ matrix.k6_stage_main }}"

      - name: Documentserver logs
        continue-on-error: true
        uses: ./.github/actions/ds-logs
        with:
          mode: docker-local
          container: onlyoffice

      - name: Check DS logs for errors
        continue-on-error: true
        uses: ./.github/actions/check-ds-logs
        with:
          mode: docker-local
          container: onlyoffice
          env_var: DS_LOG_ERRORS

      - name: Final check
        if: always()
        run: |
          FAILED=0
          EXPECTED="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"

          # --- Evaluate each check ---
          if [ "${HEALTHCHECK_RESULT}" = "true" ]; then
            HC_ICON="✅"; HC_LABEL="OK";     HC_DETAIL="${HEALTHCHECK_RESULT}"
          else
            HC_ICON="❌"; HC_LABEL="FAILED"; HC_DETAIL="${HEALTHCHECK_RESULT:-not set}"; FAILED=1
          fi

          VERSION_ACTUAL=$(docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice" | awk '{print $3}' | head -n 1)
          echo "VERSION_ACTUAL=$VERSION_ACTUAL" >> "$GITHUB_ENV"
          if [ "$VERSION_ACTUAL" = "$EXPECTED" ]; then
            VER_ICON="✅"; VER_LABEL="OK"
            echo "VERSION_OK=true" >> "$GITHUB_ENV"
          else
            VER_ICON="❌"; VER_LABEL="FAILED"; FAILED=1
            echo "VERSION_OK=false" >> "$GITHUB_ENV"
          fi
          VER_DETAIL="exp: ${EXPECTED}, act: ${VERSION_ACTUAL:-not set}"

          if [ "${SERVICES_OK}" = "true" ]; then
            SVC_ICON="✅"; SVC_LABEL="OK";     SVC_DETAIL="—"
          else
            SVC_ICON="❌"; SVC_LABEL="FAILED"; SVC_DETAIL="unexpected services running"; FAILED=1
          fi

          PPTR_TOTAL="${PUPPETEER_FAILED:-0}"
          PPT_DETAIL="API: ${PUPPETEER_API_FAILED:-0}, WOPI: ${PUPPETEER_WOPI_FAILED:-0}, Total: ${PPTR_TOTAL} (threshold: 5)"
          if [ "$PPTR_TOTAL" -gt 5 ]; then
            PPT_ICON="❌"; PPT_LABEL="FAILED"; FAILED=1
          else
            PPT_ICON="✅"; PPT_LABEL="OK"
          fi

          DS_ERRORS="${DS_LOG_ERRORS:-0}"
          DS_DETAIL="${DS_ERRORS} errors"
          if [ "$DS_ERRORS" -gt 0 ]; then
            DS_ICON="❌"; DS_LABEL="FAILED"; FAILED=1
          else
            DS_ICON="✅"; DS_LABEL="OK"
          fi

          # --- GITHUB_STEP_SUMMARY (markdown table) ---
          {
            echo "## Final Check — ${{ matrix.db }}"
            echo ""
            echo "| Check | Result | Details |"
            echo "|-------|--------|---------|"
            echo "| Healthcheck   | ${HC_ICON} ${HC_LABEL}  | ${HC_DETAIL} |"
            echo "| Version       | ${VER_ICON} ${VER_LABEL} | \`${EXPECTED}\` → \`${VERSION_ACTUAL:-not set}\` |"
            echo "| DS Services   | ${SVC_ICON} ${SVC_LABEL} | ${SVC_DETAIL} |"
            echo "| Puppeteer     | ${PPT_ICON} ${PPT_LABEL} | ${PPT_DETAIL} |"
            echo "| DS Log Errors | ${DS_ICON} ${DS_LABEL}  | ${DS_DETAIL} |"
            echo ""
            if [ "$FAILED" -eq 1 ]; then
              echo "> ❌ **Final check FAILED**"
            else
              echo "> ✅ **All checks passed**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # --- Console log (ASCII table) ---
          SEP="+----------------------+--------+--------------------------------------------+"
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Check" "Result" "Details"
          echo "$SEP"
          printf "| %-20s | %-6s | %-42s |\n" "Healthcheck"   "${HC_LABEL}"  "${HC_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Version"       "${VER_LABEL}" "${VER_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "DS Services"   "${SVC_LABEL}" "${SVC_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "Puppeteer"     "${PPT_LABEL}" "${PPT_DETAIL}"
          printf "| %-20s | %-6s | %-42s |\n" "DS Log Errors" "${DS_LABEL}"  "${DS_DETAIL}"
          echo "$SEP"

          if [ "$FAILED" -eq 1 ]; then
            echo "FINAL_CONCLUSION=failure" >> "$GITHUB_ENV"
            exit 1
          else
            echo "FINAL_CONCLUSION=success" >> "$GITHUB_ENV"
          fi

      - name: Save results
        if: always()
        continue-on-error: true
        env:
          DB_NAME: ${{ matrix.db }}
          EXPECTED_VERSION: ${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}
        run: |
          mkdir -p .github/workflow-results
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          data = {
              "run_date": datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC'),
              "healthy": os.environ.get('HEALTHCHECK_RESULT', '') == 'true',
              "version_expected": os.environ.get('EXPECTED_VERSION', ''),
              "version_actual": os.environ.get('VERSION_ACTUAL', 'not set'),
              "version_ok": os.environ.get('VERSION_OK', '') == 'true',
              "puppeteer_api_failed": int(os.environ.get('PUPPETEER_API_FAILED', '0') or '0'),
              "puppeteer_wopi_failed": int(os.environ.get('PUPPETEER_WOPI_FAILED', '0') or '0'),
              "puppeteer_total_failed": int(os.environ.get('PUPPETEER_FAILED', '0') or '0'),
              "ds_log_errors": int(os.environ.get('DS_LOG_ERRORS', '0') or '0'),
              "conclusion": os.environ.get('FINAL_CONCLUSION', 'failure'),
          }
          db = os.environ.get('DB_NAME', 'unknown')
          path = f'.github/workflow-results/dev-db-{db}.json'
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f"Saved: {path}")
          PYEOF

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/workflow-results/dev-db-${{ matrix.db }}.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[dev DB check x64] Save ${{ matrix.db }} results"
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD && break
              echo "Attempt $i failed, retrying..."
              sleep $((5 + RANDOM % 10))
            done
          fi
