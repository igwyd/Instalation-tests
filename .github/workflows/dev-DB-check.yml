name: dev DB check x64

on:
  schedule:
    - cron: '0 12 * * 3'  # Wednesday 15:00 Mosсow time (UTC+3)
  workflow_dispatch:

jobs:
  db-check:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: mysql
            db_image: mysql:latest
            db_name: mysqldb
            db_port: 3306
            db_type: mysql
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres
            db_image: postgres:latest
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres14
            db_image: postgres:14
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres15
            db_image: postgres:15
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres16
            db_image: postgres:16
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: postgres17
            db_image: postgres:17
            db_name: postgresdb
            db_port: 5432
            db_type: postgres
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: mssql
            db_image: docker.io/igwyd890/mssql-onlyoffice:2025
            db_name: mssqldb
            db_port: 1433
            db_type: mssql
            db_user: sa
            db_pwd: onlYoff1ce
            k6_stage_ramp: "1m:50"
            k6_stage_main: "9m:50"
          - db: oracle
            db_image: gvenzl/oracle-xe:21-slim
            db_name: oracledb
            db_port: 1521
            db_type: oracle
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: dameng
            db_image: igwyd890/dameng-onlyoffice:8.1.3
            db_name: damengdb
            db_port: 5236
            db_type: dameng
            db_user: onlyoffice
            db_pwd: Onlyoffice_2026
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"
          - db: mariadb
            db_image: mariadb:latest
            db_name: mariadbdb
            db_port: 3306
            db_type: mysql
            db_user: onlyoffice
            db_pwd: onlyoffice
            k6_stage_ramp: "1m:500"
            k6_stage_main: "9m:500"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create docker network and start containers
        run: |
          docker network create ds-network

          case "${{ matrix.db }}" in
            mysql)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e MYSQL_ROOT_PASSWORD=onlyoffice \
                -e MYSQL_DATABASE=onlyoffice \
                -e MYSQL_USER=onlyoffice \
                -e MYSQL_PASSWORD=onlyoffice \
                ${{ matrix.db_image }}
              ;;
            postgres | postgres14 | postgres15 | postgres16 | postgres17)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e POSTGRES_DB=onlyoffice \
                -e POSTGRES_USER=onlyoffice \
                -e POSTGRES_PASSWORD=onlyoffice \
                ${{ matrix.db_image }}
              ;;
            mssql)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e ACCEPT_EULA=Y \
                -e SA_PASSWORD=onlYoff1ce \
                ${{ matrix.db_image }}
              ;;
            oracle)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e ORACLE_PASSWORD=admin \
                -e ORACLE_DATABASE=onlyoffice \
                -e APP_USER=onlyoffice \
                -e APP_USER_PASSWORD=onlyoffice \
                ${{ matrix.db_image }}
              ;;
            dameng)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e PAGE_SIZE=16 \
                -e LD_LIBRARY_PATH=/opt/dmdbms/bin \
                -e INSTANCE_NAME=dm8_01 \
                ${{ matrix.db_image }}
              ;;
            mariadb)
              docker run -d --network ds-network --name ${{ matrix.db_name }} \
                -e MARIADB_ROOT_PASSWORD=onlyoffice \
                -e MARIADB_DATABASE=onlyoffice \
                -e MARIADB_USER=onlyoffice \
                -e MARIADB_PASSWORD=onlyoffice \
                ${{ matrix.db_image }}
              ;;
          esac

          docker run -d --network ds-network -p 80:80 \
            -e DB_TYPE=${{ matrix.db_type }} \
            -e DB_HOST=${{ matrix.db_name }} \
            -e DB_PORT=${{ matrix.db_port }} \
            -e DB_NAME=onlyoffice \
            -e DB_USER=${{ matrix.db_user }} \
            -e DB_PWD=${{ matrix.db_pwd }} \
            -e WOPI_ENABLED=true \
            -e JWT_SECRET=MYSECRET \
            --name onlyoffice \
            onlyoffice/4testing-documentserver-ee:${{ vars.ONLYOFFICE_DEV_VERSION }}.${{ vars.ONLYOFFICE_DEV_BUILD }}

      - name: docker containers STATUS
        run: |
          docker ps -a

      - name: Wait for ${{ matrix.db }} DB and ONLYOFFICE to be ready
        run: sleep 180

      - name: Get runner IP
        id: runner_ip
        run: |
          IP=$(ip route get 1 | awk '{print $7}')
          echo "RUNNER_IP=$IP" >> $GITHUB_ENV
          echo "Runner IP is $IP"

      - name: ADD document, dummy_end_points and license for tests
        run: |
          docker exec onlyoffice wget -O /var/www/onlyoffice/documentserver/sample.zip https://nct2.onlyoffice.com/s/y-3qCyC7GkMcYv8
          docker exec onlyoffice unzip /var/www/onlyoffice/documentserver/sample.zip -d /var/www/onlyoffice/documentserver/
          docker cp performance-test/local-production-linux.json onlyoffice:/etc/onlyoffice/documentserver/local-production-linux.json
          docker exec onlyoffice supervisorctl restart ds:docservice
          docker exec onlyoffice supervisorctl restart ds:converter
          docker exec onlyoffice supervisorctl start ds:example

          cat <<'EOF' > license.lic
          ${{ secrets.LICENSE_KEY }}
          EOF
          docker cp license.lic onlyoffice:/var/www/onlyoffice/Data/license.lic

      - name: CHECK document, dummy_end_points and license
        run: |
          echo '--- local-production-linux.json  ---'
          docker exec onlyoffice cat /etc/onlyoffice/documentserver/local-production-linux.json
          echo '--- Sample.docx in documentserver ---'
          docker exec onlyoffice ls /var/www/onlyoffice/documentserver/
          echo '--- license ---'
          docker exec onlyoffice ls /var/www/onlyoffice/Data/

      - name: INFO about installed Package, must be ONLYOFFICE-Docs EE
        continue-on-error: true
        run: |
          sudo apt-get install jq -y

          echo "-------------healthcheck-------------"
          HEALTHCHECK_RESULT=$(curl -s http://${RUNNER_IP}/healthcheck || echo "error")
          echo "Healthcheck: $HEALTHCHECK_RESULT"
          echo "HEALTHCHECK_RESULT=$HEALTHCHECK_RESULT" >> $GITHUB_ENV
          echo "-------------DS services-------------"
          docker exec onlyoffice supervisorctl status all || true
          echo "---------Installed packages----------"
          docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice"
          echo "----------${{ matrix.db }} version-----------"
          case "${{ matrix.db }}" in
            mysql)
              docker exec ${{ matrix.db_name }} mysql --version
              ;;
            postgres | postgres14 | postgres15 | postgres16 | postgres17)
              docker exec ${{ matrix.db_name }} psql --version
              ;;
            mssql)
              docker exec ${{ matrix.db_name }} /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "onlYoff1ce" -Q "SELECT @@VERSION" -C
              ;;
            oracle)
              docker exec ${{ matrix.db_name }} sqlplus -version
              ;;
            dameng)
              docker exec ${{ matrix.db_name }} bash -c '/opt/dmdbms/bin/disql -S SYSDBA/SYSDBA_dm001@localhost:5236 -E "SELECT banner FROM v\$version;"'
              ;;
            mariadb)
              docker exec ${{ matrix.db_name }} mariadb --version
              ;;
          esac
          echo "--------packageType must be 1--------"
          docker exec onlyoffice curl -s http://127.0.0.1/info/info.json | jq | grep -i -e buildVersion -e buildNumber -e packageType
          echo "-------------WOPI local--------------"
          output=$(curl -s http://${RUNNER_IP}/hosting/discovery)
          if echo "$output" | grep -q 'value='; then
            echo "$output" | grep -o 'value="[^"]*"' | head -n 5 | cut -c1-100
          else
            echo "$output"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install prerequisites for puppeteer tests
        run: |
          sudo apt-get update
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb
          sudo apt-get install -f -y
          google-chrome --version
          python3 --version
          pip3 --version
          node -v
          npm -v

          mkdir -p ~/.ssh
          echo "${{ secrets.GIT_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          ssh-keyscan git.onlyoffice.com >> ~/.ssh/known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone git@git.onlyoffice.com:ONLYOFFICE-QA/Dep.Tests.git
          cd Dep.Tests
          sed -i 's/url=https:\/\/github.com\/ONLYOFFICE-data\/pp-files.git/url = git@github.com:ONLYOFFICE-data\/pp-files.git/' .gitmodules
          git submodule update --init puppeteer/files
          cd puppeteer/engine
          npm install
          cp ../config_chrome_linux.json ../config_chrome_linux.json.bak

      - name: Puppeteer API tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          sed -i -E "s#\"url\": \"https://[^/]+\.teamlab\.info/example\"#\"url\": \"http://${RUNNER_IP}/example\"#" ../config_chrome_linux.json
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers example

      - name: Puppeteer WOPI tests
        continue-on-error: true
        run: |
          cd Dep.Tests/puppeteer/engine
          echo "-------------------------------------"
          cat ../config_chrome_linux.json
          echo "-------------------------------------"
          python3 run.py --suite daily --disable_animation --config_params puppeteerOptions.headless=true puppeteerOptions.channel=chrome --providers wopi

      - name: Documentserver logs PUPPETEER TEST
        run: |
          docker logs -n 1000 onlyoffice

      - name: Parse PUPPETEER TEST results
        if: always()
        run: |
          python3 - <<'EOF'
          import os

          def count_results(path):
              if not os.path.exists(path):
                  print(f"Report not found: {path}")
                  return 0, 0
              with open(path) as f:
                  content = f.read()
              ok  = content.count("<td>OK</td>")
              err = content.count("<td>Error in script terminal.</td>")
              return ok, err

          api_ok,  api_err  = count_results("Dep.Tests/puppeteer/out/example/report.html")
          wopi_ok, wopi_err = count_results("Dep.Tests/puppeteer/out/wopi/report.html")

          total_ok  = api_ok  + wopi_ok
          total_err = api_err + wopi_err

          print(f"API tests:  OK={api_ok},  Failed={api_err}")
          print(f"WOPI tests: OK={wopi_ok}, Failed={wopi_err}")
          print(f"Total:      OK={total_ok}, Failed={total_err}")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PUPPETEER_API_FAILED={api_err}\n")
              f.write(f"PUPPETEER_WOPI_FAILED={wopi_err}\n")
              f.write(f"PUPPETEER_FAILED={total_err}\n")
          EOF

      - name: Install pre-requisites for LOAD test
        run: |
          git clone https://github.com/ONLYOFFICE/document-server-stress-testing.git -b ${{ vars.K6_BRANCH }}
          cd document-server-stress-testing/K6/

          sed -i 's|"serverNameOrIp": "localhost"|"serverNameOrIp": "onlyoffice"|' save-changes-document-random-close.json
          sed -i 's|"documentUrl": "https://example.com/url-to-example-document"|"documentUrl": "http://onlyoffice/wopi/files/docid/contents"|' save-changes-document-random-close.json
          sed -i 's|"callbackUrl": "https://example.com/url-to-callback"|"callbackUrl": "http://onlyoffice/dummyCallback"|' save-changes-document-random-close.json
          sed -i 's|"jwtSecret": ""|"jwtSecret": "MYSECRET"|' save-changes-document-random-close.json

      - name: INFO about save-changes-document-random-close.json
        run: |
          echo "------ Updated json ------"
          cd document-server-stress-testing/K6/
          cat save-changes-document-random-close.json

      - name: Run K6 LOAD test
        working-directory: document-server-stress-testing/K6
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            --network ds-network \
            -v "$(pwd)":/k6 \
            grafana/k6 run /k6/save-changes-document-random-close.js \
            --quiet \
            -s "${{ matrix.k6_stage_ramp }}" -s "${{ matrix.k6_stage_main }}"

      - name: Documentserver logs LOAD TEST
        run: |
          docker logs -n 1000 onlyoffice

      - name: Check healthcheck, version and puppeteer results
        if: always()
        run: |
          FAILED=0

          echo "Healthcheck result: $HEALTHCHECK_RESULT"
          if [ "$HEALTHCHECK_RESULT" != "true" ]; then
            echo "Healthcheck failed!"
            FAILED=1
          else
            echo "Healthcheck passed!"
          fi

          EXPECTED_VERSION="${{ vars.ONLYOFFICE_DEV_VERSION }}-${{ vars.ONLYOFFICE_DEV_BUILD }}"
          INSTALLED_VERSION=$(docker exec onlyoffice bash -c "dpkg -l | grep onlyoffice" | awk '{print $3}' | head -n 1)
          echo "Expected version:  $EXPECTED_VERSION"
          echo "Installed version: $INSTALLED_VERSION"
          if [ "$INSTALLED_VERSION" = "$EXPECTED_VERSION" ]; then
            echo "Version check passed!"
          else
            echo "Version check failed: expected $EXPECTED_VERSION, got $INSTALLED_VERSION"
            FAILED=1
          fi

          echo "Puppeteer API  failed: ${PUPPETEER_API_FAILED:-0}"
          echo "Puppeteer WOPI failed: ${PUPPETEER_WOPI_FAILED:-0}"
          echo "Puppeteer total failed: ${PUPPETEER_FAILED:-0}"
          if [ "${PUPPETEER_FAILED:-0}" -gt 15 ]; then
            echo "Too many puppeteer failures: ${PUPPETEER_FAILED} (threshold: 15)"
            FAILED=1
          else
            echo "Puppeteer tests OK: ${PUPPETEER_FAILED:-0} failures (threshold: 15)"
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
